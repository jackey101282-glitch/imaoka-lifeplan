  // ---- expense ----
  buyItem(id){const it=this.state.items.find(x=>x.id===id);if(!it)return;this.openExpense(null,{label:it.title,amount:it.target,fromItem:id});},
  openExpense(id,pre){
    const it=id?this.state.expenses.find(x=>x.id===id):null;
    const type=it?it.type:"variable";
    this.curExpType=type;
    const catSel='<select id="f-cat" onchange="if(this.value===\'__add__\')App.addCat(App.curExpType,\'f-cat\')">'+this.opts(type,it?it.catId:null,true)+'</select>';
    const h='<h3>'+(it?"支出を編集":"支出を追加")+'</h3>'+
      this.field("種別",'<div class="seg" id="f-etype">'+
        ['fixed:固定費','variable:変動費'].map(o=>{const[v,l]=o.split(":");return '<button type="button" data-v="'+v+'" class="'+(type===v?"on":"")+'" onclick="App.segExpense(this)">'+l+'</button>'}).join("")+'</div>')+
      '<div id="cat-wrap">'+this.field("大項目（カテゴリ）",catSel)+'</div>'+
      this.field("中項目（任意）",'<input id="f-sub" placeholder="例: コンビニ / スーパー / 外食" value="'+esc(it&&it.sub?it.sub:"")+'">')+
      this.field("名前・メモ（任意）",'<input id="f-label" placeholder="お店の名前など" value="'+esc(it?it.label:(pre&&pre.label?pre.label:""))+'">')+
      this.field("金額",'<input id="f-amount" class="amt" type="text" inputmode="numeric" placeholder="0" value="'+cf(it?it.amount:(pre&&pre.amount?pre.amount:""))+'" oninput="App.commaize(this)">')+
      this.field("日付",'<input id="f-date" type="date" value="'+(it&&it.date?it.date:todayStr())+'">')+
      (this.deviceOwner?this.field("公開範囲",'<div class="seg" id="f-vis">'+[["shared","二人で共有"],["private","自分のお小遣い🔒"]].map(o=>'<button type="button" data-v="'+o[0]+'" class="'+(((it&&it.private)?"private":"shared")===o[0]?"on":"")+'" onclick="App.seg(this)">'+o[1]+'</button>').join("")+'</div>'):"")+
      this.actions(()=>{
        const amount=numv("f-amount");if(!amount){this.toast("金額を入力してください");return false;}
        if(val("f-cat")==="__add__"){this.toast("カテゴリを選択してください");return false;}
        const date=val("f-date")||todayStr();
        const isPriv=this.deviceOwner?(seg("f-vis")==="private"):(it?!!it.private:false);
        const owner=isPriv?((it&&it.owner)?it.owner:this.deviceOwner):"";
        const data={type:seg("f-etype"),catId:val("f-cat"),sub:val("f-sub"),label:val("f-label"),amount,date,month:date.slice(0,7),private:isPriv,owner:owner};
        if(!it){const th=+this.state.settings.approveThreshold||0;if(!isPriv&&th>0&&this.deviceOwner&&amount>=th){data.approve="pending";data.reqBy=this.deviceOwner;}}
        if(it)Object.assign(it,data);else this.state.expenses.push({id:uid(),...data});
        if(pre&&pre.fromItem){const item=this.state.items.find(x=>x.id===pre.fromItem);if(item)item.done=true;}
        return true;
      },it?()=>this.del("expenses",id):null);
    this.showSheet(h);
  },
  segExpense(btn){this.seg(btn);const type=btn.dataset.v;this.curExpType=type;document.getElementById("cat-wrap").innerHTML=this.field("カテゴリ",'<select id="f-cat" onchange="if(this.value===\'__add__\')App.addCat(App.curExpType,\'f-cat\')">'+this.opts(type,null,true)+'</select>');},
  // ---- task ----
  taskSubSelect(projId,subId){const subs=this.state.subprojects.filter(s=>s.projectId===projId);return '<select id="f-sub2"'+(projId?'':' disabled')+'><option value="">（なし）</option>'+subs.map(s=>'<option value="'+s.id+'" '+(s.id===subId?"selected":"")+'>'+esc(s.name)+'</option>').join("")+'</select>';},
  taskProjChange(){const pid=val("f-proj");document.getElementById("sub-wrap").innerHTML=this.field("グループ（中プロジェクト）",this.taskSubSelect(pid,null));},
  openTask(id,subId,projId){
    const it=id?this.state.tasks.find(x=>x.id===id):null;
    this._formImage=it&&it.image?it.image:null;
    const presetSub=(typeof subId==="string"&&subId)?subId:(it?it.subId:null);
    const presetProj=presetSub?((this.state.subprojects.find(s=>s.id===presetSub)||{}).projectId):((typeof projId==="string"&&projId)?projId:(it?it.projectId:null));
    const h='<h3>'+(it?"タスクを編集":"タスクを追加")+'</h3>'+
      this.field("やること",'<input id="f-title" placeholder="例: 牛乳を買う / 保育園の書類を出す" value="'+esc(it?it.title:"")+'">')+
      this.field("カテゴリ",'<select id="f-cat" onchange="if(this.value===\'__add__\')App.addCat(\'task\',\'f-cat\')">'+this.opts("task",it?it.cat:"other",true)+'</select>')+
      this.field("担当",'<div class="seg" id="f-assignee">'+
        ['husband:'+esc(this.state.settings.husband),'wife:'+esc(this.state.settings.wife),'both:二人'].map(o=>{const[v,l]=o.split(":");return '<button type="button" data-v="'+v+'" class="'+((it?it.assignee:"both")===v?"on":"")+'" onclick="App.seg(this)">'+l+'</button>'}).join("")+'</div>')+
      this.field("プロジェクト（任意）",'<select id="f-proj" onchange="App.taskProjChange()"><option value="">（個別タスク）</option>'+this.state.projects.map(p=>'<option value="'+p.id+'" '+(p.id===presetProj?"selected":"")+'>'+p.icon+' '+esc(p.name)+'</option>').join("")+'</select>')+
      '<div id="sub-wrap">'+this.field("グループ（中プロジェクト）",this.taskSubSelect(presetProj,presetSub))+'</div>'+
      '<div class="form-row">'+this.field("期限",'<input id="f-due" type="date" value="'+(it&&it.due?it.due:"")+'">')+
      this.field("優先度",'<select id="f-priority">'+['high:高','medium:中','low:低'].map(o=>{const[v,l]=o.split(":");return '<option value="'+v+'" '+((it?it.priority:"medium")===v?"selected":"")+'>'+l+'</option>'}).join("")+'</select>')+'</div>'+
      this.field("メモ",'<textarea id="f-memo" placeholder="詳細メモ">'+esc(it?it.memo:"")+'</textarea>')+
      this.field("場所（任意）",'<input id="f-loc" placeholder="例: 区役所 / 自宅" value="'+esc(it&&it.loc?it.loc:"")+'">')+
      this.field("URL（任意）",'<input id="f-url" type="url" inputmode="url" placeholder="https://" value="'+esc(it&&it.url?it.url:"")+'">')+
      (it&&it.url?'<a class="tlink" href="'+esc(it.url)+'" target="_blank" rel="noopener" style="font-size:var(--text-sm);display:inline-block;margin:-10px 0 14px">リンクを開く ↗</a>':'')+
      this.field("画像・添付（任意）",'<div id="f-img-preview">'+this.imgPreview(it&&it.image)+'</div><input type="file" accept="image/*" onchange="App.pickImage(this)">')+
      this.actions(()=>{
        const title=val("f-title");if(!title){this.toast("やることを入力してください");return false;}
        if(val("f-cat")==="__add__"){this.toast("カテゴリを選択してください");return false;}
        let projId=val("f-proj")||null,sub2=val("f-sub2")||null;
        if(sub2){const ss=this.state.subprojects.find(s=>s.id===sub2);projId=ss?ss.projectId:projId;}
        const data={title,cat:val("f-cat"),assignee:seg("f-assignee"),projectId:projId,subId:sub2,due:val("f-due")||null,priority:val("f-priority"),memo:val("f-memo"),loc:val("f-loc"),url:val("f-url"),image:this._formImage||null};
        if(it)Object.assign(it,data);else this.state.tasks.push({id:uid(),status:"todo",...data});
        return true;
      },it?()=>this.del("tasks",id):null);
    this.showSheet(h);
  },
  imgPreview(src){return src?('<div style="position:relative;display:inline-block;margin-bottom:10px"><img src="'+src+'" style="max-width:100%;max-height:180px;border-radius:var(--radius-md);display:block"><button type="button" class="btn btn-danger btn-sm" style="position:absolute;top:6px;right:6px;min-height:30px;padding:4px 10px" onclick="App.clearImage()">削除</button></div>'):'';},
  pickImage(input){const f=input.files&&input.files[0];if(!f)return;readImage(f,(d)=>{this._formImage=d;const p=document.getElementById("f-img-preview");if(p)p.innerHTML=this.imgPreview(d);});},
  clearImage(){this._formImage=null;const p=document.getElementById("f-img-preview");if(p)p.innerHTML="";},
  // ---- wish ----
  // ---- goal ----
  openGoal(id){
    const it=id?this.state.goals.find(x=>x.id===id):null;
    const h='<h3>'+(it?"積立ゴールを編集":"積立ゴールを追加")+'</h3>'+
      this.field("種類",'<select id="f-type" onchange="var g=App.glabel(this.value);if(g)document.getElementById(\'f-label\').value=g">'+this.opts("goalType",it?it.typeId:"goal_emergency")+'</select>')+
      this.field("名前",'<input id="f-label" value="'+esc(it?it.label:"緊急予備資金")+'">')+
      '<div class="form-row">'+this.field("目標金額",'<input id="f-target" class="amt" type="text" inputmode="numeric" placeholder="0" value="'+cf(it&&it.target)+'" oninput="App.commaize(this)">')+
      this.field("現在の積立額",'<input id="f-current" class="amt" type="text" inputmode="numeric" placeholder="0" value="'+cf(it&&it.current)+'" oninput="App.commaize(this)">')+'</div>'+
      (it?'<div class="form-row"><button class="btn btn-ghost btn-sm" onclick="App.addToGoal(\''+id+'\',10000)">+1万</button><button class="btn btn-ghost btn-sm" onclick="App.addToGoal(\''+id+'\',30000)">+3万</button><button class="btn btn-ghost btn-sm" onclick="App.addToGoal(\''+id+'\',50000)">+5万</button></div>':'')+
      this.actions(()=>{
        const data={typeId:val("f-type"),label:val("f-label"),target:numv("f-target"),current:numv("f-current")};
        if(it)Object.assign(it,data);else this.state.goals.push({id:uid(),...data});
        return true;
      },it?()=>this.del("goals",id):null);
    this.showSheet(h);
  },
  glabel(typeId){const t=findCat("goalType",typeId);return t?t.label:"";},
  addToGoal(id,amt){const g=this.state.goals.find(x=>x.id===id);if(g){g.current=(+g.current||0)+amt;const el=document.getElementById("f-current");if(el)el.value=cf(g.current);this.save();this.toast(yen(amt)+"を積立");}},
  // ---- event ----
  openEvent(id,presetDate){
    const it=id?this.state.events.find(x=>x.id===id):null;
    const h='<h3>'+(it?"予定を編集":"予定を追加")+'</h3>'+
      this.field("タイトル",'<input id="f-title" placeholder="例: 保育園の運動会 / 家賃引落し" value="'+esc(it?it.title:"")+'">')+
      this.field("種別",'<div class="seg" id="f-etype">'+
        ['event:予定','payment:支払い','income:入金'].map(o=>{const[v,l]=o.split(":");return '<button type="button" data-v="'+v+'" class="'+((it?it.type:"event")===v?"on":"")+'" onclick="App.seg(this)">'+l+'</button>'}).join("")+'</div>')+
      this.field("日付",'<input id="f-date" type="date" value="'+(it?it.date:(presetDate||todayStr()))+'">')+
      '<div class="form-row">'+this.field("開始時刻（任意）",'<input id="f-start" type="time" value="'+(it&&it.start?it.start:"")+'">')+
      this.field("終了時刻（任意）",'<input id="f-end" type="time" value="'+(it&&it.end?it.end:"")+'">')+'</div>'+
      this.field("繰り返し",'<select id="f-rec">'+[['none','繰り返さない'],['weekly','毎週（同じ曜日）'],['monthly_date','毎月（同じ日）'],['monthly_nth','毎月（第◯◯曜）'],['yearly','毎年（同じ日付）']].map(o=>'<option value="'+o[0]+'" '+((it&&it.recurrence?it.recurrence:"none")===o[0]?"selected":"")+'>'+o[1]+'</option>').join("")+'</select>')+
      this.field("場所（任意）",'<input id="f-loc" placeholder="例: 〇〇小学校 体育館" value="'+esc(it&&it.loc?it.loc:"")+'">')+
      this.field("メモ（任意）",'<textarea id="f-memo" placeholder="持ち物・詳細・URLなど">'+esc(it&&it.memo?it.memo:"")+'</textarea>')+
      this.field("金額（任意）",'<input id="f-amount" class="amt" type="text" inputmode="numeric" placeholder="0" value="'+cf(it&&it.amount)+'" oninput="App.commaize(this)">')+
      (it?'<a class="btn btn-sec btn-block btn-sm" style="text-decoration:none;margin-bottom:12px" href="'+this.gcalUrl(it)+'" target="_blank" rel="noopener">📅 Googleカレンダーに追加（1回分）</a>':'')+
      this.actions(()=>{
        const title=val("f-title");if(!title){this.toast("タイトルを入力してください");return false;}
        const data={title,type:seg("f-etype"),date:val("f-date"),start:val("f-start")||null,end:val("f-end")||null,recurrence:val("f-rec"),loc:val("f-loc"),memo:val("f-memo"),amount:numv("f-amount")||null};
        if(it)Object.assign(it,data);else this.state.events.push({id:uid(),...data});
        return true;
      },it?()=>this.del("events",id):null);
    this.showSheet(h);
  },
  gcalUrl(ev){
    const d=ev.date.replace(/-/g,"");
    let dates;
    if(ev.start){const st=ev.start.replace(":","")+"00";const en=(ev.end||ev.start).replace(":","")+"00";dates=d+"T"+st+"/"+d+"T"+en;}
    else{dates=d+"/"+addDay(ev.date);}
    let u="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(ev.title)+"&dates="+dates;
    if(ev.loc)u+="&location="+encodeURIComponent(ev.loc);
    const det=[ev.memo||"",ev.amount?("金額: "+yen(ev.amount)):""].filter(Boolean).join("\n");
    if(det)u+="&details="+encodeURIComponent(det);
    return u;
  },

  actions(onSave,onDelete){
    let h='<div class="sheet-actions"><button class="btn btn-ghost" style="flex:1" onclick="App.closeSheet()">キャンセル</button><button class="btn btn-primary" style="flex:2" onclick="App._save()">保存</button></div>';
    if(onDelete)h+='<div class="delete-link" onclick="App._delete()">削除する</div>';
    this._onSave=onSave;this._onDelete=onDelete;
    return h;
  },
  _save(){if(this._onSave()!==false){this.closeSheet();this.commit();this.toast("保存しました");}},
  _delete(){if(confirm("削除しますか?")){this._onDelete();this.closeSheet();this.commit();this.toast("削除しました");}},
  del(coll,id){this.state[coll]=this.state[coll].filter(x=>x.id!==id);},
  seg(btn){btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("on"));btn.classList.add("on");},
  commaize(el){const d=el.value.replace(/[^0-9]/g,"");el.value=d?Number(d).toLocaleString("en-US"):"";},

  toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(this._tt);this._tt=setTimeout(()=>t.classList.remove("show"),1900);},

  /* ---- data import/export ---- */
  exportData(){
    const blob=new Blob([JSON.stringify(this.state,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="imaoka-lifeplan-backup.json";a.click();this.toast("書き出しました");
  },
  importData(file){
    if(!file)return;const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.settings)throw 0;this.state=d;this.load();this.applyTheme();this.save();this.render();this.toast("読み込みました");}catch(e){this.toast("ファイルを読めませんでした");}};
    r.readAsText(file);
  },
  resetData(){if(confirm("すべてのデータを消して初期状態に戻します。よろしいですか?")){this.state=seedState();this.applyTheme();this.save();this.render();this.toast("リセットしました");}},

  /* ============== SUPABASE SYNC ============== */
  /* ===== クラウド(ログイン・世帯共有) ===== */
  async loadSb(){
    if(window.supabase&&window.supabase.createClient)return;
    await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  },
  async initCloud(){
    if(!APP_CONFIG.url||!APP_CONFIG.key)return; // ローカルのみ
    try{
      await this.loadSb();
      this._client=window.supabase.createClient(APP_CONFIG.url,APP_CONFIG.key,{auth:{persistSession:true,autoRefreshToken:true}});
      const {data:{session}}=await this._client.auth.getSession();
      if(session&&session.user){this._user=session.user;await this.afterAuth();}
      else{this.showAuth();}
    }catch(e){console.error(e);this.toast("接続に問題が発生しました");}
  },
  async doAuth(mode){
    const email=val("au-email"),pw=val("au-pw");
    if(!email||!pw){this.toast("メールとパスワードを入力してください");return;}
    if(pw.length<6){this.toast("パスワードは6文字以上にしてください");return;}
    try{
      const r=mode==="signup"?await this._client.auth.signUp({email,password:pw}):await this._client.auth.signInWithPassword({email,password:pw});
      if(r.error){this.toast(r.error.message||"認証に失敗しました");return;}
      if(!r.data.session){this.toast("確認メールを送信しました。メールのリンクを開いてから再度ログインしてください");return;}
      this._user=r.data.user;await this.afterAuth();
    }catch(e){console.error(e);this.toast("認証エラー");}
  },
  async doLogout(){try{await this._client.auth.signOut();}catch(e){} if(this._channel){this._client.removeChannel(this._channel);this._channel=null;} this._user=null;this.householdId=null;this._syncStatus="off";this._authView="login";this.showAuth();},
  switchAuth(v){this._authView=v;this.showAuth();},
  async afterAuth(){
    try{
      const{data:mem,error}=await this._client.from("members").select("household_id").limit(1);
      if(error)throw error;
      if(mem&&mem.length){this.householdId=mem[0].household_id;await this.loadCloud();this.hideAuth();}
      else{this._authView="household";this.showAuth();}
    }catch(e){console.error(e);this.toast("読み込みに失敗しました");}
  },
  async createHousehold(){try{const{data,error}=await this._client.rpc("create_household");if(error)throw error;this.householdId=data;await this.loadCloud();this.hideAuth();this.toast("はじめましょう!");}catch(e){console.error(e);this.toast("作成に失敗しました");}},
  async joinHousehold(code){code=(code||"").trim();if(!code){this.toast("招待コードを入力してください");return;}try{const{data,error}=await this._client.rpc("join_household",{p_code:code});if(error)throw error;this.householdId=data;await this.loadCloud();this.hideAuth();this.toast("参加しました!");}catch(e){console.error(e);this.toast("招待コードが正しくありません");}},
  async loadCloud(){
    try{
      const{data,error}=await this._client.from("app_state").select("data,invite_code").eq("household_id",this.householdId).maybeSingle();
      if(error)throw error;
      this._inviteCode=data?(data.invite_code||""):"";
      if(data&&data.data&&Object.keys(data.data).length){
        this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan",JSON.stringify(this.state));this.applyTheme();
      }else{
        await this.pushNow(); // 初回: 今のデータをクラウドへ
      }
      this._syncStatus="on";
      this.subscribeRealtime();
      this.render();
    }catch(e){console.error(e);this._syncStatus="err";this.render();}
  },
  // クラウドから最新を取得して反映(リアルタイムの取りこぼし対策・タブ復帰時など)
  async pullLatest(){
    if(!this._client||!this.householdId)return;
    try{
      const{data,error}=await this._client.from("app_state").select("data,updated_at").eq("household_id",this.householdId).maybeSingle();
      if(error||!data||!data.data||!Object.keys(data.data).length)return;
      if(data.updated_at===this._lastPushed)return; // 自分が直前に送った更新
      if(this._lastApplied&&data.updated_at&&data.updated_at<=this._lastApplied)return;
      this._lastApplied=data.updated_at;
      this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan",JSON.stringify(this.state));this.applyTheme();this.render();
    }catch(e){}
  },
  subscribeRealtime(){
    if(this._channel)this._client.removeChannel(this._channel);
    this._channel=this._client.channel("hh-"+this.householdId)
      .on("postgres_changes",{event:"*",schema:"public",table:"app_state",filter:"household_id=eq."+this.householdId},payload=>{
        const nd=payload.new;if(!nd||!nd.data)return;if(nd.updated_at===this._lastPushed)return;
        this._lastApplied=nd.updated_at;
        this.state=nd.data;this.normalize();localStorage.setItem("imaoka_lifeplan",JSON.stringify(this.state));this.applyTheme();this.render();
      }).subscribe((status)=>{ if(status==="SUBSCRIBED")this.pullLatest(); });
  },
  queueCloudPush(){clearTimeout(this._pushTimer);this._pushTimer=setTimeout(()=>this.pushNow(),700);},
  async pushNow(){
    if(!this._client||!this.householdId)return;
    const ts=new Date().toISOString();this._lastPushed=ts;
    const payload=JSON.parse(JSON.stringify(this.state));
    try{const{error}=await this._client.from("app_state").update({data:payload,updated_at:ts}).eq("household_id",this.householdId);if(error)throw error;if(this._syncStatus!=="on"){this._syncStatus="on";this.render();}}catch(e){console.error(e);this._syncStatus="err";}
  },
  /* ---- 認証オーバーレイ ---- */
  showAuth(){let el=document.getElementById("authwrap");if(!el){el=document.createElement("div");el.id="authwrap";el.className="authwrap";document.body.appendChild(el);}el.style.display="flex";el.innerHTML=this.authHtml();},
  hideAuth(){const el=document.getElementById("authwrap");if(el)el.style.display="none";},
  authHtml(){
    if(this._authView==="household"){
      return '<div class="authcard"><div style="text-align:center;font-size:34px">👫</div><h2 style="text-align:center;margin:6px 0 4px">ペアを設定</h2><p class="muted" style="text-align:center;margin:0 0 18px">新しく始めるか、パートナーの招待コードで参加します</p>'+
        '<button class="btn btn-primary btn-block" onclick="App.createHousehold()">新しく家計を始める</button>'+
        '<div class="muted" style="text-align:center;margin:14px 0 10px">― または ―</div>'+
        '<input id="au-code" placeholder="招待コード(6文字)" autocapitalize="characters" style="text-align:center;letter-spacing:2px;text-transform:uppercase">'+
        '<button class="btn btn-sec btn-block" style="margin-top:8px" onclick="App.joinHousehold(document.getElementById(\'au-code\').value)">招待コードで参加</button>'+
        '<div style="text-align:center;margin-top:16px"><span class="link" onclick="App.doLogout()">ログアウト</span></div></div>';
    }
    const su=this._authView==="signup";
    return '<div class="authcard"><div class="my-brand">'+
      '<img class="ic" src="icon-192.png" alt="Mietta" />'+
      '<h2 class="my-wordmark">Miett<span style="color:var(--color-accent-500)">a</span></h2>'+
      '<p class="my-tag">夫婦で、これからの暮らしを。</p></div>'+
      '<label class="fld"><span class="lbl">メールアドレス</span><input id="au-email" type="email" inputmode="email" autocapitalize="off" placeholder="you@example.com"></label>'+
      '<label class="fld"><span class="lbl">パスワード</span><input id="au-pw" type="password" placeholder="6文字以上"></label>'+
      '<button class="btn btn-primary btn-block" onclick="App.doAuth(\''+(su?"signup":"login")+'\')">'+(su?"新規登録":"ログイン")+'</button>'+
      '<div style="text-align:center;margin-top:16px"><span class="link" onclick="App.switchAuth(\''+(su?"login":"signup")+'\')">'+(su?"すでにアカウントがある → ログイン":"はじめての方 → 新規登録")+'</span></div></div>';
  }
};
// helpers used inside form callbacks
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function seg(id){const el=document.getElementById(id);const on=el&&el.querySelector("button.on");return on?on.dataset.v:"";}
function numv(id){const el=document.getElementById(id);if(!el)return 0;return +String(el.value).replace(/[^0-9.]/g,"")||0;}
function cf(n){n=+n||0;return n?n.toLocaleString("en-US"):"";}
function domainOf(url){if(!url)return "";try{let u=url;if(!/^https?:\/\//i.test(u))u="https://"+u;return new URL(u).hostname.replace(/^www\./,"");}catch(e){return "";}}
function pad2(n){return String(n).padStart(2,"0");}
function addDay(ymd){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+1);return ""+dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate());}
function addDaysStr(ymd,n){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+n);return dt.getFullYear()+"-"+pad2(dt.getMonth()+1)+"-"+pad2(dt.getDate());}
function readImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=1280;let w=img.width,h=img.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);try{cb(c.toDataURL("image/jpeg",0.72));}catch(e){cb(r.result);}};img.src=r.result;};r.readAsDataURL(file);}

matchMedia("(prefers-color-scheme:dark)").addEventListener("change",()=>{if(App.getDeviceTheme&&App.getDeviceTheme()==="auto")App.applyTheme();});
App.init();

/* service worker for installable PWA (optional, ignored if file missing) */
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
