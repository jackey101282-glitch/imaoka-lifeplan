<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#E86A35" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>д»ҠеІЎе®¶гғ©гӮӨгғ•гғ—гғ©гғі</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<style>
:root{
  --color-primary-50:#FFF4EF;--color-primary-100:#FFE4D6;--color-primary-200:#FFCAAD;
  --color-primary-300:#FFA880;--color-primary-400:#FF8050;--color-primary-500:#E86A35;
  --color-primary-600:#C4521F;--color-primary-700:#9E3E10;
  --color-secondary-50:#EEF1F8;--color-secondary-100:#D5DCEE;--color-secondary-200:#A8B7DC;
  --color-secondary-300:#6E89C4;--color-secondary-400:#3B5FAB;--color-secondary-500:#1E3F8A;
  --color-secondary-600:#162E66;--color-secondary-700:#0E1E44;
  --color-accent-400:#5DAE8B;--color-accent-500:#3D9170;--color-accent-600:#2B7358;
  --color-success:#3D9170;--color-warning:#F0A030;--color-danger:#D94F4F;--color-info:#3B5FAB;
  --color-bg-base:#FAFAF8;--color-bg-surface:#FFFFFF;--color-bg-muted:#F2F0ED;
  --color-border:#E4E0DA;--color-border-strong:#C8C2B8;
  --color-text-primary:#1A1714;--color-text-secondary:#6B6560;--color-text-disabled:#ADA8A2;
  --color-text-on-primary:#FFFFFF;
  --font-family-base:'Hiragino Sans','Hiragino Kaku Gothic ProN','BIZ UDGothic','Noto Sans JP',sans-serif;
  --font-family-number:'DIN Alternate','SF Mono','Noto Sans JP',sans-serif;
  --text-xs:0.625rem;--text-sm:0.75rem;--text-base:0.875rem;--text-md:1rem;--text-lg:1.125rem;
  --text-xl:1.375rem;--text-2xl:1.75rem;--text-3xl:2.25rem;
  --fw-r:400;--fw-m:500;--fw-b:700;
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;
  --space-8:32px;--space-10:40px;--space-12:48px;--space-16:64px;--screen-px:16px;
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--radius-full:9999px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.06);--shadow-sm:0 2px 8px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --shadow-primary:0 4px 12px rgba(232,106,53,.30);
}
html[data-theme="dark"]{
  --color-bg-base:#141210;--color-bg-surface:#1E1C1A;--color-bg-muted:#2A2724;
  --color-border:#3A3632;--color-border-strong:#504C48;
  --color-text-primary:#F0EDE8;--color-text-secondary:#A09890;--color-text-disabled:#5C5854;
  --color-primary-50:#2A211C;--color-primary-500:#F07A48;--color-primary-600:#E86A35;
  --color-secondary-300:#8AAAD8;--color-secondary-500:#4A72C4;--color-accent-500:#52B88E;
  --color-success:#52B88E;--color-warning:#F5B040;--color-danger:#E86060;--color-info:#4A72C4;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden}
html,body{margin:0;padding:0;overscroll-behavior-y:none}
body.noscroll{overflow:hidden}
body{
  font-family:var(--font-family-base);background:var(--color-bg-base);
  color:var(--color-text-primary);font-size:var(--text-base);line-height:1.6;
  -webkit-font-smoothing:antialiased;padding-bottom:calc(64px + env(safe-area-inset-bottom));
  overflow-wrap:break-word;
}
.num{font-family:var(--font-family-number);letter-spacing:-.01em}
/* ===== Header ===== */
.app-header{
  position:sticky;top:0;z-index:30;background:var(--color-bg-surface);
  border-bottom:1px solid var(--color-border);
  padding:calc(env(safe-area-inset-top) + 10px) var(--screen-px) 10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.app-header h1{font-size:var(--text-lg);font-weight:var(--fw-b);margin:0}
.app-header .sub{font-size:var(--text-xs);color:var(--color-text-secondary);font-weight:var(--fw-m)}
.month-nav{display:flex;align-items:center;gap:2px;background:var(--color-primary-50);border:1px solid var(--color-primary-100);border-radius:var(--radius-full);padding:3px 4px}
.month-nav button{border:none;background:transparent;color:var(--color-primary-600);width:30px;height:30px;border-radius:var(--radius-full);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:var(--color-primary-100)}
.month-nav .cur{font-weight:var(--fw-b);font-size:var(--text-base);min-width:88px;text-align:center;color:var(--color-primary-700);cursor:pointer}
.month-nav.off{background:#FCEFD9;border-color:#F3D9A8}
.month-nav.off button,.month-nav.off .cur{color:var(--color-warning)}
html[data-theme="dark"] .month-nav .cur,html[data-theme="dark"] .month-nav button{color:var(--color-primary-500)}
html[data-theme="dark"] .month-nav.off{background:#3a2f1a;border-color:#5a4520}
html[data-theme="dark"] .month-nav.off button,html[data-theme="dark"] .month-nav.off .cur{color:var(--color-warning)}
.sync-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-left:2px;vertical-align:middle}
.sync-on{background:var(--color-accent-500)}.sync-off{background:var(--color-text-disabled)}
.sync-err{background:var(--color-danger)}
/* ===== Layout ===== */
main{padding:var(--space-4) var(--screen-px) 24px;max-width:560px;margin:0 auto;animation:fade .2s ease-out}
@keyframes fade{from{opacity:0}to{opacity:1}}
.card{
  background:var(--color-bg-surface);border-radius:var(--radius-lg);padding:var(--space-5);
  box-shadow:var(--shadow-sm);border:1px solid var(--color-border);margin-bottom:var(--space-3);
}
.card-title{font-size:var(--text-base);font-weight:var(--fw-b);color:var(--color-text-secondary);margin:0 0 var(--space-3)}
.section-title{font-size:var(--text-lg);font-weight:var(--fw-b);margin:var(--space-6) 0 var(--space-3);display:flex;justify-content:space-between;align-items:center}
.section-title .link{font-size:var(--text-sm);color:var(--color-secondary-500);font-weight:var(--fw-m);cursor:pointer}
.big-num{font-family:var(--font-family-number);font-size:var(--text-3xl);font-weight:var(--fw-b);line-height:1.1}
.mid-num{font-family:var(--font-family-number);font-size:var(--text-2xl);font-weight:var(--fw-b)}
.muted{color:var(--color-text-secondary)}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.row + .row{margin-top:var(--space-3)}
.divider{height:1px;background:var(--color-border);margin:var(--space-3) 0}
/* progress */
.prog{background:var(--color-bg-muted);border-radius:var(--radius-full);height:8px;overflow:hidden;margin-top:6px}
.prog.lg{height:12px}
.prog > span{display:block;height:100%;border-radius:var(--radius-full);transition:width .6s cubic-bezier(.4,0,.2,1)}
.fill-primary{background:var(--color-primary-500)}.fill-accent{background:var(--color-accent-500)}
.fill-danger{background:var(--color-danger)}.fill-warning{background:var(--color-warning)}.fill-sec{background:var(--color-secondary-400)}
/* chips */
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:var(--radius-sm);padding:3px 9px;font-size:var(--text-sm);font-weight:var(--fw-m);white-space:nowrap}
.chip-full{border-radius:var(--radius-full);padding:3px 11px}
.chip-fixed{background:var(--color-secondary-50);color:var(--color-secondary-500)}
.chip-var{background:var(--color-primary-50);color:var(--color-primary-600)}
.chip-done{background:#E8F5EF;color:var(--color-accent-600)}
.chip-over{background:#FDECEC;color:var(--color-danger)}
.chip-todo{background:var(--color-bg-muted);color:var(--color-text-secondary)}
.chip-h{background:var(--color-secondary-50);color:var(--color-secondary-500)}
.chip-w{background:var(--color-primary-50);color:var(--color-primary-600)}
.chip-both{background:#E8F5EF;color:var(--color-accent-600)}
html[data-theme="dark"] .chip-done,html[data-theme="dark"] .chip-both{background:#1d3329}
html[data-theme="dark"] .chip-over{background:#3a2020}
.badge{background:var(--color-danger);color:#fff;font-size:var(--text-xs);font-weight:var(--fw-b);border-radius:var(--radius-full);min-width:18px;height:18px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center}
.pill{font-size:var(--text-xs);font-weight:var(--fw-b);padding:2px 8px;border-radius:var(--radius-full)}
.pill-ok{background:#E8F5EF;color:var(--color-accent-600)}
.pill-warn{background:#FCEFD9;color:var(--color-warning)}
.pill-bad{background:#FDECEC;color:var(--color-danger)}
/* list item */
.li{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--color-border)}
.li:last-child{border-bottom:none}
.li .ic{font-size:22px;width:30px;text-align:center;flex-shrink:0}
.li .main{flex:1;min-width:0}
.li .ttl{font-weight:var(--fw-m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .meta{font-size:var(--text-sm);color:var(--color-text-secondary)}
.li .amt{font-family:var(--font-family-number);font-weight:var(--fw-b);white-space:nowrap}
.li.done .ttl{text-decoration:line-through;color:var(--color-text-disabled)}
.li.done{opacity:.6}
.check{width:24px;height:24px;border-radius:50%;border:2px solid var(--color-border-strong);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.check.on{background:var(--color-accent-500);border-color:var(--color-accent-500)}
.empty{text-align:center;color:var(--color-text-secondary);padding:24px 8px;font-size:var(--text-base)}
.empty .e-ic{font-size:34px;display:block;margin-bottom:8px}
/* buttons */
.btn{border:none;border-radius:var(--radius-md);padding:12px 20px;font-size:var(--text-md);font-weight:var(--fw-b);min-height:48px;cursor:pointer;font-family:inherit;transition:all .12s ease-out;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--color-primary-500);color:var(--color-text-on-primary);box-shadow:var(--shadow-primary)}
.btn-sec{background:transparent;color:var(--color-primary-500);border:1.5px solid var(--color-primary-500)}
.btn-ghost{background:var(--color-bg-muted);color:var(--color-text-primary)}
.btn-danger{background:var(--color-danger);color:#fff}
.btn-block{width:100%}
.btn-sm{min-height:38px;padding:8px 14px;font-size:var(--text-base)}
/* FAB */
.fab{position:fixed;right:18px;bottom:calc(74px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:var(--radius-full);background:var(--color-primary-500);color:#fff;font-size:28px;border:none;box-shadow:var(--shadow-primary);cursor:pointer;z-index:25;display:flex;align-items:center;justify-content:center;white-space:nowrap}
.fab.wide{width:auto;height:52px;padding:0 22px;font-size:var(--text-md);font-weight:var(--fw-b);gap:4px}
.fab:active{transform:scale(.94)}
/* filters */
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fchip{border:1px solid var(--color-border);background:var(--color-bg-surface);color:var(--color-text-secondary);border-radius:var(--radius-full);padding:7px 14px;font-size:var(--text-base);white-space:nowrap;cursor:pointer;font-weight:var(--fw-m)}
.fchip.on{background:var(--color-primary-500);color:#fff;border-color:var(--color-primary-500)}
/* bottom nav */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--color-bg-surface);border-top:1px solid var(--color-border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;border:none;background:none;padding:8px 0 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--color-text-disabled);position:relative}
.tab .ti{font-size:22px;line-height:1}
.tab .tl{font-size:var(--text-xs);font-weight:var(--fw-m)}
.tab.on{color:var(--color-primary-500)}
.tab .nbadge{position:absolute;top:2px;right:calc(50% - 22px)}
/* sheet/modal */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.show{opacity:1;pointer-events:auto}
/* гӮ№гғһгғӣе№…гҒ§гҒҜ left:0;right:0 гҒ®гҒҝгҒ§з”»йқўгҒ„гҒЈгҒұгҒ„(width/max-width/vwгӮ’дҪҝгӮҸгҒҡгҒҜгҒҝеҮәгҒ—гӮ’ж №зө¶) */
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--color-bg-surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:8px var(--screen-px) calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);width:auto;margin:0;box-sizing:border-box}
.sheet.show{transform:translateY(0)}
.sheet input,.sheet select,.sheet textarea{max-width:100%;box-sizing:border-box}
@media(min-width:600px){.sheet{max-width:560px;margin:0 auto}}
.sheet .grip{width:38px;height:4px;background:var(--color-border-strong);border-radius:2px;margin:6px auto 12px}
.sheet-close{position:absolute;top:12px;right:14px;width:34px;height:34px;border-radius:var(--radius-full);border:none;background:var(--color-bg-muted);color:var(--color-text-secondary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.sheet-close:active{background:var(--color-border)}
.sheet h3{padding-right:40px}
.sheet h3{margin:0 0 var(--space-4);font-size:var(--text-xl)}
/* form */
label.fld{display:block;margin-bottom:var(--space-4)}
label.fld .lbl{font-size:var(--text-sm);font-weight:var(--fw-m);color:var(--color-text-secondary);margin-bottom:4px;display:block}
input,select,textarea{width:100%;background:var(--color-bg-muted);border:1.5px solid var(--color-border);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-md);font-family:inherit;color:var(--color-text-primary);min-height:48px}
textarea{min-height:72px;resize:vertical;line-height:1.5}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--color-primary-500);background:var(--color-bg-surface);box-shadow:0 0 0 3px rgba(232,106,53,.15)}
input.amt{font-family:var(--font-family-number);text-align:right;font-size:var(--text-xl);font-weight:var(--fw-b)}
.seg{display:flex;background:var(--color-bg-muted);border-radius:var(--radius-md);padding:4px;gap:4px}
.seg button{flex:1;border:none;background:none;padding:9px;border-radius:8px;font-weight:var(--fw-m);color:var(--color-text-secondary);cursor:pointer;font-family:inherit;font-size:var(--text-base)}
.seg button.on{background:var(--color-bg-surface);color:var(--color-primary-600);font-weight:var(--fw-b);box-shadow:var(--shadow-xs)}
.form-row{display:flex;flex-direction:column;gap:10px}.form-row > *{flex:1 1 0;min-width:0}
@media(min-width:600px){.form-row{flex-direction:row}}
input[type=date],input[type=time]{min-width:0;max-width:100%;width:100%}
.sheet-actions{display:flex;gap:10px;margin-top:8px}
.delete-link{text-align:center;color:var(--color-danger);font-size:var(--text-base);padding:14px;cursor:pointer;font-weight:var(--fw-m)}
/* settings */
.set-group{background:var(--color-bg-surface);border-radius:var(--radius-lg);border:1px solid var(--color-border);overflow:hidden;margin-bottom:var(--space-4)}
.set-head{font-size:var(--text-xs);letter-spacing:.04em;color:var(--color-text-secondary);font-weight:var(--fw-b);margin:var(--space-5) 4px var(--space-2)}
.set-cell{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--color-border)}
.set-cell:last-child{border-bottom:none}
.set-cell .lab{font-weight:var(--fw-m)}
.set-cell .desc{font-size:var(--text-sm);color:var(--color-text-secondary)}
.switch{position:relative;width:48px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:var(--color-border-strong);border-radius:var(--radius-full);transition:.2s;cursor:pointer}
.switch .sl:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .sl{background:var(--color-accent-500)}
.switch input:checked + .sl:before{transform:translateX(20px)}
/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.cal-dow{text-align:center;font-size:var(--text-xs);color:var(--color-text-secondary);font-weight:var(--fw-b);padding:4px 0}
.cal-cell{aspect-ratio:1;border-radius:var(--radius-md);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;font-size:var(--text-base);cursor:pointer;position:relative;background:var(--color-bg-surface);border:1px solid transparent;font-family:var(--font-family-number)}
.cal-cell.muted{color:var(--color-text-disabled);background:transparent}
.cal-cell.today{border-color:var(--color-primary-500);font-weight:var(--fw-b)}
.cal-cell.sun{color:var(--color-danger)}.cal-cell.sat{color:var(--color-secondary-500)}
.cal-dots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;justify-content:center}
.cdot{width:5px;height:5px;border-radius:50%}
.cd-pay{background:var(--color-danger)}.cd-task{background:var(--color-primary-500)}.cd-event{background:var(--color-secondary-400)}.cd-wish{background:#9C6ADE}.cd-income{background:var(--color-accent-500)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:var(--text-sm);color:var(--color-text-secondary)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--color-text-primary);color:var(--color-bg-surface);padding:11px 18px;border-radius:var(--radius-full);font-size:var(--text-base);font-weight:var(--fw-m);z-index:60;opacity:0;transition:.25s;box-shadow:var(--shadow-lg);max-width:calc(100% - 32px);box-sizing:border-box;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
a.tlink{color:var(--color-secondary-500)}
.chev{display:inline-block;transition:transform .2s;color:var(--color-text-disabled);font-size:18px;font-weight:700;line-height:1}
.chev.open{transform:rotate(180deg)}
.warn-box{margin-top:12px;background:#FDECEC;color:var(--color-danger);border-radius:var(--radius-md);padding:10px 12px;font-size:var(--text-sm);font-weight:var(--fw-m);line-height:1.6}
.authwrap{position:fixed;inset:0;z-index:100;background:var(--color-bg-base);display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.authcard{width:100%;max-width:380px;margin:auto;background:var(--color-bg-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:28px 24px;box-shadow:var(--shadow-md)}
.authcard h2{font-size:var(--text-xl)}
.my-brand{text-align:center;margin-bottom:22px}
.my-brand .ic{width:72px;height:72px;border-radius:18px;display:inline-block;object-fit:cover;box-shadow:0 8px 20px rgba(0,0,0,.16)}
.my-wordmark{font-size:27px;font-weight:800;letter-spacing:-.025em;line-height:1.1;margin:14px 0 4px}
.my-tag{font-size:var(--text-sm);color:var(--color-text-secondary);margin:0}
html[data-theme="dark"] .warn-box{background:#3a2020}
/* ===== PC(еәғгҒ„з”»йқў)з”Ёгғ¬гӮӨгӮўгӮҰгғҲ: е·ҰгӮөгӮӨгғүгғҗгғј + дёӯеӨ®еҜ„гҒӣ ===== */
@media (min-width:900px){
  body{padding-bottom:0;padding-left:230px}
  .tabbar{flex-direction:column;top:0;bottom:0;left:0;right:auto;width:230px;height:100vh;border-top:none;border-right:1px solid var(--color-border);padding:16px 14px;gap:4px;justify-content:flex-start;align-items:stretch}
  .tabbar::before{content:"make your life.";display:block;font-weight:800;font-size:var(--text-lg);letter-spacing:-.02em;color:var(--color-primary-600);padding:10px 12px 18px;line-height:1.2}
  .tab{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:14px;padding:13px 14px;border-radius:var(--radius-md);width:100%}
  .tab:hover{background:var(--color-bg-muted)}

/* ---------- utilities ---------- */
function uid(){return (crypto.randomUUID?crypto.randomUUID():'id'+Date.now()+Math.round(Math.random()*1e6))}
const yen=n=>"ВҘ"+Math.round(n||0).toLocaleString("ja-JP");
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const thisMonth=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")};
function monthLabel(m){const[y,mo]=m.split("-");return (y+"е№ҙ"+Number(mo)+"жңҲ")}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

   з©әгҒ®гҒҫгҒҫгҒӘгӮүеҫ“жқҘгҒ©гҒҠгӮҠгҖҢиЁӯе®ҡгҖҚгҒӢгӮүгҒ®жүӢеӢ•гӮӘгғігҒҢеҝ…иҰҒгҒ§гҒҷгҖӮ */
const APP_CONFIG = { url:"https://imfynopqugqiczevrmsl.supabase.co", key:"sb_publishable_ISnAg8AcBswzT5lL7CtUeA_Yev1Om85" };

const App = {
  state:null, tab:"dashboard", curMonth:thisMonth(), shareView:"home", curFolderId:null,

  init(){

    this.deviceOwner=localStorage.getItem("imaoka_device")||"";

    this.initCloud();
    window.addEventListener("beforeunload",()=>this.save());
  },
  setDevice(v){this.deviceOwner=v;localStorage.setItem("imaoka_device",v);this.render();},
  toggleNotify(on){
    if(on&&"Notification"in window){Notification.requestPermission().then(p=>{this.state.settings.notify=(p==="granted");this.save(true);this.render();if(p!=="granted")this.toast("йҖҡзҹҘгҒҢиЁұеҸҜгҒ•гӮҢгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ");});}
    else{this.state.settings.notify=false;this.save(true);this.render();}
  },
  notify(title,body){if(this.state.settings.notify&&"Notification"in window&&Notification.permission==="granted"){try{new Notification(title,{body});}catch(e){}}},
  pendingApprovals(){return this.state.expenses.filter(e=>e.approve==="pending");},
  notifyPending(){const mine=this.pendingApprovals().filter(e=>this.deviceOwner&&e.reqBy&&e.reqBy!==this.deviceOwner);if(mine.length)this.notify("жүҝиӘҚеҫ…гҒЎгҒ®ж”ҜеҮә",mine.length+"д»¶гҒ®зўәиӘҚгӮ’гҒҠйЎҳгҒ„гҒ—гҒҫгҒҷ");},
  approveExpense(id){const e=this.state.expenses.find(x=>x.id===id);if(e){e.approve="approved";this.commit();this.toast("жүҝиӘҚгҒ—гҒҫгҒ—гҒҹ");}},
  seeDetail(e){return !e.private||!this.deviceOwner||e.owner===this.deviceOwner;},

  /* ---- persistence ---- */
  load(){

  normalize(){

    if(s.settings.approveThreshold==null)s.settings.approveThreshold=0; if(s.settings.notify==null)s.settings.notify=false;
    ["incomes","expenses","goals","wishes","tasks","events","links","notes","folders","items","projects","subprojects"].forEach(k=>{if(!Array.isArray(s[k]))s[k]=[]});
    s.sim=s.sim||{current:0,monthly:"",bonus:0,years:10,events:[]}; if(!Array.isArray(s.sim.events))s.sim.events=[];
    s.customCats=s.customCats||{}; ["fixed","variable","task","income","wish"].forEach(g=>{if(!Array.isArray(s.customCats[g]))s.customCats[g]=[]});
    s.incomes.forEach(i=>{if(!i.date)i.date=(i.month||thisMonth())+"-01";i.month=i.date.slice(0,7);});
    s.expenses.forEach(e=>{if(!e.date)e.date=(e.month||thisMonth())+"-01";e.month=e.date.slice(0,7);});
    // ж—§гғҗгғјгӮёгғ§гғі(гӮ„гӮҠгҒҹгҒ„/гғӘгғігӮҜ)гҒӢгӮүгғ•гӮ©гғ«гғҖж§ӢйҖ гҒёиҮӘеӢ•з§»иЎҢ
    if(!s._foldersMigrated){

        const c=findCat("wish",w.cat);const f=ensure(c.label||"гӮ„гӮҠгҒҹгҒ„гҒ“гҒЁ",c.icon||"рҹҢҹ");

      if((s.links||[]).length){const f=ensure("гӮҲгҒҸдҪҝгҒҶгӮөгӮӨгғҲ","рҹ”—");
        s.links.forEach(l=>s.items.push({id:uid(),folderId:f.id,title:l.name||l.url||"гӮөгӮӨгғҲ",url:l.url||"",memo:l.memo||"",loginId:l.loginId||"",password:l.password||"",target:0,current:0,date:"",done:false}));
      }
      s.wishes=[];s.links=[];s._foldersMigrated=true;
    }

  /* ============== DASHBOARD ============== */
  metrics(month){
    const inc=this.state.incomes.filter(i=>i.month===month);
    const exp=this.state.expenses.filter(e=>e.month===month);
    const manualIncome=inc.reduce((a,b)=>a+(+b.amount||0),0);
    const fixed=exp.filter(e=>e.type==="fixed").reduce((a,b)=>a+(+b.amount||0),0);
    const variable=exp.filter(e=>e.type==="variable").reduce((a,b)=>a+(+b.amount||0),0);
    const evConfirmed=this.eventExpense(month,"confirmed");
    const evPlanned=this.eventExpense(month,"planned");
    const evIncConfirmed=this.eventIncome(month,"confirmed");
    const evIncPlanned=this.eventIncome(month,"planned");
    const totalIncome=manualIncome+evIncConfirmed; // зўәе®ҡеҸҺе…Ҙ(е…ҘйҮ‘жёҲгҒ®дәҲе®ҡгӮ’еҗ«гӮҖ)
    const totalExpense=fixed+variable+evConfirmed; // зўәе®ҡж”ҜеҮә
    const planned=evPlanned;                       // гҒ“гӮҢгҒӢгӮүж”Ҝжү•гҒҶдәҲе®ҡ
    const plannedIncome=evIncPlanned;              // гҒ“гӮҢгҒӢгӮүе…ҘгӮӢдәҲе®ҡ
    const balance=totalIncome-totalExpense;         // ж®ӢгӮҠ(зўәе®ҡгғҷгғјгӮ№)
    const afterPlanned=totalIncome-totalExpense-planned+plannedIncome; // жңҲжң«иҰӢиҫјгҒҝ
    const savingsRate=totalIncome>0?(balance/totalIncome*100):0;
    const hInc=inc.filter(i=>i.owner==="husband").reduce((a,b)=>a+(+b.amount||0),0);
    const wInc=inc.filter(i=>i.owner==="wife").reduce((a,b)=>a+(+b.amount||0),0);
    const oInc=manualIncome-hInc-wInc;
    return {totalIncome,manualIncome,fixed,variable,evConfirmed,evIncConfirmed,planned,plannedIncome,totalExpense,balance,afterPlanned,savingsRate,hInc,wInc,oInc,inc,exp};
  },
  // гӮ«гғ¬гғігғҖгғјгҒ®йҮ‘йЎҚе…ҘгӮҠдәҲе®ҡгӮ’йӣҶиЁҲгҖӮisIncome=false:ж”ҜеҮә(дәҲе®ҡ/ж”Ҝжү•гҒ„)гҖҒtrue:е…ҘйҮ‘гҖӮmode:'confirmed'(ж—Ҙд»ҳеҲ°жқҘ)/'planned'(жңӘжқҘ)
  eventSum(month,mode,isIncome){
    const today=todayStr(); let sum=0;
    this.state.events.forEach(e=>{const isInc=e.type==="income";if(e.amount>0&&isInc===isIncome)this.eventDatesInMonth(e,month).forEach(ds=>{const past=ds<=today;if(mode==="confirmed"&&!past)return;if(mode==="planned"&&past)return;sum+=(+e.amount||0);});});
    return sum;
  },
  eventList(month,mode,isIncome){
    const today=todayStr(),list=[];
    this.state.events.forEach(e=>{const isInc=e.type==="income";if(e.amount>0&&isInc===isIncome){const hit=this.eventDatesInMonth(e,month).filter(d=>{const past=d<=today;if(mode==="confirmed"&&!past)return false;if(mode==="planned"&&past)return false;return true;});if(hit.length)list.push({id:e.id,title:e.title,n:hit.length,sum:hit.length*(+e.amount||0),next:hit.sort()[0]});}});
    return list.sort((a,b)=>b.sum-a.sum);
  },
  remindersWithin(days){
    const today=todayStr(),end=addDaysStr(today,days);
    const months=[today.slice(0,7)];if(end.slice(0,7)!==months[0])months.push(end.slice(0,7));
    const out=[];
    this.state.events.forEach(e=>{const kind=e.type==="income"?"income":(e.type==="payment"?"payment":"event");months.forEach(mo=>this.eventDatesInMonth(e,mo).forEach(ds=>{if(ds>=today&&ds<=end)out.push({date:ds,kind,title:e.title,amount:e.amount||0});}));});
    this.state.tasks.forEach(t=>{if(t.due&&t.status!=="done"&&t.due>=today&&t.due<=end)out.push({date:t.due,kind:"task",title:t.title,amount:0});});
    return out.sort((a,b)=>a.date<b.date?-1:1);
  },

    c.toBlob((blob)=>{

  /* ============== гғ©гӮӨгғ•гғ—гғ©гғігғ»гӮ·гғҹгғҘгғ¬гғјгӮҝгғј ============== */
  simProjection(){
    const sim=this.state.sim;
    const monthly=(sim.monthly!==""&&sim.monthly!=null)?(+String(sim.monthly).replace(/[^0-9.]/g,"")||0):Math.max(0,this.metrics(thisMonth()).balance);
    const bonus=+String(sim.bonus).replace(/[^0-9.]/g,"")||0;
    const years=+sim.years||10;
    let bal=+String(sim.current).replace(/[^0-9.]/g,"")||0;
    const rows=[{year:0,label:"зҸҫеңЁ",bal,events:[]}];
    for(let y=1;y<=years;y++){
      bal+=monthly*12+bonus;
      const evs=(sim.events||[]).filter(e=>+e.after===y);
      evs.forEach(e=>{bal+=(e.kind==="income"?+e.amount:-(+e.amount))||0;});
      rows.push({year:y,label:y+"е№ҙеҫҢ",bal,events:evs});
    }
    return {monthly,bonus,years,rows};
  },
  setSim(k,v){this.state.sim[k]=(k==="years")?(+v):String(v).replace(/[^0-9.]/g,"");this.commit();},

  /* ============== CALENDAR ============== */
  view_calendar(){
    const[y,mo]=this.calMonth.split("-").map(Number);
    const first=new Date(y,mo-1,1), startDow=first.getDay();
    const days=new Date(y,mo,0).getDate();
    const prevDays=new Date(y,mo-1,0).getDate();
    const items=this.calItems();
    let h='<div class="card"><div class="row" style="margin-bottom:6px"><span onclick="App.shiftCal(-1)" style="cursor:pointer;font-size:22px;padding:0 10px;color:var(--color-primary-600)">вҖ№</span>'+
      '<strong class="num" onclick="App.openCalPicker()" style="font-size:var(--text-lg);cursor:pointer;padding:5px 14px;border-radius:var(--radius-full);background:var(--color-primary-50);color:var(--color-primary-700)">'+monthLabel(this.calMonth)+' в–ҫ</strong>'+
      '<span onclick="App.shiftCal(1)" style="cursor:pointer;font-size:22px;padding:0 10px;color:var(--color-primary-600)">вҖә</span></div>';
    h+='<div class="cal-grid">'+["ж—Ҙ","жңҲ","зҒ«","ж°ҙ","жңЁ","йҮ‘","еңҹ"].map((d,i)=>'<div class="cal-dow '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>').join("");
    let cells=[];
    for(let i=startDow-1;i>=0;i--)cells.push({d:prevDays-i,muted:true});
    for(let d=1;d<=days;d++)cells.push({d,muted:false});
    while(cells.length%7!==0)cells.push({d:cells.length-(startDow+days)+1,muted:true});
    cells.forEach((c,idx)=>{
      const dow=idx%7;
      if(c.muted){h+='<div class="cal-cell muted">'+c.d+'</div>';return;}
      const ds=this.calMonth+"-"+String(c.d).padStart(2,"0");
      const dayItems=items[ds]||[];
      const today=ds===todayStr();
      const types=[...new Set(dayItems.map(x=>x.t))];
      let dots=types.slice(0,4).map(t=>'<span class="cdot cd-'+t+'"></span>').join("");
      h+='<div class="cal-cell '+(today?'today':'')+' '+(dow===0?'sun':dow===6?'sat':'')+'" onclick="App.openDay(\''+ds+'\')">'+c.d+'<div class="cal-dots">'+dots+'</div></div>';
    });
    h+='</div><div class="legend"><span><span class="cdot cd-income"></span>е…ҘйҮ‘</span><span><span class="cdot cd-pay"></span>ж”Ҝжү•гҒ„</span><span><span class="cdot cd-task"></span>гӮҝгӮ№гӮҜ</span><span><span class="cdot cd-event"></span>дәҲе®ҡ</span><span><span class="cdot cd-wish"></span>зӣ®жЁҷжҷӮжңҹ</span></div></div>';
    // гҒ“гҒ®жңҲгҒ®дәҲе®ҡгғӘгӮ№гғҲ
    h+='<div class="section-title">'+monthLabel(this.calMonth)+'гҒ®дәҲе®ҡ<span class="link" onclick="App.openEvent()">пјӢ дәҲе®ҡиҝҪеҠ </span></div><div class="card">';
    const flat=[];
    Object.keys(items).forEach(d=>{if(d.slice(0,7)===this.calMonth)items[d].forEach(it=>flat.push({...it,date:d}))});
    flat.sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:((a.start||"")<(b.start||"")?-1:1)));
    if(!flat.length)h+='<div class="empty"><span class="e-ic">рҹ“…</span>гҒ“гҒ®жңҲгҒ®дәҲе®ҡгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
    flat.slice(0,50).forEach(it=>{
      h+='<div class="li" '+(it.onclick?('onclick="'+it.onclick+'" style="cursor:pointer"'):'')+'><span class="ic">'+it.icon+'</span><div class="main"><div class="ttl">'+esc(it.title)+'</div><div class="meta num">'+it.date.replace(/-/g,"/")+'</div></div>'+(it.amount?'<span class="amt">'+yen(it.amount)+'</span>':'')+'</div>';
    });
    h+='</div>';
    // гҒ“гҒ®жңҲгҒ®гӮ«гғҶгӮҙгғӘеҲҘж”ҜеҮә
    const exp=this.state.expenses.filter(e=>e.month===this.calMonth);
    const evExp=this.eventExpense(this.calMonth,"confirmed"), evN=this.eventExpenseList(this.calMonth,"confirmed").reduce((s,x)=>s+x.n,0);
    if(exp.length||evExp>0){
      const byCat={};exp.forEach(e=>{const see=this.seeDetail(e);const key=see?e.catId:"__priv";const c=findCat(e.type==="fixed"?"fixed":"variable",e.catId);if(!byCat[key])byCat[key]=see?{icon:c.icon,label:c.label,sum:0,n:0}:{icon:"рҹ”’",label:"еҖӢдәәж”ҜеҮә",sum:0,n:0};byCat[key].sum+=(+e.amount||0);byCat[key].n++;});
      const arr=Object.values(byCat).sort((a,b)=>b.sum-a.sum);
      if(evExp>0)arr.push({icon:"рҹ“…",label:"дәҲе®ҡгғ»ж”Ҝжү•гҒ„(жёҲ)",sum:evExp,n:evN});
      arr.sort((a,b)=>b.sum-a.sum);
      const total=arr.reduce((s,x)=>s+x.sum,0);
      h+='<div class="section-title">гӮ«гғҶгӮҙгғӘеҲҘж”ҜеҮә<span class="num" style="font-weight:700;color:var(--color-primary-600)">'+yen(total)+'</span></div><div class="card">';
      arr.forEach(c=>{const pct=total>0?Math.round(c.sum/total*100):0;h+='<div class="li"><span class="ic">'+c.icon+'</span><div class="main"><div class="ttl">'+esc(c.label)+' <span class="meta">'+c.n+'д»¶</span></div><div class="prog"><span class="fill-primary" style="width:'+pct+'%"></span></div></div><div style="text-align:right"><div class="amt">'+yen(c.sum)+'</div><div class="meta num">'+pct+'%</div></div></div>';});
      h+='</div>';
    }
    return h;
  },
  calItems(ym){
    ym=ym||this.calMonth;
    const map={};
    const add=(date,obj)=>{if(!date)return;(map[date]=map[date]||[]).push(obj)};
    this.state.tasks.forEach(t=>{if(t.due&&t.status!=="done"){const c=findCat("task",t.cat);add(t.due,{t:"task",icon:c.icon,title:t.title,onclick:"App.openTask('"+t.id+"')"})}});
    this.state.events.forEach(e=>{const tm=e.start?(e.start+(e.end?"гҖң"+e.end:"")+" "):"";const rec=(e.recurrence&&e.recurrence!=="none")?" рҹ”Ғ":"";const t=e.type==="income"?"income":(e.type==="payment"?"pay":"event");const icon=e.type==="income"?"рҹ’°":(e.type==="payment"?"рҹ’ҙ":"рҹ“Ң");this.eventDatesInMonth(e,ym).forEach(ds=>add(ds,{t,icon,title:tm+e.title+rec,amount:e.amount,start:e.start||"",onclick:"App.openEvent('"+e.id+"')"}))});
    this.state.expenses.forEach(e=>{if(e.date){const c=findCat(e.type==="fixed"?"fixed":"variable",e.catId);add(e.date,{t:"pay",icon:c.icon,title:(e.label||c.label)+(e.sub?"гғ»"+e.sub:""),amount:e.amount,start:"",onclick:"App.openExpense('"+e.id+"')"})}});
    this.state.items.forEach(w=>{if(w.date&&w.date.length===7&&!w.done&&w.target>0){const f=this.state.folders.find(x=>x.id===w.folderId);add(w.date+"-01",{t:"wish",icon:f?f.icon:"вңЁ",title:"зӣ®жЁҷ: "+w.title,start:"",onclick:"App.openItem('"+w.id+"')"})}});
    Object.keys(map).forEach(d=>map[d].sort((a,b)=>(a.start||"")<(b.start||"")?-1:1));
    return map;
  },
  eventDatesInMonth(e,ym){
    if(!e.date)return [];
    const [y,m]=ym.split("-").map(Number);
    const r=e.recurrence||"none";
    const b=e.date.split("-").map(Number);
    if(r==="none")return e.date.slice(0,7)===ym?[e.date]:[];
    const baseT=new Date(b[0],b[1]-1,b[2]).getTime();
    const baseDow=new Date(b[0],b[1]-1,b[2]).getDay();
    const baseNth=Math.ceil(b[2]/7);
    const res=[],daysInM=new Date(y,m,0).getDate();
    for(let d=1;d<=daysInM;d++){
      const dt=new Date(y,m-1,d);if(dt.getTime()<baseT)continue;
      let ok=false;
      if(r==="weekly")ok=dt.getDay()===baseDow;
      else if(r==="monthly_date")ok=d===b[2];
      else if(r==="monthly_nth")ok=dt.getDay()===baseDow&&Math.ceil(d/7)===baseNth;
      else if(r==="yearly")ok=(m===b[1]&&d===b[2]);
      if(ok)res.push(ym+"-"+pad2(d));
    }
    return res;
  },
  openCalPicker(){const [y]=this.calMonth.split("-").map(Number);this._pickY=y;this.showSheet(this.calPickerHtml());},

  setName(k,v){this.state.settings[k]=v||(k==="husband"?"еӨ«":"еҰ»");this.commit();},
  setApproveThreshold(v){this.state.settings.approveThreshold=+String(v).replace(/[^0-9.]/g,"")||0;this.save(true);},
  setTheme(v){this.state.settings.theme=v;this.applyTheme();this.save();},
  applyTheme(){
    const t=this.state.settings.theme;
    if(t==="auto"){const dark=matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",dark?"dark":"light");}
    else document.documentElement.setAttribute("data-theme",t);
  },

  /* ============== Sheets / Forms ============== */
  showSheet(html){
    const sh=document.getElementById("sheet");
    sh.innerHTML='<div class="grip"></div><button class="sheet-close" onclick="App.closeSheet()" aria-label="й–үгҒҳгӮӢ">вң•</button>'+html;
    document.getElementById("scrim").classList.add("show");
    document.body.classList.add("noscroll");
    requestAnimationFrame(()=>{sh.classList.add("show");sh.scrollTop=0;});
  },
  closeSheet(){document.getElementById("sheet").classList.remove("show");document.getElementById("scrim").classList.remove("show");document.body.classList.remove("noscroll");},
  fabAction(){
    if(this.tab==="dashboard")this.openExpense();
    else if(this.tab==="tasks"){if(this.taskView==="sub")this.openTask(null,this.curSubId);else if(this.taskView==="project")this.openSubForm();else this.openTask();}
    else if(this.tab==="calendar")this.openEvent();
    else if(this.tab==="share"){if(this.shareView==="notes")this.openNote();else if(this.shareView==="folder")this.openItem(null,this.curFolderId);else this.openFolderForm();}
  },
  field(label,inner){return '<label class="fld"><span class="lbl">'+label+'</span>'+inner+'</label>';},
  opts(group,sel,allowAdd){let h=allCats(group).map(c=>'<option value="'+c.id+'" '+(c.id===sel?"selected":"")+'>'+c.icon+' '+c.label+'</option>').join("");if(allowAdd)h+='<option value="__add__">пјӢ ж–°гҒ—гҒ„гӮ«гғҶгӮҙгғӘгӮ’иҝҪеҠ вҖҰ</option>';return h;},
  addCat(group,selectId){
    const sel=document.getElementById(selectId);
    const name=(prompt("ж–°гҒ—гҒ„гӮ«гғҶгӮҙгғӘеҗҚгӮ’е…ҘеҠӣ\n(дҫӢ: гӮігғігғ“гғӢ / еӨ–йЈҹ / гҒөгӮӢгҒ•гҒЁзҙҚзЁҺ)")||"").trim();
    if(!name){if(sel&&sel.options.length)sel.value=sel.options[0].value;return;}
    let icon=(prompt("гӮўгӮӨгӮігғі(зөөж–Үеӯ—гӮ’1гҒӨгҖӮз©әж¬„еҸҜ)","рҹҸ·пёҸ")||"").trim();if(!icon)icon="рҹҸ·пёҸ";
    const id="custom_"+group+"_"+uid().slice(0,8);
    this.state.customCats[group].push({id,label:name,icon});

    if(sel){sel.innerHTML=this.opts(group,id,true);sel.value=id;}

  delCat(group,id){if(!confirm("гҒ“гҒ®гӮ«гғҶгӮҙгғӘгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢ?\n(йҒҺеҺ»гҒ«иЁҳйҢІгҒ—гҒҹйҮ‘йЎҚгғҮгғјгӮҝгҒҜж®ӢгӮҠгҒҫгҒҷ)"))return;this.state.customCats[group]=this.state.customCats[group].filter(c=>c.id!==id);this.commit();this.toast("еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ");},

  gcalUrl(ev){
    const d=ev.date.replace(/-/g,"");
    let dates;
    if(ev.start){const st=ev.start.replace(":","")+"00";const en=(ev.end||ev.start).replace(":","")+"00";dates=d+"T"+st+"/"+d+"T"+en;}
    else{dates=d+"/"+addDay(ev.date);}
    let u="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(ev.title)+"&dates="+dates;
    if(ev.loc)u+="&location="+encodeURIComponent(ev.loc);
    if(ev.amount)u+="&details="+encodeURIComponent("йҮ‘йЎҚ: "+yen(ev.amount));
    return u;
  },

  /* ============== SUPABASE SYNC ============== */
  /* ===== гӮҜгғ©гӮҰгғү(гғӯгӮ°гӮӨгғігғ»дё–еёҜе…ұжңү) ===== */
  async loadSb(){
    if(window.supabase&&window.supabase.createClient)return;
    await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  },
  async initCloud(){
    if(!APP_CONFIG.url||!APP_CONFIG.key)return; // гғӯгғјгӮ«гғ«гҒ®гҒҝ
    try{
      await this.loadSb();
      this._client=window.supabase.createClient(APP_CONFIG.url,APP_CONFIG.key,{auth:{persistSession:true,autoRefreshToken:true}});
      const {data:{session}}=await this._client.auth.getSession();
      if(session&&session.user){this._user=session.user;await this.afterAuth();}
      else{this.showAuth();}
    }catch(e){console.error(e);this.toast("жҺҘз¶ҡгҒ«е•ҸйЎҢгҒҢзҷәз”ҹгҒ—гҒҫгҒ—гҒҹ");}
  },
  async doAuth(mode){
    const email=val("au-email"),pw=val("au-pw");
    if(!email||!pw){this.toast("гғЎгғјгғ«гҒЁгғ‘гӮ№гғҜгғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");return;}
    if(pw.length<6){this.toast("гғ‘гӮ№гғҜгғјгғүгҒҜ6ж–Үеӯ—д»ҘдёҠгҒ«гҒ—гҒҰгҒҸгҒ гҒ•гҒ„");return;}
    try{
      const r=mode==="signup"?await this._client.auth.signUp({email,password:pw}):await this._client.auth.signInWithPassword({email,password:pw});
      if(r.error){this.toast(r.error.message||"иӘҚиЁјгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");return;}
      if(!r.data.session){this.toast("зўәиӘҚгғЎгғјгғ«гӮ’йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹгҖӮгғЎгғјгғ«гҒ®гғӘгғігӮҜгӮ’й–ӢгҒ„гҒҰгҒӢгӮүеҶҚеәҰгғӯгӮ°гӮӨгғігҒ—гҒҰгҒҸгҒ гҒ•гҒ„");return;}
      this._user=r.data.user;await this.afterAuth();
    }catch(e){console.error(e);this.toast("иӘҚиЁјгӮЁгғ©гғј");}
  },
  async doLogout(){try{await this._client.auth.signOut();}catch(e){} if(this._channel){this._client.removeChannel(this._channel);this._channel=null;} this._user=null;this.householdId=null;this._syncStatus="off";this._authView="login";this.showAuth();},
  switchAuth(v){this._authView=v;this.showAuth();},
  async afterAuth(){
    try{
      const{data:mem,error}=await this._client.from("members").select("household_id").limit(1);
      if(error)throw error;
      if(mem&&mem.length){this.householdId=mem[0].household_id;await this.loadCloud();this.hideAuth();}
      else{this._authView="household";this.showAuth();}
    }catch(e){console.error(e);this.toast("иӘӯгҒҝиҫјгҒҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");}
  },
  async createHousehold(){try{const{data,error}=await this._client.rpc("create_household");if(error)throw error;this.householdId=data;await this.loadCloud();this.hideAuth();this.toast("гҒҜгҒҳгӮҒгҒҫгҒ—гӮҮгҒҶ!");}catch(e){console.error(e);this.toast("дҪңжҲҗгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");}},
  async joinHousehold(code){code=(code||"").trim();if(!code){this.toast("жӢӣеҫ…гӮігғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");return;}try{const{data,error}=await this._client.rpc("join_household",{p_code:code});if(error)throw error;this.householdId=data;await this.loadCloud();this.hideAuth();this.toast("еҸӮеҠ гҒ—гҒҫгҒ—гҒҹ!");}catch(e){console.error(e);this.toast("жӢӣеҫ…гӮігғјгғүгҒҢжӯЈгҒ—гҒҸгҒӮгӮҠгҒҫгҒӣгӮ“");}},
  async loadCloud(){
    try{
      const{data,error}=await this._client.from("app_state").select("data,invite_code").eq("household_id",this.householdId).maybeSingle();
      if(error)throw error;
      this._inviteCode=data?(data.invite_code||""):"";
      if(data&&data.data&&Object.keys(data.data).length){
        this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan",JSON.stringify(this.state));this.applyTheme();
      }else{
        await this.pushNow(); // еҲқеӣһ: д»ҠгҒ®гғҮгғјгӮҝгӮ’гӮҜгғ©гӮҰгғүгҒё
      }
      this._syncStatus="on";
      this.subscribeRealtime();
      this.render();
    }catch(e){console.error(e);this._syncStatus="err";this.render();}
  },
  subscribeRealtime(){
    if(this._channel)this._client.removeChannel(this._channel);
    this._channel=this._client.channel("hh-"+this.householdId)
      .on("postgres_changes",{event:"*",schema:"public",table:"app_state",filter:"household_id=eq."+this.householdId},payload=>{
        const nd=payload.new;if(!nd||!nd.data)return;if(nd.updated_at===this._lastPushed)return;
        this.state=nd.data;this.normalize();localStorage.setItem("imaoka_lifeplan",JSON.stringify(this.state));this.applyTheme();this.render();
      }).subscribe();
  },
  queueCloudPush(){clearTimeout(this._pushTimer);this._pushTimer=setTimeout(()=>this.pushNow(),700);},
  async pushNow(){
    if(!this._client||!this.householdId)return;
    const ts=new Date().toISOString();this._lastPushed=ts;
    const payload=JSON.parse(JSON.stringify(this.state));
    try{const{error}=await this._client.from("app_state").update({data:payload,updated_at:ts}).eq("household_id",this.householdId);if(error)throw error;if(this._syncStatus!=="on"){this._syncStatus="on";this.render();}}catch(e){console.error(e);this._syncStatus="err";}
  },
  /* ---- иӘҚиЁјгӮӘгғјгғҗгғјгғ¬гӮӨ ---- */
  showAuth(){let el=document.getElementById("authwrap");if(!el){el=document.createElement("div");el.id="authwrap";el.className="authwrap";document.body.appendChild(el);}el.style.display="flex";el.innerHTML=this.authHtml();},
  hideAuth(){const el=document.getElementById("authwrap");if(el)el.style.display="none";},
  authHtml(){
    if(this._authView==="household"){
      return '<div class="authcard"><div style="text-align:center;font-size:34px">рҹ‘«</div><h2 style="text-align:center;margin:6px 0 4px">гғҡгӮўгӮ’иЁӯе®ҡ</h2><p class="muted" style="text-align:center;margin:0 0 18px">ж–°гҒ—гҒҸе§ӢгӮҒгӮӢгҒӢгҖҒгғ‘гғјгғҲгғҠгғјгҒ®жӢӣеҫ…гӮігғјгғүгҒ§еҸӮеҠ гҒ—гҒҫгҒҷ</p>'+
        '<button class="btn btn-primary btn-block" onclick="App.createHousehold()">ж–°гҒ—гҒҸе®¶иЁҲгӮ’е§ӢгӮҒгӮӢ</button>'+
        '<div class="muted" style="text-align:center;margin:14px 0 10px">вҖ• гҒҫгҒҹгҒҜ вҖ•</div>'+
        '<input id="au-code" placeholder="жӢӣеҫ…гӮігғјгғү(6ж–Үеӯ—)" autocapitalize="characters" style="text-align:center;letter-spacing:2px;text-transform:uppercase">'+
        '<button class="btn btn-sec btn-block" style="margin-top:8px" onclick="App.joinHousehold(document.getElementById(\'au-code\').value)">жӢӣеҫ…гӮігғјгғүгҒ§еҸӮеҠ </button>'+
        '<div style="text-align:center;margin-top:16px"><span class="link" onclick="App.doLogout()">гғӯгӮ°гӮўгӮҰгғҲ</span></div></div>';
    }
    const su=this._authView==="signup";
    return '<div class="authcard"><div class="my-brand">'+
      '<img class="ic" src="icon-192.png" alt="make your life." />'+
      '<h2 class="my-wordmark">make your life<span style="color:var(--color-accent-500)">.</span></h2>'+
      '<p class="my-tag">еӨ«е©ҰгҒ§гҖҒгҒ“гӮҢгҒӢгӮүгҒ®жҡ®гӮүгҒ—гӮ’гҖӮ</p></div>'+
      '<label class="fld"><span class="lbl">гғЎгғјгғ«гӮўгғүгғ¬гӮ№</span><input id="au-email" type="email" inputmode="email" autocapitalize="off" placeholder="you@example.com"></label>'+
      '<label class="fld"><span class="lbl">гғ‘гӮ№гғҜгғјгғү</span><input id="au-pw" type="password" placeholder="6ж–Үеӯ—д»ҘдёҠ"></label>'+
      '<button class="btn btn-primary btn-block" onclick="App.doAuth(\''+(su?"signup":"login")+'\')">'+(su?"ж–°иҰҸзҷ»йҢІ":"гғӯгӮ°гӮӨгғі")+'</button>'+
      '<div style="text-align:center;margin-top:16px"><span class="link" onclick="App.switchAuth(\''+(su?"login":"signup")+'\')">'+(su?"гҒҷгҒ§гҒ«гӮўгӮ«гӮҰгғігғҲгҒҢгҒӮгӮӢ вҶ’ гғӯгӮ°гӮӨгғі":"гҒҜгҒҳгӮҒгҒҰгҒ®ж–№ вҶ’ ж–°иҰҸзҷ»йҢІ")+'</span></div></div>';
  }
};
// helpers used inside form callbacks
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function seg(id){const el=document.getElementById(id);const on=el&&el.querySelector("button.on");return on?on.dataset.v:"";}
function numv(id){const el=document.getElementById(id);if(!el)return 0;return +String(el.value).replace(/[^0-9.]/g,"")||0;}
function cf(n){n=+n||0;return n?n.toLocaleString("en-US"):"";}
function domainOf(url){if(!url)return "";try{let u=url;if(!/^https?:\/\//i.test(u))u="https://"+u;return new URL(u).hostname.replace(/^www\./,"");}catch(e){return "";}}
function pad2(n){return String(n).padStart(2,"0");}
function addDay(ymd){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+1);return ""+dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate());}
function addDaysStr(ymd,n){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+n);return dt.getFullYear()+"-"+pad2(dt.getMonth()+1)+"-"+pad2(dt.getDate());}
function readImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=1280;let w=img.width,h=img.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);try{cb(c.toDataURL("image/jpeg",0.72));}catch(e){cb(r.result);}};img.src=r.result;};r.readAsDataURL(file);}

matchMedia("(prefers-color-scheme:dark)").addEventListener("change",()=>{if(App.state&&App.state.settings.theme==="auto")App.applyTheme();});
App.init();

/* service worker for installable PWA (optional, ignored if file missing) */
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
