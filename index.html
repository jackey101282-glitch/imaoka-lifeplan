  async createHousehold(mode){
    if(this._onbTest){this._onbTest=false;if(this.state&&this.state.settings)this.state.settings.spaceMode=(mode==="solo"?"solo":"couple");this.hideAuth();this.go("dashboard");this.startFunnel(true,mode);return;}
    try{const{data,error}=await this._client.rpc("create_household");if(error)throw error;this.householdId=data;this.state=seedState();if(this.state.settings)this.state.settings.spaceMode=(mode==="solo"?"solo":"couple");this.normalize();await this.loadCloud();this._pendingInvite="";if(mode==="solo"){this.finishInvite();}else{this._authView="invite";this.showAuth();}}catch(e){console.error(e);this.toast("дҪңжҲҗгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");}},
  async joinHousehold(code){code=(code||"").trim();if(!code){this.toast("жӢӣеҫ…гӮігғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");return false;}try{const{data,error}=await this._client.rpc("join_household",{p_code:code});if(error)throw error;this.householdId=data;await this.loadCloud();this._pendingInvite="";try{history.replaceState(null,"",location.origin+location.pathname);}catch(e){}this.hideAuth();this.toast("еҸӮеҠ гҒ—гҒҫгҒ—гҒҹ!");return true;}catch(e){console.error(e);this.toast("жӢӣеҫ…гӮігғјгғүгҒҢжӯЈгҒ—гҒҸгҒӮгӮҠгҒҫгҒӣгӮ“");return false;}},
  async regenInviteCode(){if(!this._client||!this.householdId){this.toast("еҶҚзҷәиЎҢгҒ§гҒҚгҒҫгҒӣгӮ“");return;}if(!confirm("жӢӣеҫ…гӮігғјгғүгӮ’еҶҚзҷәиЎҢгҒ—гҒҫгҒҷгҒӢ?\nд»ҠгҒ®гӮігғјгғүгҒҜз„ЎеҠ№гҒ«гҒӘгӮҠгҖҒгҒҷгҒ§гҒ«дјқгҒҲгҒҹзӣёжүӢгҒҜгҒқгҒ®гӮігғјгғүгҒ§гҒҜеҸӮеҠ гҒ§гҒҚгҒӘгҒҸгҒӘгӮҠгҒҫгҒҷгҖӮ"))return;try{const{data,error}=await this._client.rpc("regenerate_invite_code");if(error)throw error;this._inviteCode=data||"";this.render();this.toast("жӢӣеҫ…гӮігғјгғүгӮ’еҶҚзҷәиЎҢгҒ—гҒҫгҒ—гҒҹ");}catch(e){console.error(e);this.toast("еҶҚзҷәиЎҢгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ");}},
  async loadCloud(){
    try{
      const{data,error}=await this._client.from("app_state").select("data,invite_code").eq("household_id",this.householdId).maybeSingle();
      if(error)throw error;
      this._inviteCode=data?(data.invite_code||""):"";
      if(data&&data.data&&Object.keys(data.data).length){
        this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan",JSON.stringify(this.state));this.applyTheme();
      }else{
        await this.pushNow(); // еҲқеӣһ: д»ҠгҒ®гғҮгғјгӮҝгӮ’гӮҜгғ©гӮҰгғүгҒё
      }
      this._syncStatus="on";
      try{localStorage.setItem("imaoka_owner",this.householdId);}catch(e){}
      this.subscribeRealtime();
      this.render();
    }catch(e){console.error(e);this._syncStatus="err";this.render();}
  },
  // гӮҜгғ©гӮҰгғүгҒӢгӮүжңҖж–°гӮ’еҸ–еҫ—гҒ—гҒҰеҸҚжҳ (гғӘгӮўгғ«гӮҝгӮӨгғ гҒ®еҸ–гӮҠгҒ“гҒјгҒ—еҜҫзӯ–гғ»гӮҝгғ–еҫ©её°жҷӮгҒӘгҒ©)
  async pullLatest(){
    if(!this._client||!this.householdId)return;
    try{
      const{data,error}=await this._client.from("app_state").select("data,updated_at").eq("household_id",this.householdId).maybeSingle();
      if(error||!data||!data.data||!Object.keys(data.data).length)return;
      if(data.updated_at===this._lastPushed)return; // иҮӘеҲҶгҒҢзӣҙеүҚгҒ«йҖҒгҒЈгҒҹжӣҙж–°
      if(this._lastApplied&&data.updated_at&&data.updated_at<=this._lastApplied)return;
      this._lastApplied=data.updated_at;
      this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan",JSON.stringify(this.state));this.applyTheme();this.render();
    }catch(e){}
  },
  subscribeRealtime(){
    if(this._channel)this._client.removeChannel(this._channel);
    this._channel=this._client.channel("hh-"+this.householdId)
      .on("postgres_changes",{event:"*",schema:"public",table:"app_state",filter:"household_id=eq."+this.householdId},payload=>{
        const nd=payload.new;if(!nd||!nd.data)return;if(nd.updated_at===this._lastPushed)return;
        this._lastApplied=nd.updated_at;
        this.state=nd.data;this.normalize();localStorage.setItem("imaoka_lifeplan",JSON.stringify(this.state));this.applyTheme();this.render();
      }).subscribe((status)=>{ if(status==="SUBSCRIBED")this.pullLatest(); });
  },
  queueCloudPush(){clearTimeout(this._pushTimer);this._pushTimer=setTimeout(()=>this.pushNow(),700);},
  async pushNow(){
    if(!this._client||!this.householdId)return;
    const ts=new Date().toISOString();this._lastPushed=ts;
    const payload=JSON.parse(JSON.stringify(this.state));
    try{const{error}=await this._client.from("app_state").update({data:payload,updated_at:ts}).eq("household_id",this.householdId);if(error)throw error;try{localStorage.setItem("imaoka_owner",this.householdId);}catch(e){}if(this._syncStatus!=="on"){this._syncStatus="on";this.render();}}catch(e){console.error(e);this._syncStatus="err";}
  },
  /* ---- иӘҚиЁјгӮӘгғјгғҗгғјгғ¬гӮӨ ---- */
  showAuth(){let el=document.getElementById("authwrap");if(!el){el=document.createElement("div");el.id="authwrap";el.className="authwrap";document.body.appendChild(el);}el.style.display="flex";el.innerHTML=this.authHtml();},
  hideAuth(){const el=document.getElementById("authwrap");if(el)el.style.display="none";},

  async shareInvite(){const url=this.inviteUrl();const text="MiettaгҒ§гҒөгҒҹгӮҠгҒ®гӮ№гғҡгғјгӮ№гӮ’дҪңгӮҠгҒҫгҒ—гҒҹгҖӮгҒ“гҒ®гғӘгғігӮҜгҒӢгӮүеҸӮеҠ гҒ—гҒҰгҒӯпјҒ\n"+url;try{if(navigator.share){await navigator.share({title:"Mietta жӢӣеҫ…",text});}else{this.copy(url);}}catch(e){}},
  authHtml(){

      const code=this._inviteCode||"",url=this.inviteUrl(code);

        '<input id="au-code" value="'+esc(this._pendingInvite||"")+'" placeholder="жӢӣеҫ…гӮігғјгғү(6ж–Үеӯ—)" autocapitalize="characters" style="text-align:center;letter-spacing:2px;text-transform:uppercase">'+
        '<button class="btn btn-sec btn-block" style="margin-top:8px" onclick="App.joinHousehold(document.getElementById(\'au-code\').value)">жӢӣеҫ…гӮігғјгғүгҒ§еҸӮеҠ </button>'+

    if(this._authView==="household"){
      return '<div class="authcard"><div style="text-align:center;color:var(--color-primary-500);margin-bottom:6px">'+ic('users',40)+'</div><h2 style="text-align:center;margin:0 0 4px">гғҡгӮўгӮ’иЁӯе®ҡ</h2><p class="muted" style="text-align:center;margin:0 0 18px">ж–°гҒ—гҒҸе§ӢгӮҒгӮӢгҒӢгҖҒгғ‘гғјгғҲгғҠгғјгҒ®жӢӣеҫ…гӮігғјгғүгҒ§еҸӮеҠ гҒ—гҒҫгҒҷ</p>'+
        '<button class="btn btn-primary btn-block" onclick="App.createHousehold()">ж–°гҒ—гҒҸгӮ№гғҡгғјгӮ№гӮ’дҪңгӮӢ</button>'+

      '<div class="auth-switch">'+(su?"гӮўгӮ«гӮҰгғігғҲдҪңжҲҗеҫҢгҖҒгҒөгҒҹгӮҠгҒ®гӮ№гғҡгғјгӮ№гӮ’гҒӨгҒҸгӮҢгҒҫгҒҷ":"гҒҜгҒҳгӮҒгҒҰгҒ®ж–№гҒҜдёҠгҒ®гҖҢж–°иҰҸзҷ»йҢІгҖҚгӮ’йҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„")+'</div></div>';

// helpers used inside form callbacks
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function seg(id){const el=document.getElementById(id);const on=el&&el.querySelector("button.on");return on?on.dataset.v:"";}
function numv(id){const el=document.getElementById(id);if(!el)return 0;return +String(el.value).replace(/[^0-9.]/g,"")||0;}
function cf(n){n=+n||0;return n?n.toLocaleString("en-US"):"";}
function domainOf(url){if(!url)return "";try{let u=url;if(!/^https?:\/\//i.test(u))u="https://"+u;return new URL(u).hostname.replace(/^www\./,"");}catch(e){return "";}}
function pad2(n){return String(n).padStart(2,"0");}
function addDay(ymd){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+1);return ""+dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate());}
function addDaysStr(ymd,n){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+n);return dt.getFullYear()+"-"+pad2(dt.getMonth()+1)+"-"+pad2(dt.getDate());}
function readImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=1280;let w=img.width,h=img.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);try{cb(c.toDataURL("image/jpeg",0.72));}catch(e){cb(r.result);}};img.src=r.result;};r.readAsDataURL(file);}

matchMedia("(prefers-color-scheme:dark)").addEventListener("change",()=>{if(App.getDeviceTheme&&App.getDeviceTheme()==="auto")App.applyTheme();});
App.init();

/* service worker for installable PWA (optional, ignored if file missing) */
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
