/* ťÖćŤČ≤„ÉĒ„ÉÉ„āę„Éľ(Ť®≠Śģö/„ā™„É≥„ÉúŚÖĪťÄö) */
.pal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pal-card{text-align:left;padding:0;border:1.5px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-surface);cursor:pointer;overflow:hidden;font-family:inherit;transition:border-color .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.pal-card.on{border-color:var(--color-primary-500);box-shadow:0 0 0 2px var(--color-primary-200)}
.pal-prev{height:74px;padding:10px;position:relative}
.pal-mini{background:#fff;border-radius:9px;height:100%;padding:9px;box-shadow:0 2px 6px rgba(0,0,0,.10);display:flex;flex-direction:column;gap:5px}
.pal-mini .l1{height:9px;width:52%;border-radius:3px}
.pal-mini .l2{height:6px;width:70%;border-radius:3px;background:#E3E5E8}
.pal-mini .l3{height:6px;width:40%;border-radius:3px;background:#ECEEF0}
.pal-chip{height:12px;width:34px;border-radius:6px;margin-top:2px}
.pal-fab{position:absolute;right:14px;bottom:12px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;line-height:1;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.pal-meta{padding:9px 11px 11px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.pal-name{font-weight:700;font-size:var(--text-base);color:var(--color-text-primary)}
.pal-desc{font-size:var(--text-xs);color:var(--color-text-secondary)}
.pal-check{color:var(--color-primary-500);display:flex;align-items:center}
/* „ĀĶ„Āü„āä„Āģśöģ„āČ„ĀóśĖĻ„Āô„āäŚźą„āŹ„Āõ ÁĶźśěú */
.ls-b{display:inline-block;font-size:var(--text-xs);font-weight:700;padding:2px 10px;border-radius:var(--radius-full);white-space:nowrap}

/* ŚõěÁ≠ĒÔľĚ2√ó2„ÉĖ„É≠„ÉÉ„āĮÔľą„ÉĚ„āĪ„ÉÉ„ÉąÔľČÔľč„āĘ„ā§„ā≥„É≥ */

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden}
html,body{margin:0;padding:0;overscroll-behavior-y:none}
body.noscroll{overflow:hidden}
body{

  -webkit-font-smoothing:antialiased;padding-bottom:calc(64px + env(safe-area-inset-bottom));
  overflow-wrap:break-word;
}
.num{font-family:var(--font-family-number);letter-spacing:-.01em}
/* ===== Header ===== */
.app-header{
  position:sticky;top:0;z-index:30;background:var(--color-bg-surface);
  border-bottom:1px solid var(--color-border);
  padding:calc(env(safe-area-inset-top) + 10px) var(--screen-px) 10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.app-header h1{font-size:var(--text-lg);font-weight:var(--fw-b);margin:0}
.app-header .sub{font-size:var(--text-xs);color:var(--color-text-secondary);font-weight:var(--fw-m)}
.hd-right{display:flex;align-items:center;gap:8px}
.eye-btn{flex:0 0 auto;border:1px solid var(--color-border);background:var(--color-bg-surface);color:var(--color-text-secondary);width:38px;height:38px;border-radius:var(--radius-full);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.eye-btn:active{transform:scale(.94)}
.eye-btn.on{background:var(--color-primary-50);border-color:var(--color-primary-200);color:var(--color-primary-600)}
.month-nav{display:flex;align-items:center;gap:2px;background:var(--color-primary-50);border:1px solid var(--color-primary-100);border-radius:var(--radius-full);padding:3px 4px}
.month-nav button{border:none;background:transparent;color:var(--color-primary-600);width:30px;height:30px;border-radius:var(--radius-full);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:var(--color-primary-100)}
.month-nav .cur{font-weight:var(--fw-b);font-size:var(--text-base);min-width:88px;text-align:center;color:var(--color-primary-700);cursor:pointer}
.month-nav.off{background:#FCEFD9;border-color:#F3D9A8}
.month-nav.off button,.month-nav.off .cur{color:var(--color-warning)}
.monthbar{position:sticky;top:0;z-index:29;display:flex;justify-content:center;background:var(--color-bg-surface);border-bottom:1px solid var(--color-border);padding:7px var(--screen-px)}
html[data-theme="dark"] .month-nav .cur,html[data-theme="dark"] .month-nav button{color:var(--color-primary-500)}
html[data-theme="dark"] .month-nav.off{background:#3a2f1a;border-color:#5a4520}
html[data-theme="dark"] .month-nav.off button,html[data-theme="dark"] .month-nav.off .cur{color:var(--color-warning)}
.sync-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-left:2px;vertical-align:middle}
.sync-on{background:var(--color-accent-500)}.sync-off{background:var(--color-text-disabled)}
.sync-err{background:var(--color-danger)}
/* ===== Layout ===== */
main{padding:var(--space-4) var(--screen-px) 24px;max-width:560px;margin:0 auto;animation:fade .2s ease-out}
@keyframes fade{from{opacity:0}to{opacity:1}}
.card{
  background:var(--color-bg-surface);border-radius:var(--radius-lg);padding:var(--space-5);
  box-shadow:0 3px 14px rgba(74,52,30,.07),0 1px 3px rgba(74,52,30,.05);border:none;margin-bottom:var(--space-3);
}
.card-title{font-size:var(--text-base);font-weight:var(--fw-b);color:var(--color-text-secondary);margin:0 0 var(--space-3)}
/* śēįŚ≠ó„ĀģÁĶĄÁČą„āíÁ≤ĺŚĮÜ„ĀęÔľąŚěĘśäú„ĀĎÔľČ */
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
/* šĹŅ„Āą„āč„ĀäťáĎÔľĚ„Éí„Éľ„É≠„ÉľÔľą„É©„Éô„Éęšłä„ÉĽŚ∑®Ś§ßśēįŚ≠ó„ÉĽ¬•„āíŚįŹ„Āē„ĀŹÔľČ */
.usable-hero{text-align:center;margin:18px 0 2px}
.usable-hero .uh-label{font-size:var(--text-xs);color:var(--color-text-secondary);letter-spacing:.06em;font-weight:var(--fw-b)}
.usable-hero .uh-num{font-family:var(--font-family-number);font-size:clamp(40px,13.5vw,54px);font-weight:800;line-height:1.04;letter-spacing:-.02em;color:var(--color-text-primary);margin-top:4px;font-variant-numeric:tabular-nums}
.usable-hero.neg .uh-num{color:var(--color-danger)}
.usable-hero .uh-yen{font-size:.5em;font-weight:700;vertical-align:.14em;margin-right:2px;color:var(--color-text-secondary)}
.uh-status{margin-top:12px;font-size:var(--text-sm);line-height:1.55;color:var(--color-text-secondary)}
.uh-status.neg{color:var(--color-danger)}
.dash-divider{height:1px;background:var(--color-border);margin:16px 0 14px}
.section-title{font-size:var(--text-lg);font-weight:var(--fw-b);margin:var(--space-6) 0 var(--space-3);display:flex;justify-content:space-between;align-items:center}
.link{color:var(--color-coral-600);font-weight:var(--fw-m);cursor:pointer}
.section-title .link{font-size:var(--text-sm);color:var(--color-coral-600);font-weight:var(--fw-m);cursor:pointer}
.big-num{font-family:var(--font-family-number);font-size:var(--text-3xl);font-weight:var(--fw-b);line-height:1.1}
.mid-num{font-family:var(--font-family-number);font-size:var(--text-2xl);font-weight:var(--fw-b)}
.muted{color:var(--color-text-secondary)}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.row + .row{margin-top:var(--space-3)}
.divider{height:1px;background:var(--color-border);margin:var(--space-3) 0}
/* progress */
.prog{background:var(--color-bg-muted);border-radius:var(--radius-full);height:8px;overflow:hidden;margin-top:6px}
.prog.lg{height:12px}
.prog > span{display:block;height:100%;border-radius:var(--radius-full);transition:width .6s cubic-bezier(.4,0,.2,1)}
.fill-primary{background:var(--color-primary-500)}.fill-accent{background:var(--color-accent-500)}
.fill-danger{background:var(--color-danger)}.fill-warning{background:var(--color-warning)}.fill-sec{background:var(--color-secondary-400)}
/* chips */
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:var(--radius-sm);padding:3px 9px;font-size:var(--text-sm);font-weight:var(--fw-m);white-space:nowrap}
.chip-full{border-radius:var(--radius-full);padding:3px 11px}
.chip-over{background:#FDECEC;color:var(--color-danger)}
.chip-todo{background:var(--color-bg-muted);color:var(--color-text-secondary)}
.chip-h{background:var(--color-secondary-50);color:var(--color-secondary-500)}
.chip-w{background:var(--color-primary-50);color:var(--color-primary-600)}
.chip-both{background:#E8F5EF;color:var(--color-accent-600)}
html[data-theme="dark"] .chip-both{background:#1d3329}
html[data-theme="dark"] .chip-over{background:#3a2020}
.badge{background:var(--color-danger);color:#fff;font-size:var(--text-xs);font-weight:var(--fw-b);border-radius:var(--radius-full);min-width:18px;height:18px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center}
.pill{font-size:var(--text-xs);font-weight:var(--fw-b);padding:2px 8px;border-radius:var(--radius-full)}
.pill-ok{background:#E8F5EF;color:var(--color-accent-600)}
.pill-warn{background:#FCEFD9;color:var(--color-warning)}
.pill-bad{background:#FDECEC;color:var(--color-danger)}
html[data-theme="dark"] .pill-ok{background:#16291F}
html[data-theme="dark"] .pill-warn{background:#2E2412}
html[data-theme="dark"] .pill-bad{background:#321C19}
/* Ť≠¶ŚĎä„Éą„Éľ„É≥„Āģ„āę„Éľ„ÉČ(„Āď„āĆ„Āč„āČ„ĀģšļąŚģö/„ā™„Éē„É©„ā§„É≥Á≠Č)„Äā„ÉÄ„Éľ„āĮ„Āß„āāśĶģ„Āč„Ā™„ĀĄ */
.card-warn{background:#FCEFD9;border-color:#F3D9A8}
.card-warn .lo{color:#9a6a1a}
html[data-theme="dark"] .card-warn{background:#2A2114;border-color:#46381E}
html[data-theme="dark"] .card-warn .lo{color:var(--color-warning)}
/* list item */
.li{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--color-border)}
.li:last-child{border-bottom:none}
.li .ic{font-size:19px;width:40px;height:40px;border-radius:12px;background:var(--color-bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.ico{display:inline-block;vertical-align:-.18em;flex-shrink:0}
/* „āę„É©„Éľ„āę„ÉÜ„āī„É™„ā§„É©„āĻ„ÉąÔľöŤá™ŚČć„Āģ„āĮ„É™„Éľ„É†ŤßíšłłŤÉĆśôĮ„āíśĆĀ„Ā§„Āģ„Āß„ÄĀŚõ≤„ĀŅ„āŅ„ā§„Éę„ĀĮťÄŹśėéŚĆĖ„Āó„Ā¶„ā§„É©„āĻ„Éą„ĀßŚüč„āĀ„āč */
.ico-illus{display:inline-block;vertical-align:middle;width:1.7em;height:1.7em;border-radius:26%}
.ic:has(.ico-illus),.proj-ic:has(.ico-illus){background:transparent!important;padding:0}
.ic .ico-illus,.proj-ic .ico-illus{width:100%;height:100%}
.ttl-ico{display:inline-flex;align-items:center;gap:7px}
.li .main{flex:1;min-width:0}
.li .ttl{font-weight:var(--fw-m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .meta{font-size:var(--text-sm);color:var(--color-text-secondary)}
.li .amt{font-family:var(--font-family-number);font-weight:var(--fw-b);white-space:nowrap}
.li.done .ttl{text-decoration:line-through;color:var(--color-text-disabled)}
.li.done{opacity:.6}
.check{width:24px;height:24px;border-radius:50%;border:2px solid var(--color-border-strong);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.check.on{background:var(--color-accent-500);border-color:var(--color-accent-500)}
.empty{text-align:center;color:var(--color-text-secondary);padding:24px 8px;font-size:var(--text-base)}
.empty .e-ic{font-size:30px;width:64px;height:64px;border-radius:50%;background:var(--color-coral-50);color:var(--color-coral-600);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;line-height:1}
.empty-char{width:84px;height:84px;object-fit:contain;display:block;margin:0 auto 10px;background:var(--color-coral-50);border-radius:50%;padding:8px;box-sizing:border-box}
.empty-msg{font-size:var(--text-base);color:var(--color-text-secondary);line-height:1.6}
.empty-sub{font-size:var(--text-sm);color:var(--color-text-disabled);margin-top:4px;line-height:1.5}
/* buttons */
.btn{border:none;border-radius:var(--radius-md);padding:12px 20px;font-size:var(--text-md);font-weight:var(--fw-b);min-height:48px;cursor:pointer;font-family:inherit;transition:all .12s ease-out;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--color-primary-500);color:var(--color-text-on-primary);box-shadow:var(--shadow-primary)}
.btn-sec{background:transparent;color:var(--color-primary-500);border:1.5px solid var(--color-primary-500)}
.btn-ghost{background:var(--color-bg-muted);color:var(--color-text-primary)}
.btn-danger{background:var(--color-danger);color:#fff}
.btn-block{width:100%}
.btn-sm{min-height:38px;padding:8px 14px;font-size:var(--text-base)}
/* śąĽ„āč„Éú„āŅ„É≥: Ś∑¶šłä„ĀģŚ°ó„āä„Ā§„Ā∂„Āó„ÉĒ„Éę(ŤŅĹŚä†„Éú„āŅ„É≥„Ā®Ť™§Ť™ć„Āó„Ā™„ĀĄ„āą„ĀÜ„Āę) */
.back-btn{display:inline-flex;align-items:center;gap:5px;border:none;background:var(--color-bg-muted);color:var(--color-text-secondary);border-radius:var(--radius-full);padding:8px 14px 8px 10px;font-size:var(--text-base);font-weight:var(--fw-m);cursor:pointer;margin-bottom:14px;line-height:1;font-family:inherit}
.back-btn:active{transform:scale(.96)}
.back-btn .ico{flex-shrink:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.topbar .back-btn{margin-bottom:0}
.top-add{flex:0 0 auto;width:40px;height:40px;border-radius:var(--radius-full);border:none;background:var(--color-primary-500);color:var(--color-text-on-primary);font-size:24px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-primary);font-family:inherit}
.top-add:active{transform:scale(.94)}
/* FAB */
.fab{position:fixed;right:18px;bottom:calc(74px + env(safe-area-inset-bottom));width:46px;height:46px;border-radius:var(--radius-full);background:var(--color-primary-500);color:#fff;font-size:23px;border:none;box-shadow:var(--shadow-primary);cursor:pointer;z-index:25;display:flex;align-items:center;justify-content:center;white-space:nowrap}
.fab.wide{width:auto;height:52px;padding:0 22px;font-size:var(--text-md);font-weight:var(--fw-b);gap:4px}
.fab:active{transform:scale(.94)}
/* filters */
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fchip{border:1px solid var(--color-border);background:var(--color-bg-surface);color:var(--color-text-secondary);border-radius:var(--radius-full);padding:7px 14px;font-size:var(--text-base);white-space:nowrap;cursor:pointer;font-weight:var(--fw-m)}
.fchip.on{background:var(--color-primary-500);color:#fff;border-color:var(--color-primary-500)}
.quickadd{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.quickadd input{flex:1;min-width:0}
.qa-btn{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:var(--color-primary-500);color:#fff;border:none;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-xs)}
.qa-btn:active{transform:scale(.94)}
.task-list{margin-top:2px}
.task-list .li:last-child{border-bottom:none}
.tcat-ic{color:var(--color-secondary-500);display:inline-flex;flex-shrink:0}
.proj-card{padding:2px 16px;margin-top:2px}
.proj-row{display:flex;align-items:center;gap:11px;padding:13px 0;border-bottom:1px solid var(--color-border);cursor:pointer}
.proj-row:last-child{border-bottom:none}
.proj-ic{width:34px;height:34px;border-radius:10px;flex-shrink:0;color:var(--color-primary-600);background:var(--color-primary-50);display:flex;align-items:center;justify-content:center}
.proj-name{font-weight:var(--fw-b);font-size:var(--text-md);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:5px}
.proj-chev{color:var(--color-text-disabled);font-size:20px;flex-shrink:0}
.qset{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;background:var(--color-secondary-50);border:1px solid var(--color-secondary-200);border-radius:10px;padding:7px 9px}
.qset-label{font-size:var(--text-xs);color:var(--color-text-secondary);font-weight:var(--fw-b)}
.qset-chip{border:1px solid var(--color-border);background:var(--color-bg-surface);border-radius:var(--radius-full);padding:3px 12px;font-size:var(--text-sm);cursor:pointer;color:var(--color-text-secondary);font-weight:var(--fw-m)}
.qset-chip.on{background:var(--color-primary-500);color:#fff;border-color:var(--color-primary-500)}
.qset-more{margin-left:auto;font-size:var(--text-sm);color:var(--color-secondary-600);font-weight:var(--fw-m);cursor:pointer}
.detail-toggle{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;box-sizing:border-box;border:1.5px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-muted);padding:13px 14px;margin:2px 0 16px;cursor:pointer;color:var(--color-text-secondary);font-weight:var(--fw-b);font-size:var(--text-md)}
.detail-toggle.open{background:var(--color-secondary-50);border-color:var(--color-secondary-200);color:var(--color-secondary-700)}
.detail-toggle .dt-label{display:inline-flex;align-items:center;gap:9px;min-width:0}
.detail-toggle .dt-opt{font-weight:var(--fw-r);color:var(--color-text-disabled);font-size:var(--text-sm);margin-left:4px}
.detail-toggle .dt-chev{flex-shrink:0;color:var(--color-text-disabled);font-size:11px}
.detail-toggle:active{transform:scale(.99)}
/* bottom nav */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--color-bg-surface);border-top:1px solid var(--color-border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
/* AdMob„Éź„Éä„ÉľŤ°®Á§ļśôāÔľąÁĄ°śĖô„Éó„É©„É≥„Āģ„ĀŅÔľČ„ĀĮ„Éä„Éď/FAB„āí„Éź„Éä„ÉľŚąÜśĆĀ„Ā°šłä„Āí„āč„Äā--ad-h „ĀĮŚģüś©ü„ĀßŚĺģŤ™ŅśēīŚŹĮ */
:root{--ad-h:0px}
body.has-ad{--ad-h:56px}
body.has-ad .tabbar{bottom:var(--ad-h)}
body.has-ad .fab{bottom:calc(74px + env(safe-area-inset-bottom) + var(--ad-h))}
.tab{flex:1;border:none;background:none;padding:8px 0 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--color-text-disabled);position:relative}
.tab .ti{font-size:22px;line-height:1}
.tab .tl{font-size:var(--text-xs);font-weight:var(--fw-m)}
.tab.on{color:var(--color-primary-500)}
.tab .nbadge{position:absolute;top:2px;right:calc(50% - 22px)}
/* sheet/modal */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.onb-modal{position:fixed;inset:0;z-index:60;background:rgba(40,30,20,.5);display:flex;align-items:center;justify-content:center;padding:24px}
.onb-card{background:var(--color-bg-surface);border-radius:20px;max-width:380px;width:100%;padding:26px 22px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.onb-card .onb-ic{color:var(--color-primary-500);display:flex;justify-content:center;margin-bottom:6px}
.onb-card h2{font-size:var(--text-xl);margin:0 0 10px}
.onb-card p{font-size:var(--text-sm);line-height:1.85;color:var(--color-text-secondary);margin:0 0 12px}
.onb-card p b{color:var(--color-text-primary)}
.onb-card .onb-sub{font-size:var(--text-xs);color:var(--color-text-secondary)}
.onb-skip{margin-top:12px;font-size:var(--text-sm);color:var(--color-text-secondary);cursor:pointer;text-decoration:underline}
.onb-coach{position:fixed;left:0;right:0;bottom:calc(72px + env(safe-area-inset-bottom));z-index:45;display:flex;justify-content:center;padding:0 14px;pointer-events:none}
.onb-bar{background:var(--color-bg-surface);border:1.5px solid var(--color-primary-300);border-radius:16px;padding:14px 16px;max-width:460px;width:100%;box-shadow:0 12px 30px rgba(60,40,20,.22);pointer-events:auto;animation:onbpop .3s ease}
@keyframes onbpop{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.onb-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.onb-step{font-size:var(--text-xs);font-weight:800;color:var(--color-primary-500);letter-spacing:.05em}
.onb-skip2{font-size:var(--text-xs);color:var(--color-text-secondary);cursor:pointer;text-decoration:underline}
.onb-ttl{font-weight:800;font-size:var(--text-base);margin-bottom:2px}
.onb-desc{font-size:var(--text-sm);color:var(--color-text-secondary);line-height:1.6;margin-bottom:10px}
.onb-budget{display:flex;justify-content:space-between;align-items:center;background:var(--color-secondary-50);border:1px solid var(--color-secondary-200);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:var(--text-sm);color:var(--color-secondary-600);font-weight:700}
.onb-budget b{font-size:var(--text-lg);font-weight:800;color:var(--color-secondary-600)}
.onb-budget-sub{font-size:var(--text-xs);color:var(--color-accent-600);margin:-4px 0 9px;text-align:right;font-weight:700}
.onb-cnt{font-size:var(--text-xs);color:var(--color-text-secondary);text-align:center;margin-top:7px}
.onb-hidden{display:none}
.scrim.show{opacity:1;pointer-events:auto}
/* „āĻ„Éě„ÉõŚĻÖ„Āß„ĀĮ left:0;right:0 „Āģ„ĀŅ„ĀßÁĒĽťĚĘ„ĀĄ„Ā£„ĀĪ„ĀĄ(width/max-width/vw„āíšĹŅ„āŹ„Āö„ĀĮ„ĀŅŚáļ„Āó„āíś†ĻÁĶ∂) */
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--color-bg-surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:8px var(--screen-px) calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);width:auto;margin:0;box-sizing:border-box;pointer-events:none}
.sheet{max-height:88dvh}
.sheet.show{transform:translateY(0);pointer-events:auto}
.sheet input,.sheet select,.sheet textarea{max-width:100%;box-sizing:border-box}
@media(min-width:600px){.sheet{max-width:560px;margin:0 auto}}
.sheet .grip{width:44px;height:5px;background:var(--color-border-strong);border-radius:3px;margin:8px auto 12px;cursor:grab;touch-action:none}
.sheet .grip:active{cursor:grabbing}
.icon-pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:8px;max-height:188px;overflow-y:auto;padding:2px}
.icon-pick-btn{height:48px;border:1.5px solid var(--color-border);background:var(--color-bg-muted);border-radius:12px;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.icon-pick-btn:active{transform:scale(.94)}
.icon-pick-btn.on{background:var(--color-primary-50);border-color:var(--color-primary-500);color:var(--color-primary-600)}

  lsPlanCalc(){

    const totalMonthly=Math.round(need/(horizon*12));

  /* ============== DASHBOARD ============== */
  metrics(month){
    const inc=this.state.incomes.filter(i=>i.month===month);
    const exp=this.state.expenses.filter(e=>e.month===month);
    const manualIncome=inc.reduce((a,b)=>a+(+b.amount||0),0);
    const fixed=exp.filter(e=>e.type==="fixed").reduce((a,b)=>a+(+b.amount||0),0);
    const variable=exp.filter(e=>e.type==="variable").reduce((a,b)=>a+(+b.amount||0),0);
    const evConfirmed=this.eventExpense(month,"confirmed");
    const evPlanned=this.eventExpense(month,"planned");
    const evIncConfirmed=this.eventIncome(month,"confirmed");
    const evIncPlanned=this.eventIncome(month,"planned");
    const totalIncome=manualIncome+evIncConfirmed; // ÁĘļŚģöŚŹéŚÖ•(ŚÖ•ťáĎśłą„ĀģšļąŚģö„āíŚźę„āÄ)
    const totalExpense=fixed+variable+evConfirmed; // ÁĘļŚģöśĒĮŚáļ
    const planned=evPlanned+this.floatingSum(month,false);        // „Āď„āĆ„Āč„āČśĒĮśČē„ĀÜšļąŚģö(śó•šĽėśú™Śģö„ĀģŚõļŚģöŤ≤Ľ„āíŚźę„āÄ)
    const plannedIncome=evIncPlanned+this.floatingSum(month,true); // „Āď„āĆ„Āč„āČŚÖ•„āčšļąŚģö(śó•šĽėśú™Śģö„ĀģŚŹéŚÖ•„āíŚźę„āÄ)
    const balance=totalIncome-totalExpense;         // śģč„āä(ÁĘļŚģö„Éô„Éľ„āĻ)
    const afterPlanned=totalIncome-totalExpense-planned+plannedIncome; // śúąśúęŤ¶čŤĺľ„ĀŅ
    const savingsRate=totalIncome>0?(balance/totalIncome*100):0;
    const hInc=inc.filter(i=>i.owner==="husband").reduce((a,b)=>a+(+b.amount||0),0);
    const wInc=inc.filter(i=>i.owner==="wife").reduce((a,b)=>a+(+b.amount||0),0);
    const oInc=manualIncome-hInc-wInc;
    return {totalIncome,fixed,variable,evConfirmed,evIncConfirmed,planned,plannedIncome,totalExpense,balance,afterPlanned,savingsRate,hInc,wInc,oInc};
  },
  // šļąÁģó„Éö„Éľ„āĻ: Ś§ČŚčēŤ≤Ľ„āíśó•ŚČ≤„āä„Āßśúąśúę„Āĺ„ĀßŚĽ∂ťē∑„Āó„ÄĀŚõļŚģöŤ≤Ľ„ÉĽšļąŚģö„āíŤ∂≥„Āó„Ā¶śúąśúęšļąśł¨„āíŚáļ„Āô
  paceReport(month,mIn){
    const m=mIn||this.metrics(month);
    const today=todayStr();
    const isCur=month===today.slice(0,7);
    const [y,mo]=month.split("-").map(Number);
    const D=new Date(y,mo,0).getDate();
    const d=isCur?(+today.slice(8)):D;
    const pacedVariable=(isCur&&d>0)?Math.round(m.variable/d*D):m.variable;
    const _debtM=(this.state.debts||[]).reduce((a,dd)=>{const left=Math.max(0,(+dd.count||0)-(+dd.paid||0));return a+(left>0?(+dd.monthly||0):0);},0);
    const projExpense=pacedVariable+m.fixed+m.evConfirmed+m.planned+_debtM; // „É≠„Éľ„É≥ŤŅĒśłą(ŚõļŚģöŤ≤Ľ)„āāŚźę„āĀ„āč
    const projIncome=m.totalIncome+m.plannedIncome;
    const projBalance=projIncome-projExpense;
    return {isCur,d,D,pacedVariable,projExpense,projIncome,projBalance,m};
  },
  // šĽäśúą„ĀģšļąÁģó: ŚŹéŚÖ•Ť¶čŤĺľ„ĀŅ ‚ąí(ŚõļŚģöŤ≤Ľ+šļąŚģö„ĀģśĒĮŚáļ)‚ąí(śĮéśúą„ĀģÁ©ćÁęč:„āī„Éľ„Éę+ÁČĻŚą•Ť≤Ľ)= ÁĒüśīĽ„ĀęšĹŅ„Āą„āčšļąÁģó„Äāśó•„ÄÖ„ĀģŚ§ČŚčēŤ≤Ľ„āí„ĀĚ„Āď„Āč„āČšĹŅ„ĀÜ„Äā
  budgetReport(month,mIn){
    const m=mIn||this.metrics(month);
    const income=m.totalIncome+m.plannedIncome;                 // šĽäśúą„ĀģŚŹéŚÖ•Ť¶čŤĺľ„ĀŅ(ŚÖ•ťáĎśłą+šļąŚģö)
    const specialMonthly=Math.round((this.state.special||[]).reduce((a,it)=>a+specialAnnual(it),0)/12);
    const emergencyMonthly=Math.max(0,+((this.state.emergency&&this.state.emergency.monthly))||0);
    // „É≠„Éľ„É≥ŤŅĒśłą„ĀĮ„ÄĆÁ©ćÁęč„Äć„Āß„ĀĮ„Ā™„ĀŹ„ÄĆŚõļŚģöŤ≤Ľ(śĒĮŚáļ)„ÄćÔľĚśĮéśúą„ĀģŤŅĒśłąť°ć„āí committed „ĀęÁģóŚÖ•Ôľąśģč„Āā„āäŚąÜ„Āģ„ĀŅÔľČ
    const debtMonthly=(this.state.debts||[]).reduce((a,d)=>{const left=Math.max(0,(+d.count||0)-(+d.paid||0));return a+(left>0?(+d.monthly||0):0);},0);
    let goalsMonthly=0;
    (this.state.goals||[]).forEach(g=>{const t=goalAmt(g);if(t>0&&(g.current||0)>=t)return;const pc=goalPace(g);if(pc&&pc.days>=0)goalsMonthly+=pc.perMonth;});
    const saveTarget=goalsMonthly+specialMonthly+emergencyMonthly; // śĮéśúąŚŹĖ„āäŚąÜ„ĀĎ„āčÁ©ćÁęčÔľą„āī„Éľ„ÉęÔľčÁČĻŚą•Ť≤ĽÔľčÁĒüśīĽťė≤Ť°õŤ≤ĽÔľČ
    const committed=m.fixed+m.evConfirmed+m.planned+debtMonthly; // ŚõļŚģöŤ≤Ľ+ÁĘļŚģö„ā§„Éô„É≥„Éą+„Āď„āĆ„Āč„āČ„ĀģšļąŚģöśĒĮŚáļ+„É≠„Éľ„É≥ŤŅĒśłą
    const livingBudget=income-saveTarget-committed;             // ÁĒüśīĽ„ĀęšĹŅ„Āą„āčšļąÁģó
    const livingSpent=m.variable;                              // šĽäśúą„Āô„Āß„ĀęšĹŅ„Ā£„ĀüŚ§ČŚčēŤ≤Ľ
    const livingLeft=livingBudget-livingSpent;                  // śģč„āä(=afterPlanned-saveTarget)
    return {income,saveTarget,goalsMonthly,specialMonthly,emergencyMonthly,debtMonthly,committed,livingBudget,livingSpent,livingLeft,hasPlan:saveTarget>0};
  },
  // „āę„É¨„É≥„ÉÄ„Éľ„ĀģťáĎť°ćŚÖ•„āäšļąŚģö„āíťõÜŤ®ą„ÄāisIncome=false:śĒĮŚáļ(šļąŚģö/śĒĮśČē„ĀĄ)„ÄĀtrue:ŚÖ•ťáĎ„Äāmode:'confirmed'(śó•šĽėŚąįśĚ•)/'planned'(śú™śĚ•)
  // Ś§ČŚčēť†ÖÁõģ(e.variable)„ĀĮ„ĀĚ„Āģśúą„ĀęŚÖ•Śäõ„Āē„āĆ„ĀüťáĎť°ć(e.byMonth[ym])„āíšĹŅ„ĀÜ„Äāśú™ŚÖ•Śäõ„Ā™„āČ0„ÄāŚõļŚģö„ĀĮe.amount„Äā
  eventAmountForMonth(e,ym){ if(e&&e.variable)return (e.byMonth&&e.byMonth[ym]!=null)?(+e.byMonth[ym]||0):0; return +(e&&e.amount)||0; },
  // śó•šĽėśú™Śģö(dayMode=variable)„ĀßŚĹďśúą„Āģśó•šĽė„ĀĆ„Āĺ„Ā†ÁĘļŚģö„Āó„Ā¶„ĀĄ„Ā™„ĀĄ„āā„Āģ ‚Üí ťáĎť°ćśóĘÁü•„Ā∂„āď„āí„ÄĆšļąŚģö„Äć„ĀęŚä†Áģó
  floatingSum(month,isIncome){let s=0;this.state.events.forEach(e=>{if(!e.fixed||e.dayMode!=="variable")return;if(e.byMonthDate&&e.byMonthDate[month])return;const isInc=e.type==="income";if(isInc!==isIncome)return;const amt=this.eventAmountForMonth(e,month);if(amt>0)s+=amt;});return s;},
  eventSum(month,mode,isIncome){
    const today=todayStr(); let sum=0;
    this.state.events.forEach(e=>{const isInc=e.type==="income";if(isInc!==isIncome)return;const amt=this.eventAmountForMonth(e,month);if(!(amt>0))return;this.eventDatesInMonth(e,month).forEach(ds=>{const past=ds<=today;if(mode==="confirmed"&&!past)return;if(mode==="planned"&&past)return;sum+=amt;});});

  eventList(month,mode,isIncome){
    const today=todayStr(),list=[];

    this.state.events.forEach(e=>{if(!e.variable||!e.fixed)return;const day=(+String(e.date).slice(8))||1;const closeDay=e.closeDay?(+e.closeDay||0):0;months.forEach(mo=>{const entered=e.byMonth&&e.byMonth[mo]!=null;if(entered)return;const trigger=mo+"-"+pad2(Math.min(closeDay||day,28));if(trigger>=today&&trigger<=end)out.push({date:trigger,kind:"input",title:e.title+" „ĀģťáĎť°ć„āíŚÖ•Śäõ",amount:0,recurId:e.id});});});

  reportData(M){
    const m=this.metrics(M);
    let [py,pmo]=M.split("-").map(Number); pmo--; if(pmo<1){pmo=12;py--;} const prevExp=this.metrics(py+"-"+String(pmo).padStart(2,"0")).totalExpense;
    const md={}; this.state.expenses.forEach(e=>{if(e.month)md[e.month]=1;}); this.state.incomes.forEach(i=>{if(i.month)md[i.month]=1;});
    let streak=0,sy=+M.split("-")[0],sm=+M.split("-")[1]; while(md[sy+"-"+String(sm).padStart(2,"0")]){streak++;sm--;if(sm<1){sm=12;sy--;}}
    const exp=this.state.expenses.filter(e=>e.month===M); const incCount=this.state.incomes.filter(i=>i.month===M).length;
    const byCat={}; exp.forEach(e=>{const c=findCat(e.type==="fixed"?"fixed":"variable",e.catId);byCat[c.label]=(byCat[c.label]||0)+(+e.amount||0);});
    let cats=Object.entries(byCat).map(([l,v])=>({l,v})).sort((a,b)=>b.v-a.v);
    if(cats.length>5){const t=cats.slice(0,4);t.push({l:"„ĀĚ„ĀģšĽĖ",v:cats.slice(4).reduce((a,b)=>a+b.v,0)});cats=t;}
    const sav=Math.max(0,m.savingsRate);
    const savComp=Math.max(0,Math.min(40,Math.round(sav/20*40)));
    const exRate=m.totalIncome>0?m.totalExpense/m.totalIncome*100:100;
    const balComp=Math.max(0,Math.min(30,Math.round((1-exRate/100)*60)));
    const recCount=exp.length+incCount;
    const recComp=Math.min(15,Math.round(recCount*1.5))+Math.min(15,Math.round(streak*2.5));
    const score=Math.max(0,Math.min(100,savComp+balComp+recComp));
    const ranks=[{min:90,name:"FIRE„Éö„É≥„āģ„É≥",col:"#1D9E75",msg:"„āā„ĀĮ„āĄŚģ∂Ť®ą„Āģ„Éó„É≠„ÄāŤÉł„āíŚľĶ„Ā£„Ā¶„ā∑„āß„āĘ„āí„Äā"},{min:75,name:"„ā≥„ÉĄ„ā≥„ÉĄ„āä„Āô",col:"#C79A1E",msg:"Ś†ÖŚģü„Āę„ÄĀÁĚÄŚģü„Āę„Äā„Āď„Āģ„ĀĶ„Āü„āä„ĀĮ„ÉĖ„É¨„Ā™„ĀĄ„Äā"},{min:60,name:"„ĀĆ„āď„Āį„āä„āī„Éľ„Éę„Éá„É≥",col:"#E86A35",msg:"„ĀĄ„ĀĄ„Éö„Éľ„āĻ„Äā„Āā„Ā®ŚįĎ„Āó„Āßšłä„ĀĆŤ¶č„Āą„Ā¶„Āć„Āĺ„Āô„Äā"},{min:45,name:"„ĀĚ„Āď„ĀĚ„Āď„āę„É°",col:"#7BA05B",msg:"„āÜ„Ā£„ĀŹ„āä„Āß„āāŚČćťÄ≤„ÄāśĚ•śúą„ÄĀŚ∑Ľ„ĀćŤŅĒ„ĀĚ„ĀÜ„Äā"},{min:0,name:"ŚáļŤ≤Ľ„Āä„Āē„āč„Āē„āď",col:"#C97240",msg:"šĹŅ„ĀĄ„Āô„Āé„Āüť†ÖÁõģ„ÄĀśĚ•śúą„ĀĚ„Āď„Ā†„ĀĎŤ¶č„Ā¶„ĀŅ„Ā¶„Äā"}];
    const rank=ranks.find(r=>score>=r.min);
    const gA=g=>(g.items&&g.items.length)?g.items.reduce((a,b)=>a+(+b.amount||0),0):(+g.target||0);
    const goal=this.state.goals.filter(g=>{const t=gA(g);return t>0&&(g.current||0)<t;}).sort((a,b)=>(a.targetDate||"9999")<(b.targetDate||"9999")?-1:1)[0];
    let goalInfo=null;
    if(goal){const t=gA(goal);const pct=Math.min(100,(goal.current||0)/t*100);let eta="";if(m.balance>0){const months=Math.ceil((t-(goal.current||0))/m.balance);let ey=+M.split("-")[0],em=+M.split("-")[1]+months;while(em>12){em-=12;ey++;}eta=ey+"ŚĻī"+em+"śúą„ĀęťĀĒśąź„Éö„Éľ„āĻ";}goalInfo={label:goal.label,pct:pct,eta:eta};}
    const dim=new Date(+M.split("-")[0],+M.split("-")[1],0).getDate();
    return {m,score,rank,sav,streak,recCount,cats,catTotal:cats.reduce((a,b)=>a+b.v,0)||1,prevExp,goalInfo,perDay:Math.round(m.totalExpense/dim),yearProj:Math.max(0,m.balance)*12};

  /* ============== „É©„ā§„Éē„Éó„É©„É≥„ÉĽ„ā∑„Éü„É•„É¨„Éľ„āŅ„Éľ ============== */
  /* ===== ś∑Ī„ĀĄ„ā≠„É£„ÉÉ„ā∑„É•„Éē„É≠„ÉľÔľąPhase1: śúąś¨°„āíŚĻīś¨°ťõÜŤ®ą„ÉĽśóĘŚģöŚÄ§śĖĻŚľŹÔľČ ===== */
  cfChildYear(age,priv){ // Ś≠ź„Ā©„āā1šļļ„ĀģŚĻīť°ć(ť§äŤā≤ÔľčśēôŤā≤„ÉĽŤá™ŚģÖťÄöŚ≠¶„ĀģÁõģŚģČ„ÄāšłáŚÜÜ‚ÜíŚÜÜ)
    if(age<0||age>21)return 0;
    let care,edu=0;
    if(age<=2){care=40;}
    else if(age<=5){care=40;edu=priv?34.7:18.5;}
    else if(age<=11){care=45;edu=priv?182.8:33.6;}
    else if(age<=14){care=55;edu=priv?156:54.2;}
    else if(age<=17){care=60;edu=priv?103:59.8;}
    else {care=30;edu=priv?130:60;}
    return Math.round((care+edu)*10000);
  },
  cfLoanMonthly(principal,ratePct,years){
    const r=(ratePct/100)/12,n=years*12;
    if(principal<=0||n<=0)return 0;
    if(r<=0)return Math.round(principal/n);
    return Math.round(principal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1));
  },
  cfDefaults(){
    if(this.state.cfPlan)return this.state.cfPlan;
    const m=this.metrics(thisMonth());
    const cash=(this.state.accounts||[]).reduce((s,a)=>s+(+a.balance||0),0);
    this.state.cfPlan={
      hIncome:Math.round(m.hInc||0)||300000,
      wIncome:Math.round(m.wInc||0)||200000,
      living:Math.max(120000,Math.round((m.fixed||0)+(m.variable||0)))||200000,
      cash:cash||3000000,
      wifeMode:"reduce",wifeYears:6,weddingDone:false,kidsMode:"future",youngest:0,
      children:[],buy:{on:false,after:7,price:35000000,down:6000000,rate:1.0,years:35,upkeep:25000},events:[]
    };
    return this.state.cfPlan;
  },
  setCf(k,v){const cf=this.cfDefaults();
    if(k==="wifeMode"||k==="kidsMode")cf[k]=v;
    else if(k==="weddingDone")cf[k]=(v===true||v==="1"||v==="true");
    else cf[k]=(+String(v).replace(/[^0-9.]/g,""))||0;
    if(k==="weddingDone"||k==="kidsMode"||k==="youngest")this.cfRebuild();else{this.commit();this.render();}
  },
  cfRebuild(){ // „Āô„āäŚźą„āŹ„ĀõŚõěÁ≠ĒÔľč„ÄĆ„Āô„Āß„ĀęťĀĒśąźśłą„ĀŅ„Äć„Éē„É©„āį „Āč„āČ Ś≠ź„Ā©„āā„ÉĽšĹŹŚģÖ„ÉĽ„ā§„Éô„É≥„Éą„āíÁĶĄ„ĀŅÁęč„Ā¶
    const cf=this.cfDefaults();
    const me=this.lsRole(),other=this.lsOther(me);
    const A=(this.lsData()[me]||{}).ans||{},B=(this.lsData()[other]||{}).ans||{};
    const g=(i)=>(A[i]!=null?A[i]:(B[i]!=null?B[i]:null));
    const cntMap={0:1,1:2,2:3,3:1},n=(g(7)!=null&&cntMap[g(7)]!=null)?cntMap[g(7)]:0;
    const timing=[1,2.5,5,3],t0=(g(8)!=null?timing[g(8)]:3),priv=(g(10)===0);
    cf.children=[];
    if(cf.kidsMode==="have"){for(let k=0;k<n;k++)cf.children.push({after:-(cf.youngest+k*2),priv:priv});} // śóĘ„Āę„ĀĄ„āčÔľĚťĀéŚéĽ„ĀęŤ™ēÁĒüÔľąśĮéśúą„ĀģŤ≤ĽÁĒ®„ĀĆšĽä„Āč„Āč„āčÔľČ
    else{for(let k=0;k<n;k++)cf.children.push({after:Math.max(1,Math.round(t0+k*2)),priv:priv});}
    if(g(3)===0){const b=g(4);const price=[20000000,35000000,45000000,55920000][(b!=null?b:1)]||35000000;cf.buy={on:true,after:7,price:price,down:Math.round(price*0.17),rate:1.0,years:35,upkeep:25000};}
    else cf.buy.on=false;
    cf.events=[];
    if(!cf.weddingDone){const wed=g(6);if(wed===0)cf.events.push({name:"ÁĶźŚ©öŚľŹ",after:1,amount:3440000});else if(wed===1)cf.events.push({name:"ÁĶźŚ©öŚľŹ",after:1,amount:1500000});}
    const car=g(5);if(car===0)cf.events.push({name:"ŤĽä",after:3,amount:3310000});else if(car===1)cf.events.push({name:"ŤĽä",after:3,amount:1960000});
    this.commit();this.render();
  },
  cfApplyFromSync(){this.cfRebuild();this.toast("„Āô„āäŚźą„āŹ„Āõ„ĀģÁ≠Ē„Āą„āíŚŹćśė†„Āó„Āĺ„Āó„Āü");},
  cfProject(cf,extra){
    cf=cf||this.cfDefaults();extra=extra||0;
    const years=30;
    const loanM=cf.buy.on?this.cfLoanMonthly(cf.buy.price-cf.buy.down,cf.buy.rate,cf.buy.years):0;
    const firstChild=cf.children.length?Math.min.apply(null,cf.children.map(c=>c.after)):null;
    const reserve=cf.living*6;
    let cash=cf.cash;const rows=[];
    for(let y=0;y<=years;y++){
      let wf=1;
      if(firstChild!=null&&cf.wifeMode!=="keep"&&y>=firstChild&&y<firstChild+cf.wifeYears)wf=(cf.wifeMode==="home"?0:0.6);
      let allowM=0;cf.children.forEach(c=>{const age=y-c.after;if(age>=0&&age<15)allowM+=10000;});
      const incomeY=(cf.hIncome+cf.wIncome*wf+allowM)*12;
      let expY=cf.living*12;
      if(cf.buy.on&&y>=cf.buy.after)expY+=(loanM+cf.buy.upkeep)*12;
      let childY=0;cf.children.forEach(c=>{childY+=this.cfChildYear(y-c.after,c.priv);});expY+=childY;
      let evY=0,evNames=[];((cf.events||[]).concat(this.cfActualEvents())).forEach(e=>{if(Math.round(e.after)===y){evY+=e.amount;evNames.push(e.name);}});
      if(cf.buy.on&&y===cf.buy.after){evY+=cf.buy.down;evNames.push("šĹŹŚģÖť†≠ťáĎ");}
      expY+=evY;
      const net=incomeY-expY;
      if(y>0)cash+=net+(extra||0)*12;
      rows.push({y,income:incomeY,exp:expY,net,cash,wf,evNames,childY});
    }
    let minRow=rows[0];rows.forEach(r=>{if(r.cash<minRow.cash)minRow=r;});
    let breach=null;for(let i=1;i<rows.length;i++){if(rows[i].cash<reserve){breach=rows[i];break;}}
    return {rows,reserve,loanM,minRow,breach,years};
  },
  cfActualEvents(){ // „É©„ā§„Éē„Éó„É©„É≥ÁĒĽťĚĘ„ĀßÁôĽťĆ≤„Āó„ĀüŚģüťöõ„Āģ„āī„Éľ„Éę(śúüśó•„Ā§„Āć)„āíCF„ĀęťÄ£Śčē
    const out=[];
    (this.state.goals||[]).forEach(g=>{const need=goalAmt(g)-(+g.current||0);if(need<=0)return;const pc=goalPace(g);if(!pc||!(pc.months>0))return;out.push({name:g.label||"Áõģś®ô",after:Math.max(1,Math.round(pc.months/12)),amount:need,fromGoal:true});});
    return out;
  },
  cfGoals(cf){ // „Āĺ„Ā®„Āĺ„Ā£„Āü„ĀäťáĎ„ĀĆŤ¶Ā„āčÁõģś®ôÔľĚ„ÄĆšĽä„Āč„āČśúą„ĀĄ„ĀŹ„āČŤ≤Į„āĀ„āĆ„ĀįŚĪä„ĀŹ„Āč„Äć
    cf=cf||this.cfDefaults();const gs=[];
    (cf.events||[]).forEach(e=>gs.push({name:e.name,after:e.after,amount:e.amount}));
    this.cfActualEvents().forEach(e=>gs.push({name:e.name,after:e.after,amount:e.amount,actual:true}));
    if(cf.buy.on)gs.push({name:"šĹŹŚģÖ„Āģť†≠ťáĎ",after:cf.buy.after,amount:cf.buy.down});
    // „Āô„Āß„ĀęŚ≠ź„Ā©„āā„ĀĆ„ĀĄ„āčŚģ∂Śļ≠ÔľĚ„ÄĆ„Āď„āĆ„Āč„āČśĮéśúą„Āč„Āč„āčśēôŤā≤Ť≤Ľ„Äć„ĀęšĽä„Āč„āČŚāô„Āą„āčÁõģś®ô„āíŚáļ„Āô
    if(cf.kidsMode==="have"){(cf.children||[]).forEach((ch,i)=>{const age=Math.max(0,-ch.after);const eduTotal=ch.priv?12000000:8500000;const remFrac=Math.max(0,Math.min(1,(22-Math.max(3,age))/19));const amt=Math.round(eduTotal*remFrac/100000)*100000;const after=Math.max(1,18-age);if(amt>0)gs.push({name:"śēôŤā≤Ť≤Ľ„ĀģŚāô„Āą"+((cf.children.length>1)?("Ôľą"+(i+1)+"šļļÁõģÔľČ"):""),after:after,amount:amt,edu:true});});}
    gs.sort((a,b)=>a.after-b.after);

  view_calendar(){
    const[y,mo]=this.calMonth.split("-").map(Number);
    const first=new Date(y,mo-1,1), startDow=first.getDay();
    const days=new Date(y,mo,0).getDate();
    const prevDays=new Date(y,mo-1,0).getDate();
    const items=this.calItems();
    const isCurMonth=this.calMonth===thisMonth();
    let h='<div class="cal-card"><div class="cal-head"><span class="cal-nav-btn" onclick="App.shiftCal(-1)" aria-label="ŚČć„Āģśúą">'+ic('back',18)+'</span>'+

      (isCurMonth?'':'<span class="cal-today-jump" onclick="App.pickThisMonth()">šĽäśó•</span>')+'</div>';
    h+='<div class="cal-legend"><span><i class="lgd lgd-h"></i>'+esc(this.state.settings.husband)+'</span><span><i class="lgd lgd-w"></i>'+esc(this.state.settings.wife)+'</span><span><i class="lgd lgd-b"></i>„ĀĶ„Āü„āä</span></div>';
    h+='<div class="cal-grid">'+["śó•","śúą","ÁĀę","śįī","śú®","ťáĎ","Śúü"].map((d,i)=>'<div class="cal-dow '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>').join("");
    let cells=[];
    for(let i=startDow-1;i>=0;i--)cells.push({d:prevDays-i,muted:true});
    for(let d=1;d<=days;d++)cells.push({d,muted:false});
    while(cells.length<42)cells.push({d:cells.length-(startDow+days)+1,muted:true}); // Śłł„Āę6ťÄĪ(42„āĽ„Éę)ÔľĚŚČćŚĺĆ„ĀģťÄĪ„āāŤ°®Á§ļ
    const MAXC=3;
    cells.forEach((c,idx)=>{
      const dow=idx%7;
      if(c.muted){h+='<div class="cal-cell muted"><div class="cal-cell-top"><span class="cnum">'+c.d+'</span></div></div>';return;}
      const ds=this.calMonth+"-"+String(c.d).padStart(2,"0");
      const dayItems=items[ds]||[];
      const evItems=dayItems.filter(it=>!it.exp);   // šļąŚģö„ÉĽ„āŅ„āĻ„āĮ„ÉĽŚŹéŚÖ•„ÉĽŚģöśúü ‚Üí śĖáŚ≠ó„ÉĀ„ÉÉ„Éó

      const today=ds===todayStr();
      const stId=this.state.stamps&&this.state.stamps[ds];const stD=stId&&stampDef(stId);
      const stHtml=stD?'<span class="cstamp" style="color:'+stD.color+'">'+ic(stD.id,15)+'</span>':'';
      let evs='';const MAXIC=4;
      evItems.slice(0,MAXIC).forEach(it=>{const wc=it.who==="husband"?" cev-h":it.who==="wife"?" cev-w":"";evs+='<span class="cev-ic'+wc+'">'+renderCatIc(it.icon,22)+'</span>';});

    });

    // šļąŚģö„ĀģšłÄŤ¶ß„ĀĮŚźĄśó•„Āģ„āŅ„ÉÉ„Éó(openDay)„ĀßÁĘļŤ™ć„ÄāŤŅĹŚä†„ĀĮŚŹ≥šłč„ĀģFAB„Äāšłč„ĀĮ„āę„ÉÜ„āī„É™Śą•śĒĮŚáļ„Āģ„ĀŅ
    let side='';
    // „Āď„Āģśúą„Āģ„āę„ÉÜ„āī„É™Śą•śĒĮŚáļ
    const exp=this.state.expenses.filter(e=>e.month===this.calMonth);
    const evExp=this.eventExpense(this.calMonth,"confirmed"), evN=this.eventExpenseList(this.calMonth,"confirmed").reduce((s,x)=>s+x.n,0);
    if(exp.length||evExp>0){
      const byCat={};exp.forEach(e=>{const see=this.seeDetail(e);const key=see?e.catId:"__priv";const c=findCat(e.type==="fixed"?"fixed":"variable",e.catId);if(!byCat[key])byCat[key]=see?{icon:c.icon,label:c.label,sum:0,n:0}:{icon:"ūüĒí",label:"ŚÄčšļļśĒĮŚáļ",sum:0,n:0};byCat[key].sum+=(+e.amount||0);byCat[key].n++;});
      const arr=Object.values(byCat).sort((a,b)=>b.sum-a.sum);
      if(evExp>0)arr.push({icon:"ūüďÖ",label:"šļąŚģö„ÉĽśĒĮśČē„ĀĄ(śłą)",sum:evExp,n:evN});
      arr.sort((a,b)=>b.sum-a.sum);
      const total=arr.reduce((s,x)=>s+x.sum,0);
      side+='<div class="section-title cat-sticky">„āę„ÉÜ„āī„É™Śą•śĒĮŚáļ<span class="num" style="font-weight:700;color:var(--color-primary-600)">'+yen(total)+'</span></div><div class="card">';
      const gpal=['#C4714A','#7A9E7E','#4E9C78','#C4963A','#9DB5A0','#D49274','#5E7E63','#BACBBC'];

  calItems(ym){

  eventDatesInMonth(e,ym){
    if(!e.date)return [];
    if(e.dayMode==="variable")return (e.byMonthDate&&e.byMonthDate[ym])?[e.byMonthDate[ym]]:[]; // śó•šĽėśú™Śģö: ÁĘļŚģöśłą„Āģśúą„Ā†„ĀĎ„āę„É¨„É≥„ÉÄ„Éľ„ĀęšĻó„āč
    const [y,m]=ym.split("-").map(Number);
    const r=e.recurrence||"none";
    const b=e.date.split("-").map(Number);
    if(r==="none")return e.date.slice(0,7)===ym?[e.date]:[];
    const baseT=new Date(b[0],b[1]-1,b[2]).getTime();
    const baseDow=new Date(b[0],b[1]-1,b[2]).getDay();
    const baseNth=Math.ceil(b[2]/7);
    const res=[],daysInM=new Date(y,m,0).getDate();
    for(let d=1;d<=daysInM;d++){
      const dt=new Date(y,m-1,d);if(dt.getTime()<baseT)continue;
      let ok=false;
      if(r==="weekly")ok=dt.getDay()===baseDow;
      else if(r==="monthly_date")ok=d===b[2];
      else if(r==="monthly_nth")ok=dt.getDay()===baseDow&&Math.ceil(d/7)===baseNth;
      else if(r==="yearly")ok=(m===b[1]&&d===b[2]);
      if(ok)res.push(ym+"-"+pad2(d));
    }
    return res;
  },

  swStart(e,el){const t=e.touches[0];el._sx=t.clientX;el._sy=t.clientY;el._drag=false;el._moved=false;el.style.transition="none";el._base=el._open?-84:0;},

      :'<div class="grip"></div><button class="sheet-close" onclick="App.closeSheet()" aria-label="ťĖČ„Āė„āč">‚úē</button>';
    sh.innerHTML=head+html;
    this._pendingSave=false;
    // iOS„ĀģSafari„ĀĮ vh „ĀĆ„ÄĆ„ÉĄ„Éľ„Éę„Éź„Éľ„āíťö†„Āó„Āüśôā„Āģťęė„Āē„ÄćŚüļśļĖ„Āß„ÄĀś©üÁ®ģ/ÁČą„Āę„āą„āä„ā∑„Éľ„Éą„ĀĆÁĒĽťĚĘ„āíŤ¶Ü„ĀĄšłä„Āģ„āį„É™„ÉÉ„Éó„ĀĆÁĒĽťĚĘŚ§Ė„ĀęŚáļ„āč„Äā
    // Śģüťöõ„ĀęŤ¶č„Āą„Ā¶„ĀĄ„āčťęė„Āē(visualViewport)„āíŚüļśļĖ„ĀęŚą∂ťôź„Āó„ÄĀŚŅÖ„Āöšłä„ĀęšĹôÁôĹ(=śöó„ĀĄśČÄ„āŅ„ÉÉ„Éó/„āį„É™„ÉÉ„Éó„ĀßťĖČ„Āė„āĆ„āč)„āíśģč„Āô„Äā
    const vvh=(window.visualViewport&&window.visualViewport.height)||window.innerHeight||640;
    sh.style.maxHeight=Math.round(vvh*(tall?0.94:0.88))+"px";

  closeSheet(){const sh=document.getElementById("sheet");sh.style.transform="";sh.style.opacity="";sh.classList.remove("show");document.getElementById("scrim").classList.remove("show");document.body.classList.remove("noscroll");if(this._onb&&this._onb.active)this.renderOnboard();},
  // šłč„ā∑„Éľ„Éą„āíśéī„āď„Āßšłč„Āí„āč„Ā®ťĖČ„Āė„āč(„āį„É™„ÉÉ„Éó/šłäťÉ®„ÉŹ„É≥„ÉČ„Éęť†ėŚüü„Āč„āČ)„Äāpointer/touchšł°ŚĮĺŚŅú„ĀßÁĘļŚģü„ĀęťĖČ„Āė„āč
  sheetDrag(){
    const sh=document.getElementById("sheet");if(!sh)return;
    let y0=null,dy=0,dragging=false;
    const start=(clientY,target)=>{
      if(dragging)return false;
      if(target&&target.closest&&target.closest(".sheet-close"))return false;
      const top=sh.getBoundingClientRect().top;
      const onGrip=(target&&target.classList&&target.classList.contains("grip"));
      if(!onGrip && (clientY-top)>=58)return false;          // šłäťÉ®„ÉŹ„É≥„ÉČ„Éęť†ėŚüü„Āģ„ĀŅ
      y0=clientY;dy=0;dragging=true;sh.style.transition="none";return true;
    };
    const move=(clientY)=>{if(!dragging)return;dy=Math.max(0,clientY-y0);sh.style.transform="translateY("+dy+"px)";sh.style.opacity=String(Math.max(0.35,1-dy/500));};
    const end=()=>{if(!dragging)return;dragging=false;sh.style.transition="";if(dy>80){this.closeSheet();}else{sh.style.transform="";sh.style.opacity="";}y0=null;dy=0;};
    sh.addEventListener("pointerdown",(e)=>{if(start(e.clientY,e.target)){try{sh.setPointerCapture(e.pointerId);}catch(err){}}});
    sh.addEventListener("pointermove",(e)=>{move(e.clientY);});
    sh.addEventListener("pointerup",end);
    sh.addEventListener("pointercancel",end);
    sh.addEventListener("touchstart",(e)=>{if(e.touches[0])start(e.touches[0].clientY,e.target);},{passive:true});
    sh.addEventListener("touchmove",(e)=>{if(dragging&&e.touches[0]){move(e.touches[0].clientY);e.preventDefault();}},{passive:false});
    sh.addEventListener("touchend",end);
    sh.addEventListener("touchcancel",end);
  },

  animateDashNums(){
    if(!this._numCache)this._numCache={};
    document.querySelectorAll("#view .cnum").forEach(el=>{
      const k=el.dataset.k, to=+el.dataset.v||0, prev=this._numCache[k];

      if(prev===undefined||prev===to)return;                  // ŚąĚŚõě or Ś§ČŚĆĖ„Ā™„Āó„ĀĮťĚôś≠Ę
      el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump");
      this._countUp(el,prev,to);
    });
  },
  _countUp(el,from,to){
    const dur=520, t0=performance.now();
    const step=(now)=>{
      let p=(now-t0)/dur; if(p>1)p=1;
      const e=1-Math.pow(1-p,3);                              // easeOutCubic
      el.textContent=yen(from+(to-from)*e);
      if(p<1)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },
  celebrate(c){
    if(navigator.vibrate)try{navigator.vibrate(c.kind==="income"?[18,40,18,40,28]:[28,30,18]);}catch(e){}
    const cls=c.kind==="income"?"inc":"exp";
    const cx=window.innerWidth/2, cy=window.innerHeight*0.56;
    const palette=["#E8744A","#7BA05B","#F2C94C","#56A8C7","#E36B8F","#F2994A"]; // „ÉÜ„É©„ā≥„ÉÉ„āŅ/„ÉĘ„āĻ/„ā§„ā®„É≠„Éľ/„ÉĖ„Éę„Éľ/„ÉĒ„É≥„āĮ/„ā™„É¨„É≥„āł
    const trash=[];
    // šł≠Ś§ģ„ā≥„ā§„É≥
    const coin=document.createElement("div");
    coin.className="coin-pop "+cls;
    coin.textContent=(c.kind==="income"?"Ôľč":"")+yen(c.amount);
    document.body.appendChild(coin); trash.push([coin,1300]);
    // ŚÖČ„Āģ„É™„É≥„āį2śěö
    for(let r=0;r<2;r++){
      const ring=document.createElement("div");
      ring.className="coin-ring "+cls;
      ring.style.left=cx+"px"; ring.style.top=cy+"px"; ring.style.animationDelay=(r*90)+"ms";
      document.body.appendChild(ring); trash.push([ring,900]);
    }
    // ÁīôŚźĻťõ™(ŤôĻŤČ≤„ÉĽŚõěŤĽĘ„ÉĽšłäśĖĻŚźĎ„ĀęśČď„Ā°šłä„Āí„Ā¶śē£ŚłÉ)
    const N=26;
    for(let i=0;i<N;i++){
      const p=document.createElement("div");
      p.className="confetti";
      const ang=(-Math.PI/2)+(Math.random()-0.5)*2.4;       // šłäśĖĻŚźĎšł≠ŚŅÉ„ĀęśČáÁä∂
      const dist=90+Math.random()*150;
      const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist+Math.random()*80; // ťáćŚäõ„ĀßŚįĎ„ĀóŤźĹ„Ā®„Āô
      p.style.left=cx+"px"; p.style.top=cy+"px";
      p.style.background=palette[i%palette.length];
      p.style.borderRadius=(i%2?"50%":"2px");
      const sz=8+Math.random()*8; p.style.width=sz+"px"; p.style.height=(sz*(i%3?1:.5))+"px";
      p.style.setProperty("--dx",dx+"px");
      p.style.setProperty("--dy",dy+"px");
      p.style.setProperty("--rot",(Math.random()*720-360)+"deg");
      p.style.setProperty("--dur",(0.8+Math.random()*0.6)+"s");
      document.body.appendChild(p); trash.push([p,1500]);
    }
    trash.forEach(([el,ms])=>setTimeout(()=>el.remove(),ms));
  },

  async loadCloud(){
    try{
      const{data,error}=await this._client.from("app_state").select("data,invite_code").eq("household_id",this.householdId).maybeSingle();
      if(error)throw error;
      this._inviteCode=data?(data.invite_code||""):"";
      if(data&&data.data&&Object.keys(data.data).length){
        this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan_staging",JSON.stringify(this.state));this.applyTheme();
      }else{
        await this.pushNow(); // ŚąĚŚõě: šĽä„Āģ„Éá„Éľ„āŅ„āí„āĮ„É©„ā¶„ÉČ„Āł
      }
      this._syncStatus="on";

  async pullLatest(){
    if(!this._client||!this.householdId)return;
    try{
      const{data,error}=await this._client.from("app_state").select("data,updated_at").eq("household_id",this.householdId).maybeSingle();
      if(error||!data||!data.data||!Object.keys(data.data).length)return;
      if(data.updated_at===this._lastPushed)return; // Ťá™ŚąÜ„ĀĆÁõīŚČć„ĀęťÄĀ„Ā£„ĀüśõīśĖį
      if(this._lastApplied&&data.updated_at&&data.updated_at<=this._lastApplied)return;
      this._lastApplied=data.updated_at;
      this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan_staging",JSON.stringify(this.state));this.applyTheme();this.render();
    }catch(e){}
  },
  subscribeRealtime(){
    if(this._channel)this._client.removeChannel(this._channel);
    this._channel=this._client.channel("hh-"+this.householdId)
      .on("postgres_changes",{event:"*",schema:"public",table:"app_state",filter:"household_id=eq."+this.householdId},payload=>{
        const nd=payload.new;if(!nd||!nd.data)return;if(nd.updated_at===this._lastPushed)return;
        this._lastApplied=nd.updated_at;
        this.state=nd.data;this.normalize();localStorage.setItem("imaoka_lifeplan_staging",JSON.stringify(this.state));this.applyTheme();this.render();
      }).subscribe((status)=>{ if(status==="SUBSCRIBED")this.pullLatest(); });
  },
  queueCloudPush(){clearTimeout(this._pushTimer);this._pushTimer=setTimeout(()=>this.pushNow(),700);},
  async pushNow(){
    if(!this._client||!this.householdId)return;
    const ts=new Date().toISOString();this._lastPushed=ts;
    const payload=JSON.parse(JSON.stringify(this.state));
    try{const{error}=await this._client.from("app_state").update({data:payload,updated_at:ts}).eq("household_id",this.householdId);if(error)throw error;try{localStorage.setItem("imaoka_owner_staging",this.householdId);}catch(e){}if(this._syncStatus!=="on"){this._syncStatus="on";this.render();}}catch(e){console.error(e);this._syncStatus="err";}
  },

// helpers used inside form callbacks
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function seg(id){const el=document.getElementById(id);const on=el&&el.querySelector("button.on");return on?on.dataset.v:"";}
function numv(id){const el=document.getElementById(id);if(!el)return 0;return +String(el.value).replace(/[^0-9.]/g,"")||0;}
function cf(n){n=+n||0;return n?n.toLocaleString("en-US"):"";}
function domainOf(url){if(!url)return "";try{let u=url;if(!/^https?:\/\//i.test(u))u="https://"+u;return new URL(u).hostname.replace(/^www\./,"");}catch(e){return "";}}
function pad2(n){return String(n).padStart(2,"0");}
function addDay(ymd){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+1);return ""+dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate());}
function addDaysStr(ymd,n){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+n);return dt.getFullYear()+"-"+pad2(dt.getMonth()+1)+"-"+pad2(dt.getDate());}
function readImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=1280;let w=img.width,h=img.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);try{cb(c.toDataURL("image/jpeg",0.72));}catch(e){cb(r.result);}};img.src=r.result;};r.readAsDataURL(file);}
