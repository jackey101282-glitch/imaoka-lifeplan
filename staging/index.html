<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex,nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#E86A35" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>[DEMO] Mietta — ステージング</title>
<link rel="manifest" href="../manifest.webmanifest" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png" />
<style>
:root{
  --color-primary-50:#F7ECE5;--color-primary-100:#EFD6C8;--color-primary-200:#E2B49E;
  --color-primary-300:#D49274;--color-primary-400:#CC8059;--color-primary-500:#C4714A;
  --color-primary-600:#A85C38;--color-primary-700:#8A4A2C;
  --color-secondary-50:#EDF2ED;--color-secondary-100:#D9E4DA;--color-secondary-200:#BACBBC;
  --color-secondary-300:#9DB5A0;--color-secondary-400:#89A68C;--color-secondary-500:#7A9E7E;
  --color-secondary-600:#5E7E63;--color-secondary-700:#46624A;
  --color-accent-400:#6BB394;--color-accent-500:#4E9C78;--color-accent-600:#37785C;
  --color-warning:#D9952F;--color-danger:#CC5B4E;
  --color-bg-base:#F7F3EE;--color-bg-surface:#FDFBF8;--color-bg-muted:#EFE9E0;
  --color-border:#E5DFD6;--color-border-strong:#CFC7BA;
  --color-text-primary:#2A2218;--color-text-secondary:#7A6E63;--color-text-disabled:#B0A89E;
  --color-text-on-primary:#FFFFFF;
  --font-family-base:'Hiragino Sans','Hiragino Kaku Gothic ProN','BIZ UDGothic','Noto Sans JP',sans-serif;
  --font-family-number:'DIN Alternate','SF Mono','Noto Sans JP',sans-serif;
  --text-xs:0.625rem;--text-sm:0.75rem;--text-base:0.875rem;--text-md:1rem;--text-lg:1.125rem;
  --text-xl:1.375rem;--text-2xl:1.75rem;--text-3xl:2.25rem;
  --fw-r:400;--fw-m:500;--fw-b:700;
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;
  --space-8:32px;--space-10:40px;--space-12:48px;--space-16:64px;--screen-px:16px;
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--radius-full:9999px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.06);--shadow-sm:0 2px 8px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --shadow-primary:0 4px 12px rgba(196,113,74,.28);
}
html[data-theme="dark"]{
  /* シックで落ち着いたニュートラル・チャコール。差し色(テラコッタ/セージ)が映える */
  --color-bg-base:#0F1013;--color-bg-surface:#191B1F;--color-bg-muted:#23262C;
  --color-border:#2C2F36;--color-border-strong:#3D424B;
  --color-text-primary:#ECEEF1;--color-text-secondary:#99A0AB;--color-text-disabled:#565C66;
  --color-primary-50:#2A201B;--color-primary-100:#3A2A22;--color-primary-200:#5C3F2E;
  --color-primary-300:#C97E58;--color-primary-400:#D6885F;--color-primary-500:#E08A5E;
  --color-primary-600:#E89C72;--color-primary-700:#F0B392;
  --color-secondary-50:#1B2620;--color-secondary-100:#22332A;--color-secondary-200:#2E4A39;
  --color-secondary-300:#5E8466;--color-secondary-400:#79A081;--color-secondary-500:#8FBE96;
  --color-secondary-600:#A6D0AC;--color-secondary-700:#BCDCC0;
  --color-accent-400:#57C08F;--color-accent-500:#5BC596;--color-accent-600:#86D6AE;
  --color-warning:#E8B055;--color-danger:#E8705F;
  --shadow-xs:0 1px 2px rgba(0,0,0,.4);--shadow-sm:0 2px 8px rgba(0,0,0,.45);
  --shadow-md:0 4px 16px rgba(0,0,0,.5);--shadow-lg:0 10px 36px rgba(0,0,0,.6);
  --shadow-primary:0 4px 14px rgba(224,138,94,.28);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden}
html,body{margin:0;padding:0;overscroll-behavior-y:none}
body.noscroll{overflow:hidden}
body{
  font-family:var(--font-family-base);background:var(--color-bg-base);
  color:var(--color-text-primary);font-size:var(--text-base);line-height:1.6;
  -webkit-font-smoothing:antialiased;padding-bottom:calc(64px + env(safe-area-inset-bottom));
  overflow-wrap:break-word;
}
.num{font-family:var(--font-family-number);letter-spacing:-.01em}
/* ===== Header ===== */
.app-header{
  position:sticky;top:0;z-index:30;background:var(--color-bg-surface);
  border-bottom:1px solid var(--color-border);
  padding:calc(env(safe-area-inset-top) + 10px) var(--screen-px) 10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.app-header h1{font-size:var(--text-lg);font-weight:var(--fw-b);margin:0}
.app-header .sub{font-size:var(--text-xs);color:var(--color-text-secondary);font-weight:var(--fw-m)}
.hd-right{display:flex;align-items:center;gap:8px}
.eye-btn{flex:0 0 auto;border:1px solid var(--color-border);background:var(--color-bg-surface);color:var(--color-text-secondary);width:38px;height:38px;border-radius:var(--radius-full);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.eye-btn:active{transform:scale(.94)}
.eye-btn.on{background:var(--color-primary-50);border-color:var(--color-primary-200);color:var(--color-primary-600)}
.month-nav{display:flex;align-items:center;gap:2px;background:var(--color-primary-50);border:1px solid var(--color-primary-100);border-radius:var(--radius-full);padding:3px 4px}
.month-nav button{border:none;background:transparent;color:var(--color-primary-600);width:30px;height:30px;border-radius:var(--radius-full);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:var(--color-primary-100)}
.month-nav .cur{font-weight:var(--fw-b);font-size:var(--text-base);min-width:88px;text-align:center;color:var(--color-primary-700);cursor:pointer}
.month-nav.off{background:#FCEFD9;border-color:#F3D9A8}
.month-nav.off button,.month-nav.off .cur{color:var(--color-warning)}
.monthbar{position:sticky;top:0;z-index:29;display:flex;justify-content:center;background:var(--color-bg-surface);border-bottom:1px solid var(--color-border);padding:7px var(--screen-px)}
html[data-theme="dark"] .month-nav .cur,html[data-theme="dark"] .month-nav button{color:var(--color-primary-500)}
html[data-theme="dark"] .month-nav.off{background:#3a2f1a;border-color:#5a4520}
html[data-theme="dark"] .month-nav.off button,html[data-theme="dark"] .month-nav.off .cur{color:var(--color-warning)}
.sync-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-left:2px;vertical-align:middle}
.sync-on{background:var(--color-accent-500)}.sync-off{background:var(--color-text-disabled)}
.sync-err{background:var(--color-danger)}
/* ===== Layout ===== */
main{padding:var(--space-4) var(--screen-px) 24px;max-width:560px;margin:0 auto;animation:fade .2s ease-out}
@keyframes fade{from{opacity:0}to{opacity:1}}
.card{
  background:var(--color-bg-surface);border-radius:var(--radius-lg);padding:var(--space-5);
  box-shadow:var(--shadow-sm);border:1px solid var(--color-border);margin-bottom:var(--space-3);
}
.card-title{font-size:var(--text-base);font-weight:var(--fw-b);color:var(--color-text-secondary);margin:0 0 var(--space-3)}
.section-title{font-size:var(--text-lg);font-weight:var(--fw-b);margin:var(--space-6) 0 var(--space-3);display:flex;justify-content:space-between;align-items:center}
.section-title .link{font-size:var(--text-sm);color:var(--color-secondary-500);font-weight:var(--fw-m);cursor:pointer}
.big-num{font-family:var(--font-family-number);font-size:var(--text-3xl);font-weight:var(--fw-b);line-height:1.1}
.mid-num{font-family:var(--font-family-number);font-size:var(--text-2xl);font-weight:var(--fw-b)}
.muted{color:var(--color-text-secondary)}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.row + .row{margin-top:var(--space-3)}
.divider{height:1px;background:var(--color-border);margin:var(--space-3) 0}
/* progress */
.prog{background:var(--color-bg-muted);border-radius:var(--radius-full);height:8px;overflow:hidden;margin-top:6px}
.prog.lg{height:12px}
.prog > span{display:block;height:100%;border-radius:var(--radius-full);transition:width .6s cubic-bezier(.4,0,.2,1)}
.fill-primary{background:var(--color-primary-500)}.fill-accent{background:var(--color-accent-500)}
.fill-danger{background:var(--color-danger)}.fill-warning{background:var(--color-warning)}.fill-sec{background:var(--color-secondary-400)}
/* chips */
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:var(--radius-sm);padding:3px 9px;font-size:var(--text-sm);font-weight:var(--fw-m);white-space:nowrap}
.chip-full{border-radius:var(--radius-full);padding:3px 11px}
.chip-over{background:#FDECEC;color:var(--color-danger)}
.chip-todo{background:var(--color-bg-muted);color:var(--color-text-secondary)}
.chip-h{background:var(--color-secondary-50);color:var(--color-secondary-500)}
.chip-w{background:var(--color-primary-50);color:var(--color-primary-600)}
.chip-both{background:#E8F5EF;color:var(--color-accent-600)}
html[data-theme="dark"] .chip-both{background:#1d3329}
html[data-theme="dark"] .chip-over{background:#3a2020}
.badge{background:var(--color-danger);color:#fff;font-size:var(--text-xs);font-weight:var(--fw-b);border-radius:var(--radius-full);min-width:18px;height:18px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center}
.pill{font-size:var(--text-xs);font-weight:var(--fw-b);padding:2px 8px;border-radius:var(--radius-full)}
.pill-ok{background:#E8F5EF;color:var(--color-accent-600)}
.pill-warn{background:#FCEFD9;color:var(--color-warning)}
.pill-bad{background:#FDECEC;color:var(--color-danger)}
html[data-theme="dark"] .pill-ok{background:#16291F}
html[data-theme="dark"] .pill-warn{background:#2E2412}
html[data-theme="dark"] .pill-bad{background:#321C19}
/* 警告トーンのカード(これからの予定/オフライン等)。ダークでも浮かない */
.card-warn{background:#FCEFD9;border-color:#F3D9A8}
.card-warn .lo{color:#9a6a1a}
html[data-theme="dark"] .card-warn{background:#2A2114;border-color:#46381E}
html[data-theme="dark"] .card-warn .lo{color:var(--color-warning)}
/* list item */
.li{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--color-border)}
.li:last-child{border-bottom:none}
.li .ic{font-size:19px;width:40px;height:40px;border-radius:12px;background:var(--color-bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.ico{display:inline-block;vertical-align:-.18em;flex-shrink:0}
.ttl-ico{display:inline-flex;align-items:center;gap:7px}
.li .main{flex:1;min-width:0}
.li .ttl{font-weight:var(--fw-m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .meta{font-size:var(--text-sm);color:var(--color-text-secondary)}
.li .amt{font-family:var(--font-family-number);font-weight:var(--fw-b);white-space:nowrap}
.li.done .ttl{text-decoration:line-through;color:var(--color-text-disabled)}
.li.done{opacity:.6}
.check{width:24px;height:24px;border-radius:50%;border:2px solid var(--color-border-strong);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.check.on{background:var(--color-accent-500);border-color:var(--color-accent-500)}
.empty{text-align:center;color:var(--color-text-secondary);padding:24px 8px;font-size:var(--text-base)}
.empty .e-ic{font-size:30px;width:64px;height:64px;border-radius:20px;background:var(--color-bg-muted);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;line-height:1}
/* buttons */
.btn{border:none;border-radius:var(--radius-md);padding:12px 20px;font-size:var(--text-md);font-weight:var(--fw-b);min-height:48px;cursor:pointer;font-family:inherit;transition:all .12s ease-out;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--color-primary-500);color:var(--color-text-on-primary);box-shadow:var(--shadow-primary)}
.btn-sec{background:transparent;color:var(--color-primary-500);border:1.5px solid var(--color-primary-500)}
.btn-ghost{background:var(--color-bg-muted);color:var(--color-text-primary)}
.btn-danger{background:var(--color-danger);color:#fff}
.btn-block{width:100%}
.btn-sm{min-height:38px;padding:8px 14px;font-size:var(--text-base)}
/* 戻るボタン: 左上の塗りつぶしピル(追加ボタンと誤認しないように) */
.back-btn{display:inline-flex;align-items:center;gap:5px;border:none;background:var(--color-bg-muted);color:var(--color-text-secondary);border-radius:var(--radius-full);padding:8px 14px 8px 10px;font-size:var(--text-base);font-weight:var(--fw-m);cursor:pointer;margin-bottom:14px;line-height:1;font-family:inherit}
.back-btn:active{transform:scale(.96)}
.back-btn .ico{flex-shrink:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.topbar .back-btn{margin-bottom:0}
.top-add{flex:0 0 auto;width:40px;height:40px;border-radius:var(--radius-full);border:none;background:var(--color-primary-500);color:var(--color-text-on-primary);font-size:24px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-primary);font-family:inherit}
.top-add:active{transform:scale(.94)}
/* FAB */
.fab{position:fixed;right:18px;bottom:calc(74px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:var(--radius-full);background:var(--color-primary-500);color:#fff;font-size:28px;border:none;box-shadow:var(--shadow-primary);cursor:pointer;z-index:25;display:flex;align-items:center;justify-content:center;white-space:nowrap}
.fab.wide{width:auto;height:52px;padding:0 22px;font-size:var(--text-md);font-weight:var(--fw-b);gap:4px}
.fab:active{transform:scale(.94)}
/* filters */
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fchip{border:1px solid var(--color-border);background:var(--color-bg-surface);color:var(--color-text-secondary);border-radius:var(--radius-full);padding:7px 14px;font-size:var(--text-base);white-space:nowrap;cursor:pointer;font-weight:var(--fw-m)}
.fchip.on{background:var(--color-primary-500);color:#fff;border-color:var(--color-primary-500)}
/* bottom nav */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--color-bg-surface);border-top:1px solid var(--color-border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;border:none;background:none;padding:8px 0 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--color-text-disabled);position:relative}
.tab .ti{font-size:22px;line-height:1}
.tab .tl{font-size:var(--text-xs);font-weight:var(--fw-m)}
.tab.on{color:var(--color-primary-500)}
.tab .nbadge{position:absolute;top:2px;right:calc(50% - 22px)}
/* sheet/modal */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.show{opacity:1;pointer-events:auto}
/* スマホ幅では left:0;right:0 のみで画面いっぱい(width/max-width/vwを使わずはみ出しを根絶) */
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--color-bg-surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:8px var(--screen-px) calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);width:auto;margin:0;box-sizing:border-box}
.sheet.show{transform:translateY(0)}
.sheet input,.sheet select,.sheet textarea{max-width:100%;box-sizing:border-box}
@media(min-width:600px){.sheet{max-width:560px;margin:0 auto}}
.sheet .grip{width:44px;height:5px;background:var(--color-border-strong);border-radius:3px;margin:8px auto 12px;cursor:grab;touch-action:none}
.sheet .grip:active{cursor:grabbing}
.icon-pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:8px;max-height:188px;overflow-y:auto;padding:2px}
.icon-pick-btn{height:48px;border:1.5px solid var(--color-border);background:var(--color-bg-muted);border-radius:12px;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.icon-pick-btn:active{transform:scale(.94)}
.icon-pick-btn.on{background:var(--color-primary-50);border-color:var(--color-primary-500);color:var(--color-primary-600)}
.sheet-close{position:absolute;top:12px;right:14px;width:34px;height:34px;border-radius:var(--radius-full);border:none;background:var(--color-bg-muted);color:var(--color-text-secondary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.sheet-close:active{background:var(--color-border)}
.sheet h3{padding-right:40px}
.sheet h3{margin:0 0 var(--space-4);font-size:var(--text-xl)}
/* form */
label.fld{display:block;margin-bottom:var(--space-4)}
label.fld .lbl{font-size:var(--text-sm);font-weight:var(--fw-m);color:var(--color-text-secondary);margin-bottom:4px;display:block}
input,select,textarea{width:100%;background:var(--color-bg-muted);border:1.5px solid var(--color-border);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-md);font-family:inherit;color:var(--color-text-primary);min-height:48px}
textarea{min-height:72px;resize:vertical;line-height:1.5}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--color-primary-500);background:var(--color-bg-surface);box-shadow:0 0 0 3px rgba(232,106,53,.15)}
input.amt{font-family:var(--font-family-number);text-align:right;font-size:var(--text-xl);font-weight:var(--fw-b)}
.seg{display:flex;background:var(--color-bg-muted);border-radius:var(--radius-md);padding:4px;gap:4px}
.seg button{flex:1;border:none;background:none;padding:9px;border-radius:8px;font-weight:var(--fw-m);color:var(--color-text-secondary);cursor:pointer;font-family:inherit;font-size:var(--text-base)}
.seg button.on{background:var(--color-bg-surface);color:var(--color-primary-600);font-weight:var(--fw-b);box-shadow:var(--shadow-xs)}
.form-row{display:flex;flex-direction:column;gap:10px}.form-row > *{flex:1 1 0;min-width:0}
@media(min-width:600px){.form-row{flex-direction:row}}
input[type=date],input[type=time],input[type=month],input[type=datetime-local]{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%;width:100%;background-clip:padding-box}
input[type=date]::-webkit-date-and-time-value,input[type=time]::-webkit-date-and-time-value,input[type=month]::-webkit-date-and-time-value{text-align:left;margin:0}
input::-webkit-calendar-picker-indicator{margin-left:0}
.sheet-actions{display:flex;gap:10px;margin-top:8px}
.delete-link{text-align:center;color:var(--color-danger);font-size:var(--text-base);padding:14px;cursor:pointer;font-weight:var(--fw-m)}
/* settings */
.set-group{background:var(--color-bg-surface);border-radius:var(--radius-lg);border:1px solid var(--color-border);overflow:hidden;margin-bottom:var(--space-4)}
.set-head{font-size:var(--text-xs);letter-spacing:.04em;color:var(--color-text-secondary);font-weight:var(--fw-b);margin:var(--space-5) 4px var(--space-2)}
.set-cell{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--color-border)}
.set-cell:last-child{border-bottom:none}
.set-cell .lab{font-weight:var(--fw-m)}
.set-cell .desc{font-size:var(--text-sm);color:var(--color-text-secondary)}
.switch{position:relative;width:48px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:var(--color-border-strong);border-radius:var(--radius-full);transition:.2s;cursor:pointer}
.switch .sl:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .sl{background:var(--color-accent-500)}
.switch input:checked + .sl:before{transform:translateX(20px)}
/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.cal-dow{text-align:center;font-size:var(--text-xs);color:var(--color-text-secondary);font-weight:var(--fw-b);padding:4px 0}
.cal-cell{aspect-ratio:1;border-radius:var(--radius-md);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;font-size:var(--text-base);cursor:pointer;position:relative;background:var(--color-bg-surface);border:1px solid transparent;font-family:var(--font-family-number)}
.cal-cell.muted{color:var(--color-text-disabled);background:transparent}
.cal-cell.today{border-color:var(--color-primary-500);font-weight:var(--fw-b)}
.cal-cell.sun{color:var(--color-danger)}.cal-cell.sat{color:var(--color-secondary-500)}
.cal-dots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;justify-content:center}
.cdot{width:5px;height:5px;border-radius:50%}
.cd-pay{background:var(--color-danger)}.cd-task{background:var(--color-primary-500)}.cd-event{background:var(--color-secondary-400)}.cd-wish{background:#9C6ADE}.cd-income{background:var(--color-accent-500)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:var(--text-sm);color:var(--color-text-secondary)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--color-text-primary);color:var(--color-bg-surface);padding:11px 18px;border-radius:var(--radius-full);font-size:var(--text-base);font-weight:var(--fw-m);z-index:60;opacity:0;transition:.25s;box-shadow:var(--shadow-lg);max-width:calc(100% - 32px);box-sizing:border-box;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
a.tlink{color:var(--color-secondary-500)}
.chev{display:inline-block;transition:transform .2s;color:var(--color-text-disabled);font-size:18px;font-weight:700;line-height:1}
.chev.open{transform:rotate(180deg)}
.warn-box{margin-top:12px;background:#FDECEC;color:var(--color-danger);border-radius:var(--radius-md);padding:10px 12px;font-size:var(--text-sm);font-weight:var(--fw-m);line-height:1.6;display:flex;gap:7px;align-items:flex-start}
.warn-box .ico{margin-top:2px}
.authwrap{position:fixed;inset:0;z-index:100;background:var(--color-bg-base);display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.authcard{width:100%;max-width:380px;margin:auto;background:var(--color-bg-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:28px 24px;box-shadow:var(--shadow-md)}
.authcard h2{font-size:var(--text-xl)}
.auth-switch{text-align:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--color-border);font-size:var(--text-sm);color:var(--color-text-secondary)}
.invite-note{background:var(--color-secondary-50);color:var(--color-secondary-600);border:1px solid var(--color-secondary-200);border-radius:var(--radius-md);padding:10px 12px;font-size:var(--text-sm);line-height:1.6;margin-bottom:16px;align-items:flex-start}
.invite-note .ico{margin-top:2px;flex-shrink:0}
.auth-err{background:#FDECEC;color:var(--color-danger);border:1px solid #F3C9C4;border-radius:var(--radius-md);padding:10px 13px;font-size:var(--text-sm);font-weight:var(--fw-m);line-height:1.5;margin-bottom:14px}
html[data-theme="dark"] .auth-err{background:#321C19;border-color:#5a322c}
@keyframes authshake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.my-brand{text-align:center;margin-bottom:22px}
.my-brand .ic{width:72px;height:72px;border-radius:18px;display:inline-block;object-fit:cover;box-shadow:0 8px 20px rgba(0,0,0,.16)}
.my-wordmark{font-size:27px;font-weight:800;letter-spacing:-.025em;line-height:1.1;margin:14px 0 4px}
.my-tag{font-size:var(--text-sm);color:var(--color-text-secondary);margin:0}
html[data-theme="dark"] .warn-box{background:#3a2020}
/* 共有ポケット: スマホ2列(PCでは下のメディアクエリで多列に) */
.pocket-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* ===== PC(広い画面)用レイアウト: 左サイドバー + 横幅を活かした段組み ===== */
@media (min-width:900px){
  body{padding-bottom:0;padding-left:230px}
  .tabbar{flex-direction:column;top:0;bottom:0;left:0;right:auto;width:230px;height:100vh;border-top:none;border-right:1px solid var(--color-border);padding:16px 14px;gap:4px;justify-content:flex-start;align-items:stretch}
  .tabbar::before{content:"Mietta";display:block;font-weight:800;font-size:var(--text-lg);letter-spacing:-.02em;color:var(--color-primary-600);padding:10px 12px 18px;line-height:1.2}
  .tab{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:14px;padding:13px 14px;border-radius:var(--radius-md);width:100%}
  .tab:hover{background:var(--color-bg-muted)}
  .tab.on{background:var(--color-primary-50)}
  .tab .ti{font-size:21px;width:24px;text-align:center}
  .tab .tl{font-size:var(--text-md);font-weight:var(--fw-m)}
  .tab .nbadge{position:static;margin-left:auto}
  .app-header{padding-left:32px;padding-right:32px}
  /* 広いキャンバス。一覧/フォーム系は読みやすい幅にしぼる */
  main{max-width:1180px;padding-top:24px;padding-left:32px;padding-right:32px}
  main.view-settings,main.view-simulator,main.view-income_list,main.view-expense_list,main.narrow{max-width:760px}
  .sheet{left:230px;right:0;margin:0 auto}
  .fab{right:max(24px, calc((100vw - 230px - 1180px)/2 + 24px))}
  /* ダッシュボード: 上部に主要3数字のヒーロー、その下は2列でゆったり */
  main.view-dashboard{max-width:1040px}
  main.view-dashboard .dash-hero{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;align-items:start}
  main.view-dashboard .dash-hero > .card{margin-bottom:0}
  main.view-dashboard .dash-hero > .card:nth-child(3){grid-column:1 / -1}
  main.view-dashboard .dash-cols{column-count:2;column-gap:22px}
  main.view-dashboard .dblk{break-inside:avoid;-webkit-column-break-inside:avoid;page-break-inside:avoid}
  main.view-dashboard .dblk > .section-title:first-child{margin-top:0}
  main.view-dashboard .dblk > .card{margin-bottom:22px}
  main.view-lifeplan{max-width:1040px}
  main.view-lifeplan .dash-cols{column-count:2;column-gap:22px}
  main.view-lifeplan .dblk{break-inside:avoid;-webkit-column-break-inside:avoid;page-break-inside:avoid}
  main.view-lifeplan .dblk > .section-title:first-child{margin-top:0}
  main.view-lifeplan .dblk > .card{margin-bottom:22px}
  /* タスク: プロジェクトと個別タスクを左右2カラムに */
  main.view-tasks .task-cols{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;align-items:start}
  main.view-tasks .task-cols .section-title{margin-top:0}
  /* カレンダー: 月表示を左、予定/集計を右に */
  main.view-calendar .cal-layout{display:grid;grid-template-columns:minmax(420px,1.05fr) 1fr;gap:24px;align-items:start}
  main.view-calendar .cal-side .section-title:first-child{margin-top:0}
  /* 共有: ポケットを大きく(3つ並び目安) */
  main.view-share .pocket-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
}
/* 入れると気持ちいい: 数字カウントアップ＋ド派手コイン演出 */
.cnum{display:inline-block;transition:none}
@keyframes numbump{0%{transform:scale(1)}22%{transform:scale(1.28)}45%{transform:scale(.94)}68%{transform:scale(1.08)}100%{transform:scale(1)}}
.cnum.bump{animation:numbump .62s cubic-bezier(.34,1.56,.64,1)}
@keyframes numglow{0%,100%{text-shadow:none}30%{text-shadow:0 0 18px currentColor,0 0 6px currentColor}}
.cnum.bump{animation:numbump .62s cubic-bezier(.34,1.56,.64,1),numglow .6s ease-out}
/* 中央のコイン(大きく・弾む・発光) */
.coin-pop{position:fixed;left:50%;top:56%;transform:translate(-50%,-50%);z-index:10000;pointer-events:none;
  font-family:var(--font-family-number);font-weight:900;font-size:42px;letter-spacing:.5px;
  padding:12px 24px;border-radius:999px;white-space:nowrap;
  box-shadow:0 14px 44px rgba(0,0,0,.28);animation:coinrise 1.25s cubic-bezier(.18,1.4,.4,1) forwards}
.coin-pop.exp{background:linear-gradient(135deg,var(--color-primary-400),var(--color-primary-600));color:#fff;box-shadow:0 14px 44px rgba(0,0,0,.28),0 0 36px var(--color-primary-300)}
.coin-pop.inc{background:linear-gradient(135deg,var(--color-secondary-400),var(--color-secondary-600));color:#fff;box-shadow:0 14px 44px rgba(0,0,0,.28),0 0 36px var(--color-secondary-300)}
@keyframes coinrise{
  0%{opacity:0;transform:translate(-50%,-10%) scale(.3) rotate(-12deg)}
  16%{opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(4deg)}
  30%{transform:translate(-50%,-52%) scale(.96) rotate(-2deg)}
  42%{transform:translate(-50%,-51%) scale(1.06) rotate(0)}
  55%{transform:translate(-50%,-52%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-175%) scale(.9)}}
/* 光のリング(2枚バースト) */
.coin-ring{position:fixed;z-index:9998;pointer-events:none;border-radius:50%;border:4px solid var(--color-primary-400);
  width:60px;height:60px;transform:translate(-50%,-50%) scale(.2);animation:ringburst .7s ease-out forwards}
.coin-ring.inc{border-color:var(--color-secondary-400)}
@keyframes ringburst{0%{opacity:.7;transform:translate(-50%,-50%) scale(.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(3.4)}}
/* 紙吹雪(虹色・回転・散布) */
.confetti{position:fixed;z-index:9999;pointer-events:none;width:11px;height:11px;
  animation:confetti var(--dur) cubic-bezier(.2,.6,.3,1) forwards}
@keyframes confetti{0%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(.4)}}
@media(prefers-reduced-motion:reduce){.cnum.bump{animation:none}.coin-pop,.coin-ring,.confetti{animation-duration:.01s}}
</style>

/* 目標額＝内訳がある場合はその合計、無ければtarget（後方互換） */
function goalAmt(g){return (g&&g.items&&g.items.length)?g.items.reduce((a,b)=>a+(+b.amount||0),0):(+(g&&g.target)||0);}
/* 特別費の年額。cycle: perYear=回数×単価 / everyN=総額÷years / fixed=年額。後方互換:cycle無し=count有→perYear,無→fixed */
function specialCycle(it){return (it&&it.cycle)||(it&&it.count!=null?"perYear":"fixed");}
function specialAnnual(it){
  if(!it)return 0;
  const sum=(it.units||[]).reduce((a,b)=>a+(+b.amount||0),0);
  const cyc=specialCycle(it);
  if(cyc==="perYear")return (it.count!=null?it.count:1)*sum;
  if(cyc==="everyN")return Math.round(sum/Math.max(1,(+it.years||1)));
  return sum;
}
/* カードに出す頻度の説明 */
function specialCycleDesc(it){
  const sum=(it.units||[]).reduce((a,b)=>a+(+b.amount||0),0);
  const cyc=specialCycle(it);
  if(cyc==="perYear")return "年"+(it.count!=null?it.count:1)+"回 × "+yen(sum);
  if(cyc==="everyN")return (it.years||1)+"年に1回 "+yen(sum);
  return "毎年 "+yen(sum);
}
/* 期日からの逆算ペース */
function goalPace(g){
  if(!g||!g.targetDate)return null;
  const amt=goalAmt(g), need=Math.max(0,amt-(+g.current||0));
  const p=g.targetDate.split("-"),y=+p[0],mo=+p[1];
  const now=new Date(), tgt=new Date(y,mo-1,1);
  const days=Math.ceil((tgt-now)/86400000);
  const months=(y-now.getFullYear())*12+(mo-1-now.getMonth());
  const perMonth=months>0?Math.ceil(need/months/1000)*1000:need;
  return {need,days,months,perMonth};
}

const APP_CONFIG = { url:"https://imfynopqugqiczevrmsl.supabase.co", key:"sb_publishable_ISnAg8AcBswzT5lL7CtUeA_Yev1Om85" };

const App = {
  state:null, tab:"dashboard", curMonth:thisMonth(), shareView:"home", curFolderId:null,
  taskView:"home", curProjectId:null, curSubId:null,
  dashOpen:{inc:false,exp:false},
  goalOpen:{},

  _user:null, householdId:null, _inviteCode:"", _pendingInvite:"", _authView:"login", hideAmt:false,

  init(){
    try{if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();}catch(e){}
    this.load();
    this.deviceOwner=localStorage.getItem("imaoka_device")||"";
    this.hideAmt=localStorage.getItem("imaoka_hide_amt")==="1"; HIDE_AMT=this.hideAmt;
    // 既存ユーザー移行(初回1回だけ): 端末に旧初期値"auto"が残っている場合はlightへ。以後ユーザーが選び直したautoは尊重
    try{if(!localStorage.getItem("imaoka_theme_mig")){if(localStorage.getItem("imaoka_theme")==="auto")localStorage.setItem("imaoka_theme","light");localStorage.setItem("imaoka_theme_mig","1");}}catch(e){}
    this.applyTheme();
    const _lt=localStorage.getItem("imaoka_tab");
    this.go(["dashboard","tasks","calendar","share","settings"].includes(_lt)?_lt:"dashboard");
    this.notifyPending();
    this.sheetDrag();
    this.initCloud();
    window.addEventListener("beforeunload",()=>this.save());
    // アプリに戻ってきた/再表示されたら最新を取得(iOSは背景でリアルタイム接続が切れるため)
    document.addEventListener("visibilitychange",()=>{if(!document.hidden)this.pullLatest();});
    window.addEventListener("online",()=>this.pullLatest());
  },
  setDevice(v){this.deviceOwner=v;localStorage.setItem("imaoka_device",v);this.render();},
  // 金額の目隠し(友だちに見せる時など。この端末だけ・相手には影響しない)
  toggleHideAmt(){this.hideAmt=!this.hideAmt;HIDE_AMT=this.hideAmt;localStorage.setItem("imaoka_hide_amt",this.hideAmt?"1":"0");this.render();this.toast(this.hideAmt?"金額を隠しました":"金額を表示しました");},
  // 通知は端末ごと(localStorage)。相手には同期されない
  notifyOn(){return localStorage.getItem("imaoka_notify")==="1"&&("Notification"in window)&&Notification.permission==="granted";},
  toggleNotify(on){
    if(!on){localStorage.setItem("imaoka_notify","0");this.render();return;}
    if(!("Notification"in window)){
      const ios=/iP(hone|ad|od)/.test(navigator.userAgent);
      const standalone=window.navigator.standalone===true||matchMedia("(display-mode:standalone)").matches;
      this.toast(ios&&!standalone?"iPhoneは『ホーム画面に追加』して、そのアイコンから開くと通知をオンにできます":"このブラウザは通知に対応していません");
      this.render();return;
    }
    Notification.requestPermission().then(p=>{const ok=(p==="granted");localStorage.setItem("imaoka_notify",ok?"1":"0");this.render();if(!ok)this.toast("通知が許可されませんでした");}).catch(()=>{this.toast("通知をオンにできませんでした");this.render();});
  },
  notify(title,body){if(this.notifyOn()){try{new Notification(title,{body});}catch(e){}}},
  pendingApprovals(){return this.state.expenses.filter(e=>e.approve==="pending");},
  notifyPending(){const mine=this.pendingApprovals().filter(e=>this.deviceOwner&&e.reqBy&&e.reqBy!==this.deviceOwner);if(mine.length)this.notify("承認待ちの支出",mine.length+"件の確認をお願いします");},
  approveExpense(id){const e=this.state.expenses.find(x=>x.id===id);if(e){e.approve="approved";this.commit();this.toast("承認しました");}},
  seeDetail(e){return !e.private||!this.deviceOwner||e.owner===this.deviceOwner;},

  /* ---- persistence ---- */
  load(){
    try{
      const raw=localStorage.getItem("imaoka_lifeplan_staging");
      this.state = raw?JSON.parse(raw):seedState();
    }catch(e){this.state=seedState();}
    this.normalize();
  },
  normalize(){
    const s=this.state; s.settings=s.settings||{}; s.settings.sync=s.settings.sync||{enabled:false,url:"",key:"",space:""};
    if(s.settings.approveThreshold==null)s.settings.approveThreshold=0;
    if(s.settings.spaceName==null)s.settings.spaceName="";
    if(!s.settings.phase)s.settings.phase="newlywed";
    ["incomes","expenses","accounts","debts","goals","wishes","tasks","events","links","notes","folders","items","projects","subprojects"].forEach(k=>{if(!Array.isArray(s[k]))s[k]=[]});
    s.sim=s.sim||{current:0,monthly:"",bonus:0,years:10,events:[]}; if(!Array.isArray(s.sim.events))s.sim.events=[];
    s.customCats=s.customCats||{}; ["fixed","variable","task","income","wish"].forEach(g=>{if(!Array.isArray(s.customCats[g]))s.customCats[g]=[]});
    s.goals.forEach(g=>{if(!Array.isArray(g.items))g.items=[];});
    if(!Array.isArray(s.special))s.special=[];
    s.incomes.forEach(i=>{if(!i.date)i.date=(i.month||thisMonth())+"-01";i.month=i.date.slice(0,7);});
    s.expenses.forEach(e=>{if(!e.date)e.date=(e.month||thisMonth())+"-01";e.month=e.date.slice(0,7);});
    // 旧バージョン(やりたい/リンク)からフォルダ構造へ自動移行
    if(!s._foldersMigrated){
      const ensure=(name,icon)=>{let f=s.folders.find(x=>x.name===name);if(!f){f={id:uid(),name,icon};s.folders.push(f);}return f;};
      (s.wishes||[]).forEach(w=>{
        const c=findCat("wish",w.cat);const f=ensure(c.label||"やりたいこと",c.icon||"🌟");
        s.items.push({id:uid(),folderId:f.id,title:w.title,url:"",memo:w.memo||"",loginId:"",password:"",target:w.target||0,current:w.current||0,date:w.date||"",done:w.status==="done"});
      });
      if((s.links||[]).length){const f=ensure("よく使うサイト","🔗");
        s.links.forEach(l=>s.items.push({id:uid(),folderId:f.id,title:l.name||l.url||"サイト",url:l.url||"",memo:l.memo||"",loginId:l.loginId||"",password:l.password||"",target:0,current:0,date:"",done:false}));
      }
      s.wishes=[];s.links=[];s._foldersMigrated=true;
    }
  },
  save(skipCloud){
    localStorage.setItem("imaoka_lifeplan_staging",JSON.stringify(this.state));
    if(!skipCloud && this._client && this.householdId) this.queueCloudPush();
  },
  // called after any data mutation
  commit(){ this.save(); this.render(); },

  /* ---- navigation ---- */
  go(tab){
    this.tab=tab;
    if(["dashboard","lifeplan","tasks","calendar","share","settings"].includes(tab)){try{localStorage.setItem("imaoka_tab",tab);}catch(e){}}
    if(tab==="share"){this.shareView="home";this.curFolderId=null;}
    if(tab==="tasks"){this.taskView="home";this.curProjectId=null;this.curSubId=null;}
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===tab));
    document.getElementById("monthbar").style.display=(tab==="dashboard")?"flex":"none";
    this.render();
    window.scrollTo(0,0);
  },
  // 歯車: 設定を開く/もう一度押すと閉じて元のタブへ戻る
  gearToggle(){if(this.tab==="settings"){this.go(this._prevTab||"dashboard");}else{this._prevTab=this.tab;this.go("settings");}},

  openFolder(id){this.curFolderId=id;this.shareView="folder";this.render();window.scrollTo(0,0);},
  shiftMonth(d){
    let[y,m]=this.curMonth.split("-").map(Number); m+=d;
    if(m<1){m=12;y--}if(m>12){m=1;y++}
    this.curMonth=y+"-"+String(m).padStart(2,"0"); this.render();
  },
  shiftCal(d){
    let[y,m]=this.calMonth.split("-").map(Number); m+=d;
    if(m<1){m=12;y--}if(m>12){m=1;y++}
    this.calMonth=y+"-"+String(m).padStart(2,"0"); this.render();
  },

  render(){
    document.getElementById("cur-month").textContent=monthLabel(this.curMonth);
    document.getElementById("month-nav").classList.toggle("off",this.curMonth!==thisMonth());
    const titles={dashboard:"ホーム",lifeplan:"ライフプラン",tasks:"タスク",calendar:"カレンダー",share:"共有",settings:"設定",income_list:"収入",expense_list:"支出",simulator:"将来シミュレーション"};
    let title=titles[this.tab]||"";
    if(this.tab==="share"){
      if(this.shareView==="notes")title="共有メモ";
      else if(this.shareView==="folder"){const f=this.state.folders.find(x=>x.id===this.curFolderId);title=f?f.name:"共有";}
      else title="共有";
    }
    if(this.tab==="tasks"){
      if(this.taskView==="project"){const p=this.state.projects.find(x=>x.id===this.curProjectId);title=p?p.name:"タスク";}
      else if(this.taskView==="sub"){const s=this.state.subprojects.find(x=>x.id===this.curSubId);title=s?s.name:"タスク";}
      else title="タスク";
    }
    document.getElementById("hd-title").textContent=title;
    document.getElementById("hd-sub").textContent=this.state.settings.spaceName||"ふたりの家計";
    const eb=document.getElementById("eye-btn");if(eb){eb.innerHTML=ic(this.hideAmt?"eyeoff":"eye",18);eb.classList.toggle("on",this.hideAmt);eb.title=this.hideAmt?"金額を表示":"金額を隠す";}

  /* ============== DASHBOARD ============== */
  metrics(month){
    const inc=this.state.incomes.filter(i=>i.month===month);
    const exp=this.state.expenses.filter(e=>e.month===month);
    const manualIncome=inc.reduce((a,b)=>a+(+b.amount||0),0);
    const fixed=exp.filter(e=>e.type==="fixed").reduce((a,b)=>a+(+b.amount||0),0);
    const variable=exp.filter(e=>e.type==="variable").reduce((a,b)=>a+(+b.amount||0),0);
    const evConfirmed=this.eventExpense(month,"confirmed");
    const evPlanned=this.eventExpense(month,"planned");
    const evIncConfirmed=this.eventIncome(month,"confirmed");
    const evIncPlanned=this.eventIncome(month,"planned");
    const totalIncome=manualIncome+evIncConfirmed; // 確定収入(入金済の予定を含む)
    const totalExpense=fixed+variable+evConfirmed; // 確定支出
    const planned=evPlanned+this.floatingSum(month,false);        // これから支払う予定(日付未定の固定費を含む)
    const plannedIncome=evIncPlanned+this.floatingSum(month,true); // これから入る予定(日付未定の収入を含む)
    const balance=totalIncome-totalExpense;         // 残り(確定ベース)
    const afterPlanned=totalIncome-totalExpense-planned+plannedIncome; // 月末見込み
    const savingsRate=totalIncome>0?(balance/totalIncome*100):0;
    const hInc=inc.filter(i=>i.owner==="husband").reduce((a,b)=>a+(+b.amount||0),0);
    const wInc=inc.filter(i=>i.owner==="wife").reduce((a,b)=>a+(+b.amount||0),0);
    const oInc=manualIncome-hInc-wInc;
    return {totalIncome,fixed,variable,evConfirmed,evIncConfirmed,planned,plannedIncome,totalExpense,balance,afterPlanned,savingsRate,hInc,wInc,oInc};
  },
  // 予算ペース: 変動費を日割りで月末まで延長し、固定費・予定を足して月末予測を出す
  paceReport(month,mIn){
    const m=mIn||this.metrics(month);
    const today=todayStr();
    const isCur=month===today.slice(0,7);
    const [y,mo]=month.split("-").map(Number);
    const D=new Date(y,mo,0).getDate();
    const d=isCur?(+today.slice(8)):D;
    const pacedVariable=(isCur&&d>0)?Math.round(m.variable/d*D):m.variable;
    const projExpense=pacedVariable+m.fixed+m.evConfirmed+m.planned;
    const projIncome=m.totalIncome+m.plannedIncome;
    const projBalance=projIncome-projExpense;
    return {isCur,d,D,pacedVariable,projExpense,projIncome,projBalance,m};
  },
  // カレンダーの金額入り予定を集計。isIncome=false:支出(予定/支払い)、true:入金。mode:'confirmed'(日付到来)/'planned'(未来)
  // 変動項目(e.variable)はその月に入力された金額(e.byMonth[ym])を使う。未入力なら0。固定はe.amount。
  eventAmountForMonth(e,ym){ if(e&&e.variable)return (e.byMonth&&e.byMonth[ym]!=null)?(+e.byMonth[ym]||0):0; return +(e&&e.amount)||0; },
  // 日付未定(dayMode=variable)で当月の日付がまだ確定していないもの → 金額既知ぶんを「予定」に加算
  floatingSum(month,isIncome){let s=0;this.state.events.forEach(e=>{if(!e.fixed||e.dayMode!=="variable")return;if(e.byMonthDate&&e.byMonthDate[month])return;const isInc=e.type==="income";if(isInc!==isIncome)return;const amt=this.eventAmountForMonth(e,month);if(amt>0)s+=amt;});return s;},
  eventSum(month,mode,isIncome){
    const today=todayStr(); let sum=0;
    this.state.events.forEach(e=>{const isInc=e.type==="income";if(isInc!==isIncome)return;const amt=this.eventAmountForMonth(e,month);if(!(amt>0))return;this.eventDatesInMonth(e,month).forEach(ds=>{const past=ds<=today;if(mode==="confirmed"&&!past)return;if(mode==="planned"&&past)return;sum+=amt;});});
    return sum;
  },
  eventList(month,mode,isIncome){
    const today=todayStr(),list=[];
    this.state.events.forEach(e=>{const isInc=e.type==="income";if(isInc!==isIncome)return;const amt=this.eventAmountForMonth(e,month);if(!(amt>0))return;const hit=this.eventDatesInMonth(e,month).filter(d=>{const past=d<=today;if(mode==="confirmed"&&!past)return false;if(mode==="planned"&&past)return false;return true;});if(hit.length)list.push({id:e.id,title:e.title,n:hit.length,sum:hit.length*amt,next:hit.sort()[0]});});
    return list.sort((a,b)=>b.sum-a.sum);
  },
  remindersWithin(days){
    const today=todayStr(),end=addDaysStr(today,days);
    const months=[today.slice(0,7)];if(end.slice(0,7)!==months[0])months.push(end.slice(0,7));
    const out=[];
    this.state.events.forEach(e=>{const kind=e.type==="income"?"income":(e.type==="payment"?"payment":"event");months.forEach(mo=>this.eventDatesInMonth(e,mo).forEach(ds=>{if(ds>=today&&ds<=end)out.push({date:ds,kind,title:e.title,amount:this.eventAmountForMonth(e,mo)});}));});
    // 変動の定期(カード引落等)で当月金額が未入力のものは「金額入力」を促す
    this.state.events.forEach(e=>{if(!e.variable||!e.fixed)return;const day=(+String(e.date).slice(8))||1;const closeDay=e.closeDay?(+e.closeDay||0):0;months.forEach(mo=>{const entered=e.byMonth&&e.byMonth[mo]!=null;if(entered)return;const trigger=mo+"-"+pad2(Math.min(closeDay||day,28));if(trigger>=today&&trigger<=end)out.push({date:trigger,kind:"input",title:e.title+" の金額を入力",amount:0,recurId:e.id});});});
    this.state.tasks.forEach(t=>{if(t.due&&t.status!=="done"&&t.due>=today&&t.due<=end)out.push({date:t.due,kind:"task",title:t.title,amount:0});});
    return out.sort((a,b)=>a.date<b.date?-1:1);
  },

  reportData(M){
    const m=this.metrics(M);
    let [py,pmo]=M.split("-").map(Number); pmo--; if(pmo<1){pmo=12;py--;} const prevExp=this.metrics(py+"-"+String(pmo).padStart(2,"0")).totalExpense;
    const md={}; this.state.expenses.forEach(e=>{if(e.month)md[e.month]=1;}); this.state.incomes.forEach(i=>{if(i.month)md[i.month]=1;});
    let streak=0,sy=+M.split("-")[0],sm=+M.split("-")[1]; while(md[sy+"-"+String(sm).padStart(2,"0")]){streak++;sm--;if(sm<1){sm=12;sy--;}}
    const exp=this.state.expenses.filter(e=>e.month===M); const incCount=this.state.incomes.filter(i=>i.month===M).length;
    const byCat={}; exp.forEach(e=>{const c=findCat(e.type==="fixed"?"fixed":"variable",e.catId);byCat[c.label]=(byCat[c.label]||0)+(+e.amount||0);});
    let cats=Object.entries(byCat).map(([l,v])=>({l,v})).sort((a,b)=>b.v-a.v);
    if(cats.length>5){const t=cats.slice(0,4);t.push({l:"その他",v:cats.slice(4).reduce((a,b)=>a+b.v,0)});cats=t;}
    const sav=Math.max(0,m.savingsRate);
    const savComp=Math.max(0,Math.min(40,Math.round(sav/20*40)));
    const exRate=m.totalIncome>0?m.totalExpense/m.totalIncome*100:100;
    const balComp=Math.max(0,Math.min(30,Math.round((1-exRate/100)*60)));
    const recCount=exp.length+incCount;
    const recComp=Math.min(15,Math.round(recCount*1.5))+Math.min(15,Math.round(streak*2.5));
    const score=Math.max(0,Math.min(100,savComp+balComp+recComp));
    const ranks=[{min:90,name:"FIREペンギン",col:"#1D9E75",msg:"もはや家計のプロ。胸を張ってシェアを。"},{min:75,name:"コツコツりす",col:"#C79A1E",msg:"堅実に、着実に。このふたりはブレない。"},{min:60,name:"がんばりゴールデン",col:"#E86A35",msg:"いいペース。あと少しで上が見えてきます。"},{min:45,name:"そこそこカメ",col:"#7BA05B",msg:"ゆっくりでも前進。来月、巻き返そう。"},{min:0,name:"出費おさるさん",col:"#C97240",msg:"使いすぎた項目、来月そこだけ見てみて。"}];
    const rank=ranks.find(r=>score>=r.min);
    const gA=g=>(g.items&&g.items.length)?g.items.reduce((a,b)=>a+(+b.amount||0),0):(+g.target||0);
    const goal=this.state.goals.filter(g=>{const t=gA(g);return t>0&&(g.current||0)<t;}).sort((a,b)=>(a.targetDate||"9999")<(b.targetDate||"9999")?-1:1)[0];
    let goalInfo=null;
    if(goal){const t=gA(goal);const pct=Math.min(100,(goal.current||0)/t*100);let eta="";if(m.balance>0){const months=Math.ceil((t-(goal.current||0))/m.balance);let ey=+M.split("-")[0],em=+M.split("-")[1]+months;while(em>12){em-=12;ey++;}eta=ey+"年"+em+"月に達成ペース";}goalInfo={label:goal.label,pct:pct,eta:eta};}
    const dim=new Date(+M.split("-")[0],+M.split("-")[1],0).getDate();
    return {m,score,rank,sav,streak,recCount,cats,catTotal:cats.reduce((a,b)=>a+b.v,0)||1,prevExp,goalInfo,perDay:Math.round(m.totalExpense/dim),yearProj:Math.max(0,m.balance)*12};
  },

  /* ============== ライフプラン・シミュレーター ============== */
  simProjection(){
    const sim=this.state.sim;
    const monthly=(sim.monthly!==""&&sim.monthly!=null)?(+String(sim.monthly).replace(/[^0-9.]/g,"")||0):Math.max(0,this.metrics(thisMonth()).balance);
    const bonus=+String(sim.bonus).replace(/[^0-9.]/g,"")||0;
    const years=+sim.years||10;
    let bal=+String(sim.current).replace(/[^0-9.]/g,"")||0;
    const rows=[{year:0,label:"現在",bal,events:[]}];
    for(let y=1;y<=years;y++){
      bal+=monthly*12+bonus;
      const evs=(sim.events||[]).filter(e=>+e.after===y);
      evs.forEach(e=>{bal+=(e.kind==="income"?+e.amount:-(+e.amount))||0;});
      rows.push({year:y,label:y+"年後",bal,events:evs});
    }
    return {monthly,bonus,years,rows};
  },
  setSim(k,v){this.state.sim[k]=(k==="years")?(+v):String(v).replace(/[^0-9.]/g,"");this.commit();},
  view_simulator(){
    const sim=this.state.sim, proj=this.simProjection(), final=proj.rows[proj.rows.length-1];
    const maxAbs=Math.max(1,...proj.rows.map(r=>Math.abs(r.bal)));
    let h='<button class="back-btn" onclick="App.go(\'dashboard\')">'+ic('back',16)+'ホーム</button>';
    h+='<p class="muted" style="font-size:var(--text-sm);margin:0 4px 12px">今の貯蓄ペースと予定から、将来の貯蓄を試算します。数字を変えるとすぐ反映されます。</p>';

  /* ============== TASKS ============== */
  taskRow(t,compact){
    const c=findCat("task",t.cat);
    const overdue=t.due && t.status!=="done" && t.due<todayStr();
    const aChip=t.assignee==="husband"?'<span class="chip chip-full chip-h">'+esc(this.state.settings.husband)+'</span>':
      t.assignee==="wife"?'<span class="chip chip-full chip-w">'+esc(this.state.settings.wife)+'</span>':
      '<span class="chip chip-full chip-both">二人</span>';
    const dueChip=t.due?('<span class="chip ttl-ico '+(overdue?'chip-over':'chip-todo')+'">'+ic('calendar',12)+t.due.slice(5).replace("-","/")+'</span>'):'';
    const att=(t.loc?ic('map',13):'')+(t.url?ic('link',13):'');
    const attChip=att?('<span class="chip chip-todo ttl-ico">'+att+'</span>'):'';
    const cl=t.checklist||[];const clDone=cl.filter(c=>c.done).length;
    const clChip=cl.length?('<span class="chip '+(clDone===cl.length?'chip-both':'chip-todo')+' ttl-ico">'+ic('check',12)+clDone+'/'+cl.length+'</span>'):'';
    return '<div class="li '+(t.status==="done"?"done":"")+'">'+
      '<div class="check '+(t.status==="done"?"on":"")+'" onclick="event.stopPropagation();App.toggleTask(\''+t.id+'\')">'+(t.status==="done"?ic('check',14):'')+'</div>'+
      '<div class="main" onclick="App.openTask(\''+t.id+'\')" style="cursor:pointer"><div class="ttl ttl-ico">'+ic(TASK_IC[t.cat]||'tag',15)+esc(t.title)+'</div>'+
      '<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">'+aChip+dueChip+clChip+attChip+'</div></div></div>';
  },
  projTasks(pid){return this.state.tasks.filter(t=>t.projectId===pid);},
  subTasks(sid){return this.state.tasks.filter(t=>t.subId===sid);},
  taskGo(v){this.taskView=v;this.render();window.scrollTo(0,0);},
  openProject(id){this.curProjectId=id;this.taskView="project";this.render();window.scrollTo(0,0);},

      left+='<div class="card"><div class="empty"><span class="e-ic">'+ic('folder',30)+'</span>大きな計画はプロジェクトに整理。<br>例: 結婚式 → ウェルカムスペース → 席札作成<br><button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="App.openProjectForm()">＋ プロジェクトを作る</button></div></div>';

        '<div class="row" style="gap:12px"><div class="ic" style="width:42px;height:42px;border-radius:12px;flex-shrink:0;color:var(--color-primary-600)">'+renderCatIc(p.icon,22)+'</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:var(--text-md);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+(comp?' <span style="color:var(--color-accent-600)">'+ic('check',16)+'</span>':'')+'</div><div class="meta">'+subCnt+'グループ・'+done+'/'+ts.length+'完了</div></div><span style="color:var(--color-text-disabled);font-size:22px">›</span></div>'+
        '<div class="prog" style="margin-top:10px"><span class="'+(comp?'fill-accent':'fill-primary')+'" style="width:'+pct+'%"></span></div></div>';
    });
    // 個別タスク
    const f=this.filters.tasks;
    let list=this.state.tasks.filter(t=>!t.projectId);

    else if(f==="wife")list=list.filter(t=>t.assignee==="wife"||t.assignee==="both");
    else if(f==="done")list=list.filter(t=>t.status==="done");
    list.sort((a,b)=>{if((a.status==="done")!==(b.status==="done"))return a.status==="done"?1:-1;return (a.due||"9999")<(b.due||"9999")?-1:1;});

    let right='<div class="section-title">個別タスク<button class="btn btn-sec btn-sm" style="min-height:34px;padding:5px 14px" onclick="App.openTask()">＋ 詳しく追加</button></div>';
    right+='<div class="card" style="padding:10px;margin-bottom:10px"><div class="row" style="gap:8px;align-items:center">'+
      '<input id="quick-task" placeholder="サクッと追加（例: ドメイン更新の確認）" enterkeyhint="done" onkeydown="if(event.key===\'Enter\'&&!event.isComposing&&event.keyCode!==229){event.preventDefault();App.quickAddTask();}" style="flex:1;min-width:0">'+
      '<button class="btn btn-primary" onclick="App.quickAddTask()" style="flex-shrink:0;min-height:42px;padding:0 16px">追加</button>'+
      '</div></div>';
    right+='<div class="filters">'+fc("open","未完了")+fc("all","すべて")+fc("husband",esc(this.state.settings.husband)+"担当")+fc("wife",esc(this.state.settings.wife)+"担当")+fc("done","完了済み")+'</div>';
    right+='<div class="card">';
    if(!list.length)right+='<div class="empty"><span class="e-ic">'+ic('check',30)+'</span>該当するタスクはありません</div>';
    list.forEach(t=>right+=this.taskRow(t));
    right+='</div>';
    return '<div class="task-cols"><div>'+left+'</div><div>'+right+'</div></div>';
  },
  view_taskproject(){

    const ts=this.projTasks(p.id),done=ts.filter(t=>t.status==="done").length,pct=ts.length?Math.round(done/ts.length*100):0,comp=ts.length>0&&done===ts.length;

      h+='<div class="card" style="padding:16px;cursor:pointer" onclick="App.openSub(\''+s.id+'\')"><div class="row" style="gap:10px"><div class="check '+(sc?'on':'')+'" style="cursor:default;flex-shrink:0">'+(sc?'✓':'')+'</div><div style="flex:1;min-width:0"><div style="font-weight:700;'+(sc?'color:var(--color-accent-600);':'')+'overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.name)+'</div><div class="meta">'+sd+'/'+sts.length+'完了</div></div><span style="color:var(--color-text-disabled);font-size:20px">›</span></div><div class="prog" style="margin-top:8px"><span class="'+(sc?'fill-accent':'fill-primary')+'" style="width:'+sp+'%"></span></div></div>';
    });

  },
  view_tasksub(){

  view_calendar(){
    const[y,mo]=this.calMonth.split("-").map(Number);
    const first=new Date(y,mo-1,1), startDow=first.getDay();
    const days=new Date(y,mo,0).getDate();
    const prevDays=new Date(y,mo-1,0).getDate();
    const items=this.calItems();
    let h='<div class="card"><div class="row" style="margin-bottom:6px"><span onclick="App.shiftCal(-1)" style="cursor:pointer;font-size:22px;padding:0 10px;color:var(--color-primary-600)">‹</span>'+
      '<strong class="num" onclick="App.openCalPicker()" style="font-size:var(--text-lg);cursor:pointer;padding:5px 14px;border-radius:var(--radius-full);background:var(--color-primary-50);color:var(--color-primary-700)">'+monthLabel(this.calMonth)+' ▾</strong>'+
      '<span onclick="App.shiftCal(1)" style="cursor:pointer;font-size:22px;padding:0 10px;color:var(--color-primary-600)">›</span></div>';
    h+='<div class="cal-grid">'+["日","月","火","水","木","金","土"].map((d,i)=>'<div class="cal-dow '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>').join("");
    let cells=[];
    for(let i=startDow-1;i>=0;i--)cells.push({d:prevDays-i,muted:true});
    for(let d=1;d<=days;d++)cells.push({d,muted:false});
    while(cells.length%7!==0)cells.push({d:cells.length-(startDow+days)+1,muted:true});
    cells.forEach((c,idx)=>{
      const dow=idx%7;
      if(c.muted){h+='<div class="cal-cell muted">'+c.d+'</div>';return;}
      const ds=this.calMonth+"-"+String(c.d).padStart(2,"0");
      const dayItems=items[ds]||[];
      const today=ds===todayStr();
      const types=[...new Set(dayItems.map(x=>x.t))];
      let dots=types.slice(0,4).map(t=>'<span class="cdot cd-'+t+'"></span>').join("");
      h+='<div class="cal-cell '+(today?'today':'')+' '+(dow===0?'sun':dow===6?'sat':'')+'" onclick="App.openDay(\''+ds+'\')">'+c.d+'<div class="cal-dots">'+dots+'</div></div>';
    });
    h+='</div><div class="legend"><span><span class="cdot cd-income"></span>入金</span><span><span class="cdot cd-pay"></span>支払い</span><span><span class="cdot cd-task"></span>タスク</span><span><span class="cdot cd-event"></span>予定</span><span><span class="cdot cd-wish"></span>目標時期</span></div></div>';

    const flat=[];
    Object.keys(items).forEach(d=>{if(d.slice(0,7)===this.calMonth)items[d].forEach(it=>flat.push({...it,date:d}))});
    flat.sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:((a.start||"")<(b.start||"")?-1:1)));
    if(!flat.length)side+='<div class="empty"><span class="e-ic">'+ic('calendar',30)+'</span>この月の予定はありません</div>';
    flat.slice(0,50).forEach(it=>{
      side+='<div class="li" '+(it.onclick?('onclick="'+it.onclick+'" style="cursor:pointer"'):'')+'><span class="ic">'+renderCatIc(it.icon,19)+'</span><div class="main"><div class="ttl">'+esc(it.title)+'</div><div class="meta num">'+it.date.replace(/-/g,"/")+'</div></div>'+(it.amount?'<span class="amt">'+yen(it.amount)+'</span>':'')+'</div>';
    });
    side+='</div>';
    // この月のカテゴリ別支出
    const exp=this.state.expenses.filter(e=>e.month===this.calMonth);
    const evExp=this.eventExpense(this.calMonth,"confirmed"), evN=this.eventExpenseList(this.calMonth,"confirmed").reduce((s,x)=>s+x.n,0);
    if(exp.length||evExp>0){
      const byCat={};exp.forEach(e=>{const see=this.seeDetail(e);const key=see?e.catId:"__priv";const c=findCat(e.type==="fixed"?"fixed":"variable",e.catId);if(!byCat[key])byCat[key]=see?{icon:c.icon,label:c.label,sum:0,n:0}:{icon:"🔒",label:"個人支出",sum:0,n:0};byCat[key].sum+=(+e.amount||0);byCat[key].n++;});
      const arr=Object.values(byCat).sort((a,b)=>b.sum-a.sum);
      if(evExp>0)arr.push({icon:"📅",label:"予定・支払い(済)",sum:evExp,n:evN});
      arr.sort((a,b)=>b.sum-a.sum);
      const total=arr.reduce((s,x)=>s+x.sum,0);
      side+='<div class="section-title">カテゴリ別支出<span class="num" style="font-weight:700;color:var(--color-primary-600)">'+yen(total)+'</span></div><div class="card">';
      const gpal=['#C4714A','#7A9E7E','#4E9C78','#C4963A','#9DB5A0','#D49274','#5E7E63','#BACBBC'];
      // ドーナツ円グラフ(何がどのくらいを占めるか)
      const R=54,CIRC=2*Math.PI*R; let _off=0,_segs='';
      arr.forEach((c,i)=>{const frac=total>0?c.sum/total:0;if(frac<=0)return;const len=frac*CIRC;_segs+='<circle cx="80" cy="80" r="'+R+'" fill="none" stroke="'+gpal[i%gpal.length]+'" stroke-width="22" stroke-dasharray="'+len.toFixed(2)+' '+(CIRC-len).toFixed(2)+'" stroke-dashoffset="'+(-_off).toFixed(2)+'" transform="rotate(-90 80 80)"/>';_off+=len;});
      side+='<div style="display:flex;justify-content:center;margin:4px 0 16px"><svg width="172" height="172" viewBox="0 0 160 160" role="img" aria-label="カテゴリ別支出の割合">'+_segs+'<text x="80" y="75" text-anchor="middle" font-size="12" fill="var(--color-text-secondary)">合計</text><text x="80" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="var(--color-text-primary)" font-family="var(--font-family-number)">'+yen(total)+'</text></svg></div>';
      arr.forEach((c,i)=>{const pct=total>0?Math.round(c.sum/total*100):0;side+='<div class="li"><span class="ic">'+renderCatIc(c.icon,19)+'</span><div class="main"><div class="ttl">'+esc(c.label)+' <span class="meta">'+c.n+'件</span></div><div class="prog"><span style="display:block;height:100%;border-radius:inherit;width:'+pct+'%;background:'+gpal[i%gpal.length]+'"></span></div></div><div style="text-align:right"><div class="amt">'+yen(c.sum)+'</div><div class="meta num">'+pct+'%</div></div></div>';});
      side+='</div>';
    }
    return '<div class="cal-layout"><div class="cal-main">'+h+'</div><div class="cal-side">'+side+'</div></div>';
  },
  calItems(ym){
    ym=ym||this.calMonth;
    const map={};
    const add=(date,obj)=>{if(!date)return;(map[date]=map[date]||[]).push(obj)};
    this.state.tasks.forEach(t=>{if(t.due&&t.status!=="done"){const c=findCat("task",t.cat);add(t.due,{t:"task",icon:c.icon,title:t.title,onclick:"App.openTask('"+t.id+"')"})}});
    this.state.events.forEach(e=>{const tm=e.start?(e.start+(e.end?"〜"+e.end:"")+" "):"";const rec=(e.recurrence&&e.recurrence!=="none")?" 🔁":"";const t=e.type==="income"?"income":(e.type==="payment"?"pay":"event");const icon=e.type==="income"?"💰":(e.type==="payment"?"💴":"📌");const cAmt=this.eventAmountForMonth(e,ym);const vTag=(e.variable&&!(e.byMonth&&e.byMonth[ym]!=null))?" (金額未定)":"";this.eventDatesInMonth(e,ym).forEach(ds=>add(ds,{t,icon,title:tm+e.title+rec+vTag,amount:cAmt,memo:e.memo||"",start:e.start||"",onclick:e.fixed?"App.openRecurring('"+e.id+"')":"App.openEvent('"+e.id+"')"}))});
    this.state.expenses.forEach(e=>{if(e.date){const c=findCat(e.type==="fixed"?"fixed":"variable",e.catId);add(e.date,{t:"pay",icon:c.icon,title:(e.label||c.label)+(e.sub?"・"+e.sub:""),amount:e.amount,start:"",onclick:"App.openExpense('"+e.id+"')"})}});
    this.state.items.forEach(w=>{if(w.date&&w.date.length===7&&!w.done&&w.target>0){const f=this.state.folders.find(x=>x.id===w.folderId);add(w.date+"-01",{t:"wish",icon:f?f.icon:"✨",title:"目標: "+w.title,start:"",onclick:"App.openItem('"+w.id+"')"})}});
    Object.keys(map).forEach(d=>map[d].sort((a,b)=>(a.start||"")<(b.start||"")?-1:1));
    return map;
  },
  eventDatesInMonth(e,ym){
    if(!e.date)return [];
    if(e.dayMode==="variable")return (e.byMonthDate&&e.byMonthDate[ym])?[e.byMonthDate[ym]]:[]; // 日付未定: 確定済の月だけカレンダーに乗る
    const [y,m]=ym.split("-").map(Number);
    const r=e.recurrence||"none";
    const b=e.date.split("-").map(Number);
    if(r==="none")return e.date.slice(0,7)===ym?[e.date]:[];
    const baseT=new Date(b[0],b[1]-1,b[2]).getTime();
    const baseDow=new Date(b[0],b[1]-1,b[2]).getDay();
    const baseNth=Math.ceil(b[2]/7);
    const res=[],daysInM=new Date(y,m,0).getDate();
    for(let d=1;d<=daysInM;d++){
      const dt=new Date(y,m-1,d);if(dt.getTime()<baseT)continue;
      let ok=false;
      if(r==="weekly")ok=dt.getDay()===baseDow;
      else if(r==="monthly_date")ok=d===b[2];
      else if(r==="monthly_nth")ok=dt.getDay()===baseDow&&Math.ceil(d/7)===baseNth;
      else if(r==="yearly")ok=(m===b[1]&&d===b[2]);
      if(ok)res.push(ym+"-"+pad2(d));
    }
    return res;
  },

  showSheet(html){
    const sh=document.getElementById("sheet");
    sh.innerHTML='<div class="grip"></div><button class="sheet-close" onclick="App.closeSheet()" aria-label="閉じる">✕</button>'+html;
    document.getElementById("scrim").classList.add("show");

  closeSheet(){const sh=document.getElementById("sheet");sh.style.transform="";sh.style.opacity="";sh.classList.remove("show");document.getElementById("scrim").classList.remove("show");document.body.classList.remove("noscroll");},
  // 下シートを掴んで下げると閉じる(グリップ/上部ハンドル領域から)。pointer/touch両対応で確実に閉じる
  sheetDrag(){
    const sh=document.getElementById("sheet");if(!sh)return;
    let y0=null,dy=0,dragging=false;
    const start=(clientY,target)=>{
      if(dragging)return false;
      if(target&&target.closest&&target.closest(".sheet-close"))return false;
      const top=sh.getBoundingClientRect().top;
      const onGrip=(target&&target.classList&&target.classList.contains("grip"));
      if(!onGrip && (clientY-top)>=58)return false;          // 上部ハンドル領域のみ
      y0=clientY;dy=0;dragging=true;sh.style.transition="none";return true;
    };
    const move=(clientY)=>{if(!dragging)return;dy=Math.max(0,clientY-y0);sh.style.transform="translateY("+dy+"px)";sh.style.opacity=String(Math.max(0.35,1-dy/500));};
    const end=()=>{if(!dragging)return;dragging=false;sh.style.transition="";if(dy>80){this.closeSheet();}else{sh.style.transform="";sh.style.opacity="";}y0=null;dy=0;};
    sh.addEventListener("pointerdown",(e)=>{if(start(e.clientY,e.target)){try{sh.setPointerCapture(e.pointerId);}catch(err){}}});
    sh.addEventListener("pointermove",(e)=>{move(e.clientY);});
    sh.addEventListener("pointerup",end);
    sh.addEventListener("pointercancel",end);
    sh.addEventListener("touchstart",(e)=>{if(e.touches[0])start(e.touches[0].clientY,e.target);},{passive:true});
    sh.addEventListener("touchmove",(e)=>{if(dragging&&e.touches[0]){move(e.touches[0].clientY);e.preventDefault();}},{passive:false});
    sh.addEventListener("touchend",end);
    sh.addEventListener("touchcancel",end);
  },

  gcalUrl(ev){

    else{dates=d+"/"+addDay(ev.date);}
    let u="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(ev.title)+"&dates="+dates;

  /* ---- 入れると気持ちいい: 数字カウントアップ＋コイン演出 ---- */
  animateDashNums(){
    if(!this._numCache)this._numCache={};
    document.querySelectorAll("#view .cnum").forEach(el=>{
      const k=el.dataset.k, to=+el.dataset.v||0, prev=this._numCache[k];
      this._numCache[k]=to;
      if(HIDE_AMT){el.textContent=yen(to);return;}           // 目隠し中はアニメしない
      if(prev===undefined||prev===to)return;                  // 初回 or 変化なしは静止
      el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump");
      this._countUp(el,prev,to);
    });
  },
  _countUp(el,from,to){
    const dur=520, t0=performance.now();
    const step=(now)=>{
      let p=(now-t0)/dur; if(p>1)p=1;
      const e=1-Math.pow(1-p,3);                              // easeOutCubic
      el.textContent=yen(from+(to-from)*e);
      if(p<1)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },
  celebrate(c){
    if(navigator.vibrate)try{navigator.vibrate(c.kind==="income"?[18,40,18,40,28]:[28,30,18]);}catch(e){}
    const cls=c.kind==="income"?"inc":"exp";
    const cx=window.innerWidth/2, cy=window.innerHeight*0.56;
    const palette=["#E8744A","#7BA05B","#F2C94C","#56A8C7","#E36B8F","#F2994A"]; // テラコッタ/モス/イエロー/ブルー/ピンク/オレンジ
    const trash=[];
    // 中央コイン
    const coin=document.createElement("div");
    coin.className="coin-pop "+cls;
    coin.textContent=(c.kind==="income"?"＋":"")+yen(c.amount);
    document.body.appendChild(coin); trash.push([coin,1300]);
    // 光のリング2枚
    for(let r=0;r<2;r++){
      const ring=document.createElement("div");
      ring.className="coin-ring "+cls;
      ring.style.left=cx+"px"; ring.style.top=cy+"px"; ring.style.animationDelay=(r*90)+"ms";
      document.body.appendChild(ring); trash.push([ring,900]);
    }
    // 紙吹雪(虹色・回転・上方向に打ち上げて散布)
    const N=26;
    for(let i=0;i<N;i++){
      const p=document.createElement("div");
      p.className="confetti";
      const ang=(-Math.PI/2)+(Math.random()-0.5)*2.4;       // 上方向中心に扇状
      const dist=90+Math.random()*150;
      const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist+Math.random()*80; // 重力で少し落とす
      p.style.left=cx+"px"; p.style.top=cy+"px";
      p.style.background=palette[i%palette.length];
      p.style.borderRadius=(i%2?"50%":"2px");
      const sz=8+Math.random()*8; p.style.width=sz+"px"; p.style.height=(sz*(i%3?1:.5))+"px";
      p.style.setProperty("--dx",dx+"px");
      p.style.setProperty("--dy",dy+"px");
      p.style.setProperty("--rot",(Math.random()*720-360)+"deg");
      p.style.setProperty("--dur",(0.8+Math.random()*0.6)+"s");
      document.body.appendChild(p); trash.push([p,1500]);
    }
    trash.forEach(([el,ms])=>setTimeout(()=>el.remove(),ms));
  },

  /* ============== SUPABASE SYNC ============== */
  /* ===== クラウド(ログイン・世帯共有) ===== */
  async loadSb(){
    if(window.supabase&&window.supabase.createClient)return;
    await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  },
  async initCloud(){
    if(!APP_CONFIG.url||!APP_CONFIG.key)return; // ローカルのみ
    try{
      await this.loadSb();
      this._client=window.supabase.createClient(APP_CONFIG.url,APP_CONFIG.key,{auth:{persistSession:true,autoRefreshToken:true,storageKey:"sb-mietta-staging-auth"}});
      try{const p=new URLSearchParams(location.search).get("invite");if(p){this._pendingInvite=p.trim().toUpperCase();this._authView="signup";}}catch(e){}
      const {data:{session}}=await this._client.auth.getSession();
      if(session&&session.user){this._user=session.user;await this.afterAuth();}
      else{this.showAuth();}
    }catch(e){console.error(e);this.toast("接続に問題が発生しました");}
  },
  setAuthErr(msg){const el=document.getElementById("au-err");if(el){el.textContent=msg||"";el.style.display=msg?"block":"none";if(msg){el.style.animation="none";void el.offsetWidth;el.style.animation="authshake .3s";}}},
  authErrMsg(raw,mode){const m=(raw||"").toLowerCase();
    if(m.includes("invalid login")||m.includes("invalid credentials"))return "メールアドレスまたはパスワードが違います";
    if(m.includes("email not confirmed"))return "メール確認が完了していません。届いたメールのリンクを開いてください";
    if(m.includes("already registered")||m.includes("already been registered")||m.includes("user already"))return "このメールアドレスは登録済みです。「ログインに切り替え」からお進みください";
    if(m.includes("unable to validate email")||m.includes("invalid format")||m.includes("invalid email"))return "メールアドレスの形式が正しくありません";
    if(m.includes("password")&&m.includes("6"))return "パスワードは6文字以上にしてください";
    if(m.includes("for security")||m.includes("rate")||m.includes("too many")||m.includes("429"))return "回数が多すぎます。少し時間をおいて再度お試しください";
    if(m.includes("network")||m.includes("fetch")||m.includes("failed to"))return "通信エラーです。電波の良い場所で再度お試しください";
    return mode==="signup"?"登録に失敗しました。入力内容をご確認ください":"ログインに失敗しました。入力内容をご確認ください";},
  async doAuth(mode){
    this.setAuthErr("");
    const email=val("au-email"),pw=val("au-pw");
    if(!email||!pw){this.setAuthErr("メールアドレスとパスワードを入力してください");return;}
    if(pw.length<6){this.setAuthErr("パスワードは6文字以上にしてください");return;}
    try{
      const r=mode==="signup"?await this._client.auth.signUp({email,password:pw}):await this._client.auth.signInWithPassword({email,password:pw});
      if(r.error){this.setAuthErr(this.authErrMsg(r.error.message,mode));return;}
      if(!r.data.session){this.toast("確認メールを送信しました。メールのリンクを開いてから再度ログインしてください");return;}
      this._user=r.data.user;await this.afterAuth();
    }catch(e){console.error(e);this.setAuthErr("通信エラーが発生しました。もう一度お試しください");}
  },
  async doLogout(){try{await this._client.auth.signOut();}catch(e){} if(this._channel){this._client.removeChannel(this._channel);this._channel=null;} this._user=null;this.householdId=null;this._syncStatus="off";this._authView="login";this.showAuth();},
  switchAuth(v){this._authView=v;this._authError="";this.showAuth();},
  async afterAuth(){
    try{
      const{data:mem,error}=await this._client.from("members").select("household_id").limit(1);
      if(error)throw error;
      if(mem&&mem.length){this.householdId=mem[0].household_id;await this.loadCloud();this.hideAuth();}
      else if(this._pendingInvite){const ok=await this.joinHousehold(this._pendingInvite);if(!ok){this._authView="household";this.showAuth();}}
      else{this._authView="household";this.showAuth();}
    }catch(e){console.error(e);this.toast("読み込みに失敗しました");}
  },
  async createHousehold(){try{const{data,error}=await this._client.rpc("create_household");if(error)throw error;this.householdId=data;await this.loadCloud();this._pendingInvite="";this._authView="invite";this.showAuth();}catch(e){console.error(e);this.toast("作成に失敗しました");}},
  async joinHousehold(code){code=(code||"").trim();if(!code){this.toast("招待コードを入力してください");return false;}try{const{data,error}=await this._client.rpc("join_household",{p_code:code});if(error)throw error;this.householdId=data;await this.loadCloud();this._pendingInvite="";try{history.replaceState(null,"",location.origin+location.pathname);}catch(e){}this.hideAuth();this.toast("参加しました!");return true;}catch(e){console.error(e);this.toast("招待コードが正しくありません");return false;}},
  async loadCloud(){
    try{
      const{data,error}=await this._client.from("app_state").select("data,invite_code").eq("household_id",this.householdId).maybeSingle();
      if(error)throw error;
      this._inviteCode=data?(data.invite_code||""):"";
      if(data&&data.data&&Object.keys(data.data).length){
        this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan_staging",JSON.stringify(this.state));this.applyTheme();
      }else{
        await this.pushNow(); // 初回: 今のデータをクラウドへ
      }
      this._syncStatus="on";
      this.subscribeRealtime();
      this.render();
    }catch(e){console.error(e);this._syncStatus="err";this.render();}
  },
  // クラウドから最新を取得して反映(リアルタイムの取りこぼし対策・タブ復帰時など)
  async pullLatest(){
    if(!this._client||!this.householdId)return;
    try{
      const{data,error}=await this._client.from("app_state").select("data,updated_at").eq("household_id",this.householdId).maybeSingle();
      if(error||!data||!data.data||!Object.keys(data.data).length)return;
      if(data.updated_at===this._lastPushed)return; // 自分が直前に送った更新
      if(this._lastApplied&&data.updated_at&&data.updated_at<=this._lastApplied)return;
      this._lastApplied=data.updated_at;
      this.state=data.data;this.normalize();localStorage.setItem("imaoka_lifeplan_staging",JSON.stringify(this.state));this.applyTheme();this.render();
    }catch(e){}
  },
  subscribeRealtime(){
    if(this._channel)this._client.removeChannel(this._channel);
    this._channel=this._client.channel("hh-"+this.householdId)
      .on("postgres_changes",{event:"*",schema:"public",table:"app_state",filter:"household_id=eq."+this.householdId},payload=>{
        const nd=payload.new;if(!nd||!nd.data)return;if(nd.updated_at===this._lastPushed)return;
        this._lastApplied=nd.updated_at;
        this.state=nd.data;this.normalize();localStorage.setItem("imaoka_lifeplan_staging",JSON.stringify(this.state));this.applyTheme();this.render();
      }).subscribe((status)=>{ if(status==="SUBSCRIBED")this.pullLatest(); });
  },
  queueCloudPush(){clearTimeout(this._pushTimer);this._pushTimer=setTimeout(()=>this.pushNow(),700);},
  async pushNow(){
    if(!this._client||!this.householdId)return;
    const ts=new Date().toISOString();this._lastPushed=ts;
    const payload=JSON.parse(JSON.stringify(this.state));
    try{const{error}=await this._client.from("app_state").update({data:payload,updated_at:ts}).eq("household_id",this.householdId);if(error)throw error;if(this._syncStatus!=="on"){this._syncStatus="on";this.render();}}catch(e){console.error(e);this._syncStatus="err";}
  },
  /* ---- 認証オーバーレイ ---- */
  showAuth(){let el=document.getElementById("authwrap");if(!el){el=document.createElement("div");el.id="authwrap";el.className="authwrap";document.body.appendChild(el);}el.style.display="flex";el.innerHTML=this.authHtml();},
  hideAuth(){const el=document.getElementById("authwrap");if(el)el.style.display="none";},
  inviteUrl(code){return location.origin+location.pathname+"?invite="+encodeURIComponent(code||this._inviteCode||"");},
  finishInvite(){try{history.replaceState(null,"",location.origin+location.pathname);}catch(e){} this._pendingInvite="";this.hideAuth();this.toast("ようこそ！");},
  async shareInvite(){const url=this.inviteUrl();const text="Miettaでふたりのスペースを作りました。このリンクから参加してね！\n"+url;try{if(navigator.share){await navigator.share({title:"Mietta 招待",text});}else{this.copy(url);}}catch(e){}},
  authHtml(){
    if(this._authView==="invite"){
      const code=this._inviteCode||"",url=this.inviteUrl(code);
      return '<div class="authcard">'+
        '<div style="text-align:center;color:var(--color-primary-500);margin-bottom:6px">'+ic('heart',40)+'</div>'+
        '<h2 style="text-align:center;margin:0 0 4px">ふたりのスペースを作りました</h2>'+
        '<p class="muted" style="text-align:center;margin:0 0 18px;line-height:1.7">下の招待リンクをパートナーに送ってください。<br>開くだけで登録でき、同じスペースに参加できます。</p>'+
        '<label class="fld"><span class="lbl ttl-ico">'+ic('link',14)+'招待リンク</span><div style="display:flex;gap:8px"><input id="inv-url" readonly value="'+esc(url)+'" onclick="this.select()" style="flex:1;min-width:0;font-size:var(--text-sm)"><button class="btn btn-primary" style="flex-shrink:0;min-height:48px;padding:0 16px" onclick="App.copy(App.inviteUrl())">コピー</button></div></label>'+
        '<div class="muted" style="text-align:center;margin:-6px 0 16px">招待コード: <b class="num" style="letter-spacing:2px">'+esc(code)+'</b></div>'+
        '<button class="btn btn-sec btn-block ttl-ico" style="justify-content:center" onclick="App.shareInvite()">'+ic('send',16)+'リンクを送る</button>'+
        '<button class="btn btn-primary btn-block" style="margin-top:10px" onclick="App.finishInvite()">アプリを始める</button></div>';
    }
    if(this._authView==="household"){
      return '<div class="authcard"><div style="text-align:center;color:var(--color-primary-500);margin-bottom:6px">'+ic('users',40)+'</div><h2 style="text-align:center;margin:0 0 4px">ペアを設定</h2><p class="muted" style="text-align:center;margin:0 0 18px">新しく始めるか、パートナーの招待コードで参加します</p>'+
        '<button class="btn btn-primary btn-block" onclick="App.createHousehold()">新しくスペースを作る</button>'+
        '<div class="muted" style="text-align:center;margin:16px 0 12px;display:flex;align-items:center;gap:10px"><span style="flex:1;height:1px;background:var(--color-border)"></span>または<span style="flex:1;height:1px;background:var(--color-border)"></span></div>'+
        '<input id="au-code" value="'+esc(this._pendingInvite||"")+'" placeholder="招待コード(6文字)" autocapitalize="characters" style="text-align:center;letter-spacing:2px;text-transform:uppercase">'+
        '<button class="btn btn-sec btn-block" style="margin-top:8px" onclick="App.joinHousehold(document.getElementById(\'au-code\').value)">招待コードで参加</button>'+
        '<div style="text-align:center;margin-top:16px"><span class="link" onclick="App.doLogout()">ログアウト</span></div></div>';
    }
    const su=this._authView==="signup";
    return '<div class="authcard"><div class="my-brand">'+
      '<img class="ic" src="../icon-192.png" alt="Mietta" />'+
      '<h2 class="my-wordmark">Miett<span style="color:var(--color-accent-500)">a</span></h2>'+
      '<p class="my-tag">夫婦で、これからの暮らしを。</p></div>'+
      (this._pendingInvite?'<div class="invite-note ttl-ico">'+ic('heart',15)+'パートナーから招待されています。登録するとふたりのスペースに参加できます。</div>':'')+
      '<div id="au-err" class="auth-err" style="display:none"></div>'+
      '<label class="fld"><span class="lbl">メールアドレス</span><input id="au-email" type="email" inputmode="email" autocapitalize="off" placeholder="you@example.com" oninput="App.setAuthErr(\'\')"></label>'+
      '<label class="fld"><span class="lbl">パスワード</span><input id="au-pw" type="password" placeholder="6文字以上"></label>'+
      '<button class="btn btn-primary btn-block" style="margin-top:4px" onclick="App.doAuth(\''+(su?"signup":"login")+'\')">'+(su?"新規登録ではじめる":"ログイン")+'</button>'+
      '<div class="auth-switch">'+(su?"すでにアカウントをお持ちですか？":"アカウントをお持ちでない方")+'<button class="btn btn-ghost btn-block btn-sm" style="margin-top:8px" onclick="App.switchAuth(\''+(su?"login":"signup")+'\')">'+(su?"ログインに切り替え":"新規登録に切り替え")+'</button></div></div>';
  }
};
// helpers used inside form callbacks
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function seg(id){const el=document.getElementById(id);const on=el&&el.querySelector("button.on");return on?on.dataset.v:"";}
function numv(id){const el=document.getElementById(id);if(!el)return 0;return +String(el.value).replace(/[^0-9.]/g,"")||0;}
function cf(n){n=+n||0;return n?n.toLocaleString("en-US"):"";}
function domainOf(url){if(!url)return "";try{let u=url;if(!/^https?:\/\//i.test(u))u="https://"+u;return new URL(u).hostname.replace(/^www\./,"");}catch(e){return "";}}
function pad2(n){return String(n).padStart(2,"0");}
function addDay(ymd){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+1);return ""+dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate());}
function addDaysStr(ymd,n){const[y,m,d]=ymd.split("-").map(Number);const dt=new Date(y,m-1,d+n);return dt.getFullYear()+"-"+pad2(dt.getMonth()+1)+"-"+pad2(dt.getDate());}
function readImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=1280;let w=img.width,h=img.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);try{cb(c.toDataURL("image/jpeg",0.72));}catch(e){cb(r.result);}};img.src=r.result;};r.readAsDataURL(file);}

matchMedia("(prefers-color-scheme:dark)").addEventListener("change",()=>{if(App.getDeviceTheme&&App.getDeviceTheme()==="auto")App.applyTheme();});
App.init();

</script>
